<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Iqror Academy — Admin panel</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#155A4E">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 458.82 522.7'%3E%3Crect x='0' y='0' width='458.82' height='115.76' fill='%231F9982'/%3E%3Cpolygon points='118.69,411.72 0,288.91 0,175.52 458.82,175.52 458.82,289.07 341.08,410.90 230.28,296.26' fill='%23F6C05E'/%3E%3Cpolygon points='159.91,451.95 230.65,381.21 301.40,451.95 230.65,522.70' fill='%231F9982'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
<link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/vendor/katex/katex.min.css">
<script defer src="/vendor/katex/katex.min.js"></script>
<script defer src="/vendor/katex/contrib/auto-render.min.js"></script>
<style>
  :root{
    --bg:#F5F6F1; --ink:#1C2723; --teal:#236B5D; --teal-2:#35796B; --teal-d:#16453B;
    --gold:#E2B562; --gold-d:#CFA24C; --muted:#586459; --on-gold:#173E36; --border:#E7EAE6; --border-2:#F0F2EC;
    --white:#FFFFFF; --it-bg:#EAF2EF; --it-fg:#236B5D; --med-bg:#F7F1E3; --med-fg:#977322;
    --ok:#3F8F7C; --bad:#C06A3E;
    --serif:'Roboto Condensed',system-ui,sans-serif; --sans:'Roboto Condensed',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --shadow:0 10px 28px rgba(18,42,32,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
  h1,h2,h3{font-family:var(--serif);margin:0}
  @keyframes viewIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .view-enter{animation:viewIn .4s cubic-bezier(.22,.61,.36,1) both}
  @media(prefers-reduced-motion:reduce){.view-enter{animation:none}}
  a{color:var(--teal)}
  input,select,textarea,button{font:inherit}
  input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:15px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal-2);outline-offset:1px;border-color:var(--teal-2)}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:#fff;color:var(--ink);border-radius:10px;padding:10px 16px;font-weight:600;font-size:14.5px;cursor:pointer;transition:.15s;width:auto}
  .btn:hover{border-color:var(--teal-2)}
  .btn.gold{background:var(--gold);color:var(--on-gold);border:none}
  .btn.gold:hover{background:var(--gold-d)}
  .btn.teal{background:var(--teal);color:#fff;border:none}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 12px;font-size:13px;border-radius:8px}
  .btn.danger{color:var(--bad);border-color:#f0d3c4}
  .btn:disabled{opacity:.55;cursor:not-allowed}

  /* Login */
  @keyframes spin{to{transform:rotate(360deg)}}
  .boot-spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
  .login-wrap{min-height:100dvh;display:grid;place-items:center;padding:20px;
    background:radial-gradient(1000px 500px at 100% -10%,rgba(46,154,136,.16),transparent 60%),linear-gradient(160deg,#1A6355,#13483F)}
  .login-card{background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:34px;width:100%;max-width:400px}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink)}
  .brand .mk{width:32px;height:auto}
  .brand b{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:.04em;display:block;line-height:1}
  .brand small{font-size:9.5px;font-weight:600;letter-spacing:.26em;color:var(--teal-2);display:block;margin-top:3px}
  .stack{display:flex;flex-direction:column;gap:14px}
  .err{background:#fdece3;border:1px solid #f0d3c4;color:var(--bad);border-radius:10px;padding:10px 13px;font-size:13.5px}
  .muted{color:var(--muted)} .small{font-size:13px}

  /* App layout */
  .app{display:none;min-height:100dvh;grid-template-columns:240px 1fr;grid-template-rows:auto 1fr;align-content:start;max-width:100%;overflow-x:hidden}
  .app>*{min-width:0}
  header.top{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:12px 22px;background:rgba(246,243,235,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;min-width:0}
  header.top .brand{min-width:0}
  header.top #who{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  nav.side{background:#fff;border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px}
  nav.side button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1px solid transparent;background:transparent;border-radius:10px;padding:11px 13px;font-weight:600;color:var(--muted);cursor:pointer}
  nav.side button .ic{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
  nav.side button .ic svg{width:20px;height:20px;fill:currentColor}
  nav.side button:hover{background:var(--bg)}
  nav.side button.on{background:var(--teal);color:#fff}
  nav.side button .lbl{flex:1 1 auto}
  .tab-badge{flex:0 0 auto;min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:#e03131;color:#fff;font-size:11.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;line-height:1}
  nav.side button.on .tab-badge{background:#fff;color:#e03131}
  .bell{position:relative;border:1px solid var(--border);background:#fff;color:var(--teal);width:38px;height:38px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
  .bell:hover{background:var(--bg)}
  .bell.has-new{animation:bellRing 1.4s ease-in-out infinite}
  @keyframes bellRing{0%,60%,100%{transform:rotate(0)}70%{transform:rotate(-12deg)}80%{transform:rotate(10deg)}90%{transform:rotate(-6deg)}}
  .bell-badge{position:absolute;top:-6px;right:-6px;min-width:19px;height:19px;padding:0 5px;border-radius:10px;background:#e03131;color:#fff;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;line-height:1;border:2px solid var(--bg)}
  main.content{padding:26px 32px;max-width:1600px;width:100%}
  @media(max-width:820px){
    .app{grid-template-columns:minmax(0,1fr);grid-template-rows:auto auto 1fr}
    header.top{gap:10px;padding:10px 14px}
    header.top .brand small{display:none}
    header.top #who{font-size:12px;max-width:38vw}
    header.top .btn.sm{padding:8px 12px}
    nav.side{flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:20;gap:6px}
    nav.side button{white-space:nowrap;flex:0 0 auto;width:auto;padding:10px 14px}
    nav.side button .lbl{display:none}
    main.content{padding:16px;max-width:100%;overflow-x:hidden}
  }
  @media(max-width:520px){
    header.top #who{display:none}
  }
  .page-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h2{font-size:26px;font-weight:700}
  .card{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .tablewrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th,td{text-align:left;padding:12px 16px;border-bottom:1px solid var(--border-2);white-space:nowrap}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--bg)}
  tr:last-child td{border-bottom:none}
  td .row-actions{display:flex;gap:8px}
  .chip{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  .chip.it{background:var(--it-bg);color:var(--it-fg)} .chip.med{background:var(--med-bg);color:var(--med-fg)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  /* Qidiruv */
  .ph-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .search-inp{width:240px;max-width:100%;border:1px solid var(--border);border-radius:10px;padding:9px 13px;font-size:14px;background:#fff;color:var(--ink)}
  .search-inp:focus{outline:2px solid var(--teal-2);outline-offset:1px;border-color:var(--teal-2)}
  td a{color:var(--teal);font-weight:600;text-decoration:none}
  .btn.ghost2{background:#fff;border:1px solid var(--border);color:var(--ink);font-weight:600}
  .btn.ghost2:hover{border-color:var(--teal-2);color:var(--teal)}
  .btn.gold2{background:var(--teal);border:1px solid var(--teal);color:#fff;font-weight:700}
  .btn.gold2:hover{background:var(--teal-d)}
  /* Statistika (dashboard) */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .stat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px}
  .stat-card b{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--teal);display:block;line-height:1.1}
  .stat-card span{font-size:13px;color:var(--muted)}
  .dash2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .bars{padding:16px 20px;display:flex;flex-direction:column;gap:13px}
  .bar-row{display:grid;grid-template-columns:104px 1fr 34px;gap:12px;align-items:center;font-size:13.5px}
  .bar-row .bar-lbl{color:var(--muted);font-weight:600}
  .bar-row .bar{height:10px;background:var(--bg);border-radius:99px;overflow:hidden}
  .bar-row .bar>i{display:block;height:100%;background:var(--teal-2);border-radius:99px}
  .bar-row b{text-align:right}
  @media(max-width:820px){ .stat-grid{grid-template-columns:1fr 1fr} .dash2{grid-template-columns:1fr} }
  /* Davomat */
  .att-controls{display:flex;gap:16px;flex-wrap:wrap}
  .att-controls label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--muted)}
  .att-controls select,.att-controls input{border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:#fff;color:var(--ink);min-width:210px}
  .att-quick{padding:6px 14px 10px}
  .att-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border-2)}
  .att-row:last-child{border-bottom:none}
  .att-nm{font-weight:600;font-size:14.5px}
  .att-btns{display:flex;gap:6px;flex-wrap:wrap}
  .att-b{border:1px solid var(--border);background:#fff;color:var(--muted);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .att-b.on.att-present{background:#1F9982;border-color:#1F9982;color:#fff}
  .att-b.on.att-absent{background:#C86A3A;border-color:#C86A3A;color:#fff}
  .att-b.on.att-late{background:#E6C282;border-color:#DBB05A;color:#5C3A10}
  .att-b.on.att-excused{background:#8AA0A0;border-color:#8AA0A0;color:#fff}
  @media(max-width:640px){ .att-controls select,.att-controls input{min-width:0;width:100%} .att-controls label{flex:1 1 100%} .att-row{flex-direction:column;align-items:stretch;gap:8px} .att-btns{justify-content:space-between} .att-b{flex:1;text-align:center} }
  /* Foydalanuvchi tahrirlash oynasi: sinf/fan checkbox'lari */
  .ulbl{display:block;font-weight:700;font-size:14px;margin-bottom:8px;color:var(--ink)}
  .uchk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;max-height:230px;overflow:auto;border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--bg)}
  .uchk{display:flex;gap:8px;align-items:center;font-size:13.5px;cursor:pointer;padding:6px 8px;border-radius:8px;user-select:none}
  .uchk:hover{background:#fff}
  .uchk input{width:auto;flex:0 0 auto}
  .gr-year{font-size:12.5px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
  .gr-sel{border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:14px;font-weight:700;background:#fff;color:var(--ink);width:auto;min-width:92px;max-width:120px;flex:0 0 auto;font-family:var(--sans);cursor:pointer}
  .gr-sel.g5{background:#1F9982;border-color:#1F9982;color:#fff}
  .gr-sel.g4{background:#2E9A88;border-color:#2E9A88;color:#fff}
  .gr-sel.g3{background:#E6C282;border-color:#DBB05A;color:#5C3A10}
  .gr-sel.g2{background:#C86A3A;border-color:#C86A3A;color:#fff}
  @media(max-width:640px){ .gr-sel{width:100%} }
  /* Rasm yuklash */
  .img-field{grid-column:1/-1}
  .img-up{display:flex;align-items:center;gap:14px}
  .img-prev{width:78px;height:78px;border-radius:12px;border:1px solid var(--border);background:var(--bg);display:grid;place-items:center;overflow:hidden;flex:0 0 auto}
  .img-prev img{width:100%;height:100%;object-fit:cover}
  .img-prev span{font-size:11px;color:var(--muted);text-align:center;padding:4px}
  .img-actions{display:flex;gap:8px;flex-wrap:wrap}
  .vid-up{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .vid-url{flex:1;min-width:220px;width:auto}
  .vid-status{font-size:12px;color:var(--muted);margin-top:6px}
  /* Dars jadvali */
  .tt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:18px 20px}
  .tt-day{border:1px solid var(--border);border-radius:12px;padding:12px 14px;background:var(--bg)}
  .tt-day-h{font-weight:700;font-size:14px;color:var(--teal);margin-bottom:10px}
  .tt-rows{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
  .tt-row{display:flex;gap:7px;align-items:center}
  .tt-row input{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13.5px;background:#fff;width:auto}
  .tt-row input[name=tt_time]{width:84px;flex:0 0 auto}
  .tt-row input[name=tt_subject]{flex:1;min-width:0}
  .tt-del{border:none;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;flex:0 0 auto}
  .tt-del:hover{color:var(--bad)}
  @media(max-width:820px){ .tt-grid{grid-template-columns:1fr} }
  /* Uy vazifalari */
  .hw-item{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border-2)}
  .hw-item:last-child{border-bottom:none}
  .hw-item-main{min-width:0}
  .hw-subj{font-weight:700;font-size:14px;color:var(--teal)}
  .hw-text{font-size:14px;color:var(--ink);margin-top:2px;overflow-wrap:anywhere}
  .hw-due{font-size:12.5px;color:var(--muted);margin-top:4px}
  /* Sinf bo'yicha kartochkalar (O'quvchilar) */
  .cls-card{margin-bottom:18px}
  .cls-card-head{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid var(--border-2);flex-wrap:wrap}
  .cls-card-head h3{font-size:18px;font-weight:700;font-family:var(--serif)}
  .cls-card-head .cls-count{margin-left:auto;font-size:13px;color:var(--muted);font-weight:600}

  /* Mobil: jadvallar kartochka ko'rinishida (tartibli) */
  @media(max-width:640px){
    #view .tablewrap{overflow:visible}
    #view table,#view thead,#view tbody,#view tr,#view td{display:block;width:100%}
    #view thead{display:none}
    #view tbody tr{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:4px 2px;margin-bottom:12px;box-shadow:0 4px 14px rgba(13,81,72,.05)}
    #view tbody td{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:10px 14px;border-bottom:1px solid var(--border-2);white-space:normal;text-align:right;overflow-wrap:anywhere;min-width:0}
    #view tbody tr td:last-child{border-bottom:none}
    #view tbody td::before{content:attr(data-label);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-size:11px;text-align:left;flex:0 0 auto}
    #view tbody td.td-actions{justify-content:flex-end}
    #view tbody td.td-actions::before{display:none}
    #view td .row-actions{justify-content:flex-end}
    #view td select{width:auto;min-width:140px}
    .page-head{flex-wrap:wrap;gap:10px}
  }

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(9,58,52,.5);display:none;place-items:center;z-index:50;padding:18px;overflow:auto}
  .modal-bg.show{display:grid}
  .modal{background:#fff;border-radius:18px;box-shadow:var(--shadow);width:100%;max-width:560px;max-height:92dvh;overflow:auto}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff}
  .modal-h h3{font-size:19px;font-weight:700}
  .modal-b{padding:22px;display:flex;flex-direction:column;gap:14px}
  .modal-f{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .x{border:none;background:transparent;font-size:22px;cursor:pointer;color:var(--muted);width:auto;padding:4px}
  .subj-row{display:grid;grid-template-columns:1fr 1fr 80px auto;gap:8px;align-items:center}
  .stat-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .stat-badges .b{background:var(--it-bg);color:var(--teal);border-radius:10px;padding:8px 12px;font-size:13px}
  #toasts{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:var(--teal);color:#fff;padding:11px 18px;border-radius:12px;box-shadow:var(--shadow);font-weight:600;font-size:14px;animation:pop .2s ease}
  .toast.err{background:var(--bad)}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .loading{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
  <!-- ===== BOOT (yuklanish) ===== -->
  <div id="boot" style="min-height:100dvh;display:grid;place-items:center;font-family:var(--sans)">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;color:var(--muted)">
      <svg viewBox="0 0 458.82 522.7" fill="none" aria-hidden="true" style="width:42px;height:48px"><rect x="0" y="0" width="458.82" height="115.76" fill="#1F9982"/><polygon points="118.69,411.72 0,288.91 0,175.52 458.82,175.52 458.82,289.07 341.08,410.90 230.28,296.26" fill="#F6C05E"/><polygon points="159.91,451.95 230.65,381.21 301.40,451.95 230.65,522.70" fill="#1F9982"/></svg>
      <div class="boot-spin"></div>
      <div style="font-size:14px">Yuklanmoqda…</div>
    </div>
  </div>
  <script>
    // Zaxira: agar Firebase moduli yuklanmasa (oflayn), 9s dan so'ng login ko'rsatamiz
    setTimeout(function(){ var b=document.getElementById('boot'), a=document.getElementById('app');
      if(b && b.style.display!=='none' && (!a || a.style.display!=='grid')){ b.style.display='none'; var l=document.getElementById('login'); if(l) l.style.display='grid'; } }, 9000);
  </script>
  <!-- ===== LOGIN ===== -->
  <div class="login-wrap" id="login" style="display:none">
    <form class="login-card stack" id="login-form">
      <a class="brand" href="./" style="margin-bottom:6px">
        <svg class="mk" viewBox="0 0 458.82 522.7" fill="none" aria-hidden="true"><rect x="0" y="0" width="458.82" height="115.76" fill="#1F9982"/><polygon points="118.69,411.72 0,288.91 0,175.52 458.82,175.52 458.82,289.07 341.08,410.90 230.28,296.26" fill="#F6C05E"/><polygon points="159.91,451.95 230.65,381.21 301.40,451.95 230.65,522.70" fill="#1F9982"/></svg>
        <span><b>IQROR</b><small>ADMIN PANEL</small></span>

/* Bazada yo'q bo'lgan navbatdagi noyob ID yaratadi (masalan IQ-1013) */
function nextId(existing, prefix, pad){
  const ids = (existing||[]).map(x=>String(x==null?'':x));
  const set = new Set(ids);
  let max = 0;
  ids.forEach(id=>{ const m=id.match(/(\d+)\s*$/); if(m){ const n=parseInt(m[1],10); if(n>max) max=n; } });
  let n = max+1;
  const fmt = x => prefix + String(x).padStart(pad,'0');
  while(set.has(fmt(n))) n++;
  return fmt(n);
}

/* ---- CSV eksport / import ---- */
function downloadCSV(filename, headers, rows){
  const q=v=>{ v=String(v==null?'':v); return /[",\n;]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const lines=[headers.map(q).join(',')].concat(rows.map(r=>r.map(q).join(',')));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{a.remove();URL.revokeObjectURL(url);},800);
}
function parseCSV(text){
  const rows=[]; let field='',row=[],inQ=false;
  text=String(text).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; } else field+=ch; continue; }
    if(ch==='"'){inQ=true;continue;}
    if(ch===','){row.push(field);field='';continue;}
    if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';continue;}
    field+=ch;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(c=>String(c).trim()!==''));
}

async function renderDashboard(){
  $('#view').innerHTML = `<div class="page-head"><h2>Statistika</h2></div><div id="dash"><div class="card"><div class="loading">Yuklanmoqda…</div></div></div>`;
  let students=[],teachers=[],enrollments=[],users=[];
  try{ [students,teachers,enrollments,users] = await Promise.all([
    loadCol('students','order'), loadCol('teachers','order'),
    loadCol('enrollments',null).catch(()=>[]), loadCol('users',null).catch(()=>[])
  ]); cache.students=students; cache.teachers=teachers; }
  catch(e){ $('#dash').innerHTML=`<div class="card"><div class="empty">Xatolik: ${esc(e.code||e.message)}</div></div>`; return; }
  const n=students.length;
  const avg=n?Math.round(students.reduce((s,x)=>s+(Number(x.score)||0),0)/n):0;
  const avgAtt=n?Math.round(students.reduce((s,x)=>s+(Number(x.attendance)||0),0)/n):0;
  const uz=students.filter(s=>(s.lang||'uz')==='uz').length, ru=n-uz;
  const byGrade={}; students.forEach(s=>{const g=Number(s.grade)||0; byGrade[g]=(byGrade[g]||0)+1;});
  const grades=Object.keys(byGrade).map(Number).sort((a,b)=>a-b);
  const maxG=Math.max(1,...grades.map(g=>byGrade[g]));

  downloadCSV('oquvchilar.csv', headers, data);

async function importStudents(file){
  let text; try{ text=await file.text(); }catch(e){ toast('Faylni o‘qib bo‘lmadi',true); return; }
  const rows=parseCSV(text);
  if(rows.length<2){ toast('Fayl bo‘sh yoki sarlavha yo‘q',true); return; }
  const head=rows[0].map(h=>String(h).trim().toLowerCase());
  const col=(...keys)=>head.findIndex(h=>keys.some(k=>h.includes(k)));
  const iId=col('id'), iName=col('ism','name','f.i.o','fio'), iPhone=col('tel','phone','telefon'),
        iLang=col('til','lang','язык'), iGrade=col('sinf','grade','класс'), iGrp=col('guruh','group','групп'),
        iTrack=col('nalish','track','yo‘n','yo\'n','напр'), iScore=col('ball','score','балл'), iAtt=col('davomat','att','посещ'),
        iPinfl=col('jshshir','pinfl','жшшир','пинфл'), iVasiy=col('vasiy','guardian','опекун');
  if(iName<0){ toast('“Ism” ustuni topilmadi (sarlavhani tekshiring)',true); return; }
  const existing=(cache['students']||[]).map(r=>String(r._id));
  const acc=[]; const toWrite=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const name=String(r[iName]||'').trim(); if(!name) continue;
    let id=iId>=0?String(r[iId]||'').trim():'';
    if(!id){ id=nextId(existing.concat(acc),'IQ-',4); }
    acc.push(id);
    const langRaw=(iLang>=0?String(r[iLang]||''):'').toLowerCase();
    const lang=/rus|^ru|рус/.test(langRaw)?'ru':'uz';
    // Ommaviy hujjat (maxfiy maydonlarsiz)
    const rec={ studentId:id, name,
      lang, grade:iGrade>=0?(parseInt(r[iGrade],10)||0):0,
      classLetter:iGrp>=0?String(r[iGrp]||'').trim():'',
      track:iTrack>=0?String(r[iTrack]||'').trim():'',
      score:iScore>=0?(Number(r[iScore])||0):0,
      attendance:iAtt>=0?(Number(r[iAtt])||0):0, order:1000+i };
    // Maxfiy maydonlar → student_private
    const priv={};
    if(iPhone>=0) priv.parentPhone=String(r[iPhone]||'').trim();
    if(iPinfl>=0) priv.pinfl=String(r[iPinfl]||'').trim();
    if(iVasiy>=0) priv.guardian=String(r[iVasiy]||'').trim();
    toWrite.push({id, data:rec, priv});
  }
  if(!toWrite.length){ toast('Import uchun yozuv topilmadi',true); return; }
  if(!confirm(toWrite.length+' ta o‘quvchi import qilinsinmi? Mavjud IDlar yangilanadi.')) return;
  try{
    for(let i=0;i<toWrite.length;i+=450){
      const batch=writeBatch(db);
      toWrite.slice(i,i+450).forEach(x=>{ batch.set(doc(db,'students',x.id), x.data, {merge:true});
        if(x.priv && Object.keys(x.priv).length) batch.set(doc(db,'student_private',x.id), x.priv, {merge:true}); });
      await batch.commit();
    }
    toast(toWrite.length+' ta o‘quvchi import qilindi ✓');
    renderStudents();
  }catch(e){ toast('Import xatosi: '+(e.code||e.message),true); }
}

/* ---- Davomat jurnali ---- */
function classKeyOf(r){ return `${r.lang||'uz'}-${Number(r.grade)||0}-${r.classLetter||r.track||'-'}`; }
function classLabelOf(r){ return `${gradeName(Number(r.grade)||0)} «${r.classLetter||r.track||'—'}» · ${(r.lang||'uz')==='ru'?'Rus':'O‘zbek'}`; }
function todayStr(){ const d=new Date(),p=x=>String(x).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
const ATT_STATUS=[['present','Keldi','att-present'],['absent','Yo‘q','att-absent'],['late','Kech','att-late'],['excused','Sababli','att-excused']];
function classGroupsMap(students){
  const classes={};
  // Admin «Sinflar» bo'limida qo'lda yaratgan sinflar — o'quvchi bo'lmasa ham ko'rinadi
  (cache.definedClasses||[]).forEach(c=>{ const g=Number(c.grade)||0, lang=c.lang||'uz', grp=c.letter||'-';
    const k=`${lang}-${g}-${grp}`;
    if(!classes[k]) classes[k]={key:k,label:`${gradeName(g)} «${c.letter||'—'}» · ${lang==='ru'?'Rus':'O‘zbek'}`,g:g,lang:lang,grp:grp,list:[]}; });
  students.forEach(s=>{ const k=classKeyOf(s); (classes[k]=classes[k]||{key:k,label:classLabelOf(s),g:Number(s.grade)||0,lang:s.lang||'uz',grp:s.classLetter||s.track||'-',list:[]}).list.push(s); });
  const keys=Object.keys(classes).sort((a,b)=>{ const A=classes[a],B=classes[b]; return (A.g-B.g)||((A.lang==='ru'?1:0)-(B.lang==='ru'?1:0))||String(A.grp).localeCompare(String(B.grp)); });
  return {classes,keys};
}
// «Sinflar» ro'yxatini har safar yangilab yuklaymiz (kichik kolleksiya)
async function loadDefinedClasses(){ try{ cache.definedClasses = await loadCol('classes','order'); }catch(e){ cache.definedClasses = cache.definedClasses||[]; } return cache.definedClasses; }
// Sinf hujjatidan (grade+letter+lang) davomat/baho tizimidagi sinf kalitini tuzadi —
// classKeyOf(o'quvchi) bilan bir xil bo'ladi, shuning uchun ruxsatlar mos tushadi.
function classDocKey(c){ return `${c.lang||'uz'}-${Number(c.grade)||0}-${c.letter||'-'}`; }
/* Sinf rahbari sifatida biriktirilgan foydalanuvchini topadi (kurator yoki o'qituvchi).
   Yangi kanonik manba — homeroomClasses; eski kuratorlar assignedClasses orqali
   biriktirilgan bo'lishi mumkin (backward-compat), shuni ham tekshiramiz. */
function supervisorOf(users, key){
  return users.find(u=>Array.isArray(u.homeroomClasses)&&u.homeroomClasses.includes(key))
      || users.find(u=>u.role==='kurator'&&Array.isArray(u.assignedClasses)&&u.assignedClasses.includes(key))
      || null;
}
/* «Sinf rahbari» tanlanganda RBAC bilan moslashtiradi. Davomat huquqi endi
   homeroomClasses orqali beriladi (rol muhim emas — boshlang'ich sinfda o'qituvchi,
   5-11 da kurator). Bitta sinf — bitta rahbar: kalitni tanlangan xodimning
   homeroomClasses'iga qo'shib, qolganlardan olib tashlaymiz. Eski usulda kurator
   assignedClasses'iga yozilgan bo'lsa — o'sha ham tozalanadi (o'qituvchining
   assignedClasses'i esa DARS beradigan sinflar bo'lgani uchun teginilmaydi).
   Sinf nomi o'zgarsa eski kalit hamma joydan olib tashlanadi. */
async function reconcileSupervisor(newKey, oldKey, newUid){
  const users = await loadCol('users', null);
  const batch = writeBatch(db); let n=0;
  users.forEach(u=>{
    if(u.role!=='kurator' && u.role!=='teacher') return;
    let home = Array.isArray(u.homeroomClasses) ? u.homeroomClasses.slice() : [];
    let assigned = Array.isArray(u.assignedClasses) ? u.assignedClasses.slice() : [];
    let hChanged=false, aChanged=false;
    const rm = k => { if(home.includes(k)){ home=home.filter(x=>x!==k); hChanged=true; }
                      if(u.role==='kurator' && assigned.includes(k)){ assigned=assigned.filter(x=>x!==k); aChanged=true; } };
    // Sinf nomi o'zgargan bo'lsa — eski kalit endi hech qaysi sinfga tegishli emas
    if(oldKey && oldKey!==newKey) rm(oldKey);
    if(u._id===newUid){ if(!home.includes(newKey)){ home.push(newKey); hChanged=true; } }
    else { rm(newKey); }
    if(hChanged || aChanged){
      const patch={}; if(hChanged) patch.homeroomClasses=home; if(aChanged) patch.assignedClasses=assigned;
      batch.set(doc(db,'users',u._id), patch, {merge:true}); n++;
    }
  });
  if(n) await batch.commit();
  cache.users=null; // keyingi safar yangi o'qiladi
  return n;
}

/* ----- Xulosa maydonlarini avtomatik hisoblash (students.attendance / students.score) -----
   Batafsil ma'lumot (attendance/monitoring) alohida kolleksiyalarda; ochiq 90+ ro'yxati va
   O'quvchilar jadvali esa students hujjatidagi score/attendance ni o'qiydi. Shuning uchun
   davomat/monitoring saqlangach, tegishli o'quvchilarning shu maydonlarini qayta hisoblab
   yozamiz. Formula kabinetdagi batafsil kartochka bilan bir xil — ikki xil raqam chiqmaydi.
   Students yozish faqat adminга ochiq (zavuch — faqat score), shuning uchun ruxsat tekshiriladi. */
async function recomputeAttendancePct(sids){
  if(!SESSION.isAdmin) return;                 // students.attendance ni faqat admin yozadi
  const ids=[...new Set((sids||[]).filter(Boolean))]; if(!ids.length) return;
  try{
    const res = await Promise.all(ids.map(sid=>
      getDocs(query(collection(db,'attendance'), where('studentId','==',sid))).then(snap=>{
        let present=0, late=0, total=0;
        snap.forEach(s=>{ const days=s.data().days||{}; Object.values(days).forEach(st=>{ total++; if(st==='present')present++; else if(st==='late')late++; }); });
        return { sid, pct: total ? Math.round((present+late)/total*100) : null };
      }).catch(()=>({sid,pct:null}))
    ));
    const batch=writeBatch(db); let n=0;
    res.forEach(r=>{ if(r.pct!=null){ batch.set(doc(db,'students',r.sid), {attendance:r.pct}, {merge:true}); n++; } });
    if(n){ await batch.commit(); cache.students=null; }
  }catch(e){ /* xulosa yangilanmasa ham asosiy saqlash buzilmaydi */ }
}
async function recomputeMonitoringScore(sids){
  if(!(SESSION.isAdmin || SESSION.role==='zavuch')) return;   // students.score: admin yoki zavuch
  const ids=[...new Set((sids||[]).filter(Boolean))]; if(!ids.length) return;
  try{
    const res = await Promise.all(ids.map(sid=>
      getDocs(query(collection(db,'monitoring'), where('studentId','==',sid))).then(snap=>{
        let sum=0, cnt=0;
        snap.forEach(s=>{ const d=s.data(); if(d.status==='approved' && typeof d.score==='number'){ sum+=d.score; cnt++; } });
        return { sid, score: cnt ? Math.round(sum/cnt) : null };  // tasdiqlangan monitoring bo'lmasa — tegilmaydi (qo'ldagi ball saqlanadi)
      }).catch(()=>({sid,score:null}))
    ));
    const batch=writeBatch(db); let n=0;
    res.forEach(r=>{ if(r.score!=null){ batch.set(doc(db,'students',r.sid), {score:r.score}, {merge:true}); n++; } });
    if(n){ await batch.commit(); cache.students=null; }
  }catch(e){ /* xulosa yangilanmasa ham asosiy saqlash buzilmaydi */ }
}

   o'ziga biriktirilgan fanlarni ko'radi; admin/zavuch barcha fanlar + «Boshqa fan…». */
function fanPicker(id){
  if(SESSION.role==='teacher'){
    const subs=(SESSION.assignedSubjects||[]);
    return `<select id="${id}">${subs.length?'':`<option value="">— fan biriktirilmagan —</option>`}${subs.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}</select>`;
  }
  return `<select id="${id}"><option value="">— tanlang —</option>${SUBJECTS.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}<option value="__other__">➕ Boshqa fan…</option></select>`;
}
function wireSubjectPicker(id, cb){
  const el=$('#'+id); if(!el) return;
  el.addEventListener('change',()=>{
    if(el.value==='__other__'){
      const v=(prompt('Fan nomini kiriting:')||'').trim();
      if(v){
        if(![...el.options].some(o=>o.value===v)){ const o=document.createElement('option'); o.value=v; o.textContent=v; el.insertBefore(o, [...el.options].find(x=>x.value==='__other__')); }
        el.value=v;
      } else { el.value=''; }
    }
    cb();
  });
}

  $('#add').addEventListener('click',()=>openForm('students',null));
  $('#stu-pdf').addEventListener('click',()=>exportStudentsPDF(cache['students']||[]));
  $('#stu-export').addEventListener('click',()=>exportStudents(cache['students']||[]));
  $('#stu-import').addEventListener('click',()=>$('#stu-file').click());
  $('#stu-file').addEventListener('change',ev=>{ const f=ev.target.files[0]; ev.target.value=''; if(f) importStudents(f); });
  let rows;
  try{ rows = await loadCol('students','order'); cache['students']=rows; }
  catch(e){ $('#cls-groups').innerHTML=`<div class="card"><div class="empty">Ma’lumotni yuklab bo‘lmadi: ${esc(e.code||e.message)}</div></div>`; return; }
  // Maxfiy ma'lumotlarni (JSHSHIR, telefon, vasiy) himoyalangan kolleksiyadan yuklab, jadval/forma uchun birlashtiramiz
  try{ const psnap=await getDocs(collection(db,'student_private')); const pmap={}; psnap.docs.forEach(d=>{ pmap[d.id]=d.data(); });
    rows.forEach(r=>{ const pd=pmap[r._id]; if(pd){ r.pinfl=pd.pinfl||''; r.parentPhone=pd.parentPhone||''; r.guardian=pd.guardian||''; } }); }catch(e){}
  const langLbl=l=>l==='ru'?'Rus':'O‘zbek';
  const draw=()=>{
    const q=(($('#stu-search')&&$('#stu-search').value)||'').trim().toLowerCase();
    const fg=($('#stu-fgrade')&&$('#stu-fgrade').value)||'';
    const fl=($('#stu-flang')&&$('#stu-flang').value)||'';
    let filtered = rows;
    if(fg!=='') filtered = filtered.filter(r=>String(Number(r.grade)||0)===String(fg));
    if(fl)      filtered = filtered.filter(r=>(r.lang||'uz')===fl);
    if(q)       filtered = filtered.filter(r=>[r.studentId,r._id,r.name,r.parentPhone,r.pinfl].some(v=>String(v==null?'':v).toLowerCase().includes(q)));
    if(!filtered.length){ $('#cls-groups').innerHTML=`<div class="card"><div class="empty">${rows.length?'Filtr/qidiruv bo‘yicha o‘quvchi topilmadi.':'Hozircha o‘quvchi yo‘q. “+ Qo‘shish” bilan boshlang.'}</div></div>`; return; }
    const groups={};
    filtered.forEach(r=>{ const g=Number(r.grade)||0, lang=r.lang||'uz', grp=r.classLetter||r.track||'—'; const key=`${String(g).padStart(2,'0')}|${lang==='ru'?'1':'0'}|${grp}`; (groups[key]=groups[key]||{g,lang,grp,list:[]}).list.push(r); });
    $('#cls-groups').innerHTML = Object.keys(groups).sort().map(k=>{
      const {g,lang,grp,list}=groups[k];
      list.sort((a,b)=>(Number(b.score)||0)-(Number(a.score)||0));
      const trs=list.map(r=>`<tr>
        <td data-label="ID">${esc(r.studentId||r._id)}</td>
        <td data-label="Ism">${esc(r.name||'')}</td>
        <td data-label="Ota-ona tel.">${r.parentPhone?`<a href="tel:${esc(String(r.parentPhone).replace(/[^+\d]/g,''))}">${esc(r.parentPhone)}</a>`:'—'}</td>
        <td data-label="Ball">${esc(r.score==null?'':r.score)}</td>
        <td data-label="Davomat %">${esc(r.attendance==null?'':r.attendance)}</td>
        <td class="td-actions"><div class="row-actions"><button class="btn sm ghost2" data-report="${esc(r._id)}" title="To‘liq ma’lumotnoma / hisobot">📄</button><button class="btn sm" data-edit="${esc(r._id)}">Tahrir</button><button class="btn sm danger" data-del="${esc(r._id)}">O‘chir</button></div></td>
      </tr>`).join('');
      return `<div class="card cls-card"><div class="cls-card-head"><h3>${esc(gradeName(g))} «${esc(grp)}»</h3><span class="chip ${lang==='ru'?'med':'it'}">${esc(langLbl(lang))}</span><span class="cls-count">${list.length} o‘quvchi</span></div><div class="tablewrap"><table><thead><tr><th>ID</th><th>Ism</th><th>Ota-ona tel.</th><th>Ball</th><th>Davomat %</th><th></th></tr></thead><tbody>${trs}</tbody></table></div></div>`;
    }).join('');
    $('#cls-groups').querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openForm('students', rows.find(r=>r._id===b.dataset.edit))));
    $('#cls-groups').querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>delDoc('students', b.dataset.del, (rows.find(r=>r._id===b.dataset.del)||{}).name)));
    $('#cls-groups').querySelectorAll('[data-report]').forEach(b=>b.addEventListener('click',()=>openStudentReport(b.dataset.report, rows.find(r=>r._id===b.dataset.report))));
  };
  draw();
  const si=$('#stu-search'); if(si) si.addEventListener('input',draw);
  const fgEl=$('#stu-fgrade'); if(fgEl) fgEl.addEventListener('change',draw);
  const flEl=$('#stu-flang'); if(flEl) flEl.addEventListener('change',draw);
}

/* ---- Bitta o'quvchining to'liq ma'lumotnomasi (transkript + buxgalteriya) — chop etish/PDF ---- */
async function openStudentReport(sid, row){
  $('#modal').innerHTML = `<div class="modal-h"><h3>Ma’lumotnoma</h3><button class="x" id="m-x">×</button></div>
    <div class="modal-b"><div class="loading">Yuklanmoqda…</div></div>
    <div class="modal-f"><button type="button" class="btn ghost" id="m-cancel">Yopish</button></div>`;
  openModal(); $('#m-x').onclick=closeModal; $('#m-cancel').onclick=closeModal;
  let s = row || null;
  try{
    if(!s){ const d=await getDoc(doc(db,'students',sid)); s = d.exists()?{_id:d.id,...d.data()}:null; }
    if(!s){ $('#modal .modal-b').innerHTML='<div class="empty">O‘quvchi topilmadi.</div>'; return; }
    const [privD, attSnap, monSnap, invSnap, grdSnap] = await Promise.all([
      getDoc(doc(db,'student_private',sid)).then(d=>d.exists()?d.data():{}).catch(()=>({})),
      getDocs(query(collection(db,'attendance'), where('studentId','==',sid))).catch(()=>({docs:[]})),
      getDocs(query(collection(db,'monitoring'), where('studentId','==',sid))).catch(()=>({docs:[]})),
      getDocs(query(collection(db,'invoices'), where('studentId','==',sid))).catch(()=>({docs:[]})),
      getDocs(query(collection(db,'grades'), where('studentId','==',sid))).catch(()=>({docs:[]}))
    ]);
    // Davomat
    let present=0,late=0,absent=0,total=0;
    attSnap.docs.forEach(d=>{ const days=(d.data()||{}).days||{}; Object.values(days).forEach(st=>{ total++; if(st==='present')present++; else if(st==='late')late++; else if(st==='absent')absent++; }); });
    const attPct = total?Math.round((present+late)/total*100):null;
    // Monitoring (tasdiqlangan) — fan bo'yicha o'rtacha
    const monBySub={}; monSnap.docs.forEach(d=>{ const m=d.data(); if(m && m.status==='approved' && typeof m.score==='number'){ (monBySub[m.subject||'—']=monBySub[m.subject||'—']||[]).push(m.score); } });
    const monRows = Object.keys(monBySub).sort().map(sub=>{ const a=monBySub[sub]; const avg=Math.round(a.reduce((x,y)=>x+y,0)/a.length); return `<tr><td>${esc(sub)}</td><td style="text-align:center">${avg}</td></tr>`; }).join('');
    // Baholar — yil bo'yicha
    const grades = grdSnap.docs.map(d=>d.data()).sort((a,b)=>String(a.year||'').localeCompare(String(b.year||'')));
    const gradesHtml = grades.map(gd=>{
      const subs=gd.subjects||{}; const qs=['1','2','3','4'];
      const body=Object.keys(subs).sort().map(sub=>{ const q=subs[sub]||{}; const vals=qs.map(k=>q[k]); const nums=vals.filter(v=>typeof v==='number'); const avg=nums.length?(nums.reduce((x,y)=>x+y,0)/nums.length).toFixed(1):'—'; return `<tr><td>${esc(sub)}</td>${qs.map(k=>`<td style="text-align:center">${q[k]==null?'—':esc(String(q[k]))}</td>`).join('')}<td style="text-align:center"><b>${avg}</b></td></tr>`; }).join('');
      return body?`<div style="margin-top:8px"><div class="small muted">${esc(String(gd.year||''))}-o‘quv yili</div><table class="rep-t"><thead><tr><th>Fan</th><th>1-ch</th><th>2-ch</th><th>3-ch</th><th>4-ch</th><th>O‘rt.</th></tr></thead><tbody>${body}</tbody></table></div>`:'';
    }).join('');
    // To'lovlar (buxgalteriya)
    const inv = invSnap.docs.map(d=>({_id:d.id,...d.data()})).sort((a,b)=>String(a.month||'').localeCompare(String(b.month||'')));
    const paidSum = inv.filter(i=>i.status==='paid').reduce((x,i)=>x+(Number(i.amount)||0),0);
    const dueSum  = inv.filter(i=>i.status!=='paid'&&i.status!=='canceled').reduce((x,i)=>x+(Number(i.amount)||0),0);
    const provLbl={click:'Click',uzum:'Uzum',cash:'Naqd',payme:'Payme'};
    const invRows = inv.map(i=>{ const st=i.status==='paid'?'To‘landi':i.status==='canceled'?'Bekor':'Kutilmoqda'; return `<tr><td>${esc(i.month||'')}</td><td style="text-align:right">${fmtSom(i.amount)}</td><td>${esc(st)}</td><td>${esc(i.status==='paid'?(provLbl[i.provider]||i.provider||'—'):'—')}</td><td>${esc(String(i.paidAt&&i.paidAt.toDate?i.paidAt.toDate().toISOString().slice(0,10):(i.paidAt||'')).slice(0,10)||'—')}</td></tr>`; }).join('');
    const g=Number(s.grade)||0;
    const clsName=(g===0?'Tayyorlov':g+'-sinf')+' «'+(s.classLetter||s.track||'-')+'» · '+(s.lang==='ru'?'Rus':'O‘zbek');
    const info=[['O‘quvchi ID',s.studentId||s._id],['Ism-familiya',s.name||''],['JSHSHIR',privD.pinfl||'—'],['Sinf',clsName],['Yo‘nalish',s.track||'—'],['Vasiy',privD.guardian||'—'],['Ota-ona / vasiy tel.',privD.parentPhone||'—'],['Umumiy ball',s.score==null?'—':String(s.score)],['Davomat',attPct==null?'—':attPct+'%']];
    const emblem=`<svg width="40" viewBox="0 0 458.82 522.7"><rect x="0" y="0" width="458.82" height="115.76" fill="#1F9982"/><polygon points="118.69,411.72 0,288.91 0,175.52 458.82,175.52 458.82,289.07 341.08,410.90 230.28,296.26" fill="#F6C05E"/><polygon points="159.91,451.95 230.65,381.21 301.40,451.95 230.65,522.70" fill="#1F9982"/></svg>`;
    const inner = `
      <div class="rep-head" style="display:flex;align-items:center;gap:12px;border-bottom:2px solid #1F9982;padding-bottom:10px;margin-bottom:14px">
        ${emblem}<div><div style="font-family:var(--serif,Georgia);font-size:20px;font-weight:700;color:#155A4E">IQROR ACADEMY</div><div style="font-size:13px;color:#586459">O‘quvchi ma’lumotnomasi (transkript)</div></div>
      </div>
      <table class="rep-t"><tbody>${info.map(x=>`<tr><td style="width:42%;color:#586459">${esc(x[0])}</td><td><b>${esc(x[1])}</b></td></tr>`).join('')}</tbody></table>
      <h4 class="rep-h">Davomat</h4>
      <table class="rep-t"><tbody>
        <tr><td>Umumiy davomat</td><td><b>${attPct==null?'—':attPct+'%'}</b></td></tr>
        <tr><td>Kelgan / kechikkan / kelmagan</td><td>${present} / ${late} / ${absent} (jami ${total} kun)</td></tr>
      </tbody></table>
      <h4 class="rep-h">Monitoring (fan bo‘yicha o‘rtacha ball)</h4>
      ${monRows?`<table class="rep-t"><thead><tr><th>Fan</th><th style="text-align:center">Ball</th></tr></thead><tbody>${monRows}</tbody></table>`:'<div class="small muted">Ma’lumot yo‘q.</div>'}
      <h4 class="rep-h">Baholar</h4>
      ${gradesHtml||'<div class="small muted">Ma’lumot yo‘q.</div>'}
      <h4 class="rep-h">To‘lovlar (buxgalteriya)</h4>
      ${inv.length?`<table class="rep-t"><thead><tr><th>Oy</th><th style="text-align:right">Summa</th><th>Holat</th><th>Usul</th><th>To‘langan sana</th></tr></thead><tbody>${invRows}</tbody>
        <tfoot><tr><td colspan="5" style="padding-top:8px"><b>Jami to‘langan:</b> ${fmtSom(paidSum)} &nbsp;·&nbsp; <b>Qarz (kutilmoqda):</b> ${fmtSom(dueSum)}</td></tr></tfoot></table>`:'<div class="small muted">To‘lov yozuvi yo‘q.</div>'}
      <div class="small muted" style="margin-top:16px;border-top:1px dashed #ccc;padding-top:8px">Chop etilgan sana: ${new Date().toLocaleDateString('ru-RU')} · Iqror Academy</div>`;
    const style=`<style>
      body{font-family:Arial,system-ui,sans-serif;color:#20302B;margin:0;padding:22px;font-size:13px}
      .rep-t{width:100%;border-collapse:collapse;margin:4px 0}
      .rep-t td,.rep-t th{border:1px solid #d7ddd4;padding:6px 9px;text-align:left;vertical-align:top}
      .rep-t th{background:#eef5f2;font-weight:700}
      .rep-h{font-family:Georgia,serif;color:#155A4E;margin:16px 0 6px;font-size:15px;border-bottom:1px solid #e3ddd0;padding-bottom:3px}
      .small{font-size:11.5px}.muted{color:#6b7d76}
      @media print{body{padding:0}}
    </style>`;
    $('#modal .modal-b').innerHTML = `<div id="rep-inner">${inner}</div>`;
    renderMath && renderMath($('#modal .modal-b'));
    $('#modal .modal-f').innerHTML = `<button type="button" class="btn ghost" id="m-cancel2">Yopish</button><button type="button" class="btn gold" id="rep-print">🖨 Chop etish / PDF</button>`;
    $('#m-cancel2').onclick=closeModal;
    $('#rep-print').onclick=()=>printHTML(`<!DOCTYPE html><html lang="uz"><head><meta charset="utf-8"><title>${esc(s.name||'O‘quvchi')} — ma’lumotnoma</title>${style}</head><body>${inner}</body></html>`);
  }catch(e){ $('#modal .modal-b').innerHTML=`<div class="empty">Xatolik: ${esc(e.code||e.message)}</div>`; }
}

/* ---- Generic collection view (qidiruv bilan) ---- */
async function renderCollection(name){
  const s = SCHEMAS[name];
  $('#view').innerHTML = `<div class="page-head"><h2>${esc(s.title)}</h2>
    <div class="ph-actions"><input id="col-search" class="search-inp" placeholder="Qidiruv…" autocomplete="off"><button class="btn ghost2" id="col-export">⬇ Eksport</button><button class="btn gold" id="add">+ Qo‘shish</button></div></div>
    ${s.hint?`<p class="small muted" style="margin:-8px 0 14px">${esc(s.hint)}</p>`:''}
    <div class="card" id="col-card"><div class="loading">Yuklanmoqda…</div></div>`;
  $('#add').addEventListener('click',()=>openForm(name,null));
  $('#col-export').addEventListener('click',()=>{ const rr=cache[name]||[]; if(!rr.length){toast('Eksport uchun ma’lumot yo‘q',true);return;} downloadCSV(name+'.csv', s.cols.map(c=>c[1]), rr.map(r=>s.cols.map(c=>r[c[0]]==null?'':r[c[0]]))); toast(rr.length+' ta yozuv eksport qilindi ✓'); });
  let rows;
  try{ rows = await loadCol(name, s.order); if(s.sortFn) rows.sort(s.sortFn); cache[name]=rows; }
  catch(e){ $('#col-card').innerHTML=`<div class="empty">Ma’lumotni yuklab bo‘lmadi: ${esc(e.code||e.message)}<br><span class="small">Firestore qoidalari e’lon qilinganini tekshiring.</span></div>`; return; }
  // Sinf rahbarini foydalanuvchilardan HAR SAFAR yangi hisoblaymiz (hujjatda saqlanmaydi —
  // shu tufayli ma'lumot hech qachon eskirmaydi va rollar bilan mos tushadi).
  if(name==='classes'){
    try{ const users=await loadCol('users',null);
      rows.forEach(r=>{ const k=supervisorOf(users, classDocKey(r)); r.supervisorName = k?(k.name||k.email||'—'):''; });
    }catch(e){}
  }
  const th = s.cols.map(c=>`<th>${esc(c[1])}</th>`).join('')+'<th></th>';
  const draw=(q)=>{
    q=(q||'').trim().toLowerCase();
    const filtered = !q ? rows : rows.filter(r=>s.cols.some(c=>String(r[c[0]]==null?'':r[c[0]]).toLowerCase().includes(q))||String(r._id).toLowerCase().includes(q));
    if(!filtered.length){ $('#col-card').innerHTML=`<div class="empty">${rows.length?'Qidiruv bo‘yicha topilmadi.':'Hozircha yozuv yo‘q. “+ Qo‘shish” bilan boshlang.'}</div>`; return; }
    const trs = filtered.map(r=>{
      const tds = s.cols.map(c=>{
        let v = r[c[0]];
        if(c[0]==='track') return `<td data-label="${esc(c[1])}"><span class="chip ${v==='IT'?'it':'med'}">${esc(v||'')}</span></td>`;
        if(c[0]==='phone') return `<td data-label="${esc(c[1])}">${v?`<a href="tel:${esc(String(v).replace(/[^+\d]/g,''))}">${esc(v)}</a>`:'—'}</td>`;
        return `<td data-label="${esc(c[1])}">${esc(v==null?'':v)}</td>`;
      }).join('');
      return `<tr>${tds}<td class="td-actions"><div class="row-actions"><button class="btn sm" data-edit="${esc(r._id)}">Tahrir</button><button class="btn sm danger" data-del="${esc(r._id)}">O‘chir</button></div></td></tr>`;
    }).join('');
    $('#col-card').innerHTML = `<div class="tablewrap"><table><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table></div>`;
    $('#col-card').querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openForm(name, rows.find(r=>r._id===b.dataset.edit))));
    $('#col-card').querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>delDoc(name, b.dataset.del)));
  };
  draw('');
  const si=$('#col-search'); if(si) si.addEventListener('input',()=>draw(si.value));
}

/* ---- Add/Edit form (modal) ---- */
function openForm(name, row){
  const s = SCHEMAS[name];
  const isEdit = !!row;
  const val = k => row && row[k]!=null ? row[k] : '';
  const fieldHtml = f => {
    const v = val(f.k);
    // Tahrirlashda ID (docId) maydonini QULFLAYMIZ — o'zgartirish yangi dublikat yaratmasin
    const lockId = isEdit && s.docId && f.k===s.docId;
    if(lockId) return `<div><label>${esc(f.l)} 🔒</label><input name="${f.k}" type="text" value="${esc(v)}" readonly style="background:#eef0ec;color:#667;cursor:not-allowed"><p class="small muted" style="margin:6px 0 0">ID o‘zgartirilmaydi (dublikatning oldini olish uchun).</p></div>`;
    if(f.t==='select') return `<div><label>${esc(f.l)}</label><select name="${f.k}">${f.opts.map(o=>{const ov=(o&&typeof o==='object')?o.v:o;const ol=(o&&typeof o==='object')?o.l:o;return `<option value="${esc(ov)}" ${String(ov)===String(v)?'selected':''}>${esc(ol)}</option>`;}).join('')}</select></div>`;
    if(f.t==='dynselect') return `<div><label>${esc(f.l)}</label><select name="${f.k}" data-dyn="${esc(f.src)}"><option value="">Yuklanmoqda…</option></select>${f.note?`<p class="small muted" style="margin:6px 0 0">${esc(f.note)}</p>`:''}</div>`;
    if(f.t==='textarea') return `<div><label>${esc(f.l)}</label><textarea name="${f.k}" rows="2">${esc(v)}</textarea></div>`;
    if(f.t==='image') return `<div class="img-field"><label>${esc(f.l)}</label>
      <div class="img-up">
        <div class="img-prev" data-k="${f.k}">${v?`<img src="${esc(v)}" alt="">`:'<span>Rasm yo‘q</span>'}</div>
        <div class="img-actions">
          <input type="hidden" name="${f.k}" value="${esc(v)}">
          <input type="file" accept="image/*" class="img-file" data-k="${f.k}" style="display:none">
          <button type="button" class="btn sm img-pick" data-k="${f.k}">📷 Rasm tanlash</button>
          <button type="button" class="btn sm danger img-clear" data-k="${f.k}" style="${v?'':'display:none'}">O‘chirish</button>
        </div>
      </div></div>`;
    if(f.t==='video') return `<div class="img-field"><label>${esc(f.l)}</label>
      <div class="vid-up">
        <input name="${f.k}" type="url" value="${esc(v)}" placeholder="https://youtube.com/…  yoki fayl yuklang" class="vid-url">
        <input type="file" accept="video/*" class="vid-file" data-k="${f.k}" style="display:none">
        <button type="button" class="btn sm vid-pick" data-k="${f.k}">🎬 Yuklash</button>
      </div>
      <div class="vid-status" data-k="${f.k}">${v?'Video biriktirilgan ✓':'YouTube havolasini qo‘ying yoki qisqa video (maks. 80MB) yuklang'}</div></div>`;
    return `<div><label>${esc(f.l)}</label><input name="${f.k}" type="${f.t}" ${f.step?`step="${f.step}"`:''} ${f.inputmode?`inputmode="${esc(f.inputmode)}"`:''} ${f.maxlength?`maxlength="${esc(String(f.maxlength))}"`:''} ${f.placeholder?`placeholder="${esc(f.placeholder)}"`:''} ${f.req?'required':''} value="${esc(v)}"></div>`;
  };
  // group fields into a 2-col grid where sensible
  const body = `<div class="grid2">${s.fields.map(fieldHtml).join('')}</div>` + (s.subjects ? subjectsEditor(row) : '');
  $('#modal').innerHTML = `
    <div class="modal-h"><h3>${isEdit?'Tahrirlash':'Yangi qo‘shish'} — ${esc(s.title)}</h3><button class="x" id="m-x">×</button></div>
    <form id="m-form"><div class="modal-b">${body}</div>
    <div class="modal-f"><button type="button" class="btn ghost" id="m-cancel">Bekor</button><button type="submit" class="btn gold" id="m-save">Saqlash</button></div></form>`;
  openModal();
  // Yangi qo'shishda ID ni avtomatik (bazada yo'q) qilib qo'yamiz
  if(!isEdit && s.autoId){
    const existing = (cache[name]||[]).map(r=>r[s.autoId.field]);
    const inp = $('#m-form [name="'+s.autoId.field+'"]');
    if(inp) inp.value = nextId(existing, s.autoId.prefix, s.autoId.pad);
  }
  $('#m-x').onclick=closeModal; $('#m-cancel').onclick=closeModal;
  if(s.subjects) wireSubjects();
  wireImages(name); wireVideos(name); populateDynselects(name, row);
  $('#m-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=$('#m-save'); btn.disabled=true; btn.textContent='Saqlanmoqda…';
    try{
      const data={};
      new FormData(e.target).forEach((v,k)=>{ if(k.startsWith('subj_'))return; data[k]= NUM.has(k) ? (v===''?0:Number(v)) : v; });
      if(s.subjects) data.subjects = gatherSubjects();
      // Faqat-forma maydonlari (masalan «Sinf rahbari») hujjatga yozilmaydi — afterSave hal qiladi
      const formVals={};
      (s.fields||[]).forEach(f=>{ if(f.formOnly && (f.k in data)){ formVals[f.k]=data[f.k]; delete data[f.k]; } });
      // Maxfiy maydonlarni ommaviy hujjatdan ajratamiz (alohida kolleksiyaga yoziladi)
      const privData={};
      if(s.privateCol && Array.isArray(s.privateFields)){
        s.privateFields.forEach(k=>{ privData[k] = (k in data) ? data[k] : ''; if(k in data) data[k]=deleteField(); });
      }
      // Bir xil ismli o'quvchini tasodifan takror qo'shib yubormaslik uchun ogohlantiramiz
      if(!isEdit && name==='students'){
        const nm=String(data.name||'').trim().toLowerCase();
        if(nm && (cache['students']||[]).some(r=>String(r.name||'').trim().toLowerCase()===nm)){
          if(!confirm('“'+String(data.name).trim()+'” ismli o‘quvchi allaqachon bor. Bu YANGI (boshqa) o‘quvchimi? Tahrirlash uchun jadvaldagi «Tahrir» tugmasidan foydalaning.')){ btn.disabled=false; btn.textContent='Saqlash'; return; }
        }
      }
      let savedId;
      if(s.docId){
        // Tahrirlashda DOIM asl hujjatga yozamiz (ID qulflangan; hech qachon yangi dublikat yaratilmaydi)
        const id = isEdit ? row._id : (data[s.docId]||'').trim();
        if(!id){toast('ID kiriting',true);btn.disabled=false;btn.textContent='Saqlash';return;}
        // Yangi qo'shishda mavjud ID ustiga yozib yubormaslik uchun ogohlantiramiz
        if(!isEdit && (cache[name]||[]).some(r=>String(r._id)===id)){
          if(!confirm('“'+id+'” IDsi allaqachon mavjud. Ustiga yozib, eski yozuvni almashtirasizmi?')){ btn.disabled=false; btn.textContent='Saqlash'; return; }
        }
        data[s.docId]=id;
        await setDoc(doc(db,name,id), data, {merge:true}); savedId=id;
      } else if(isEdit){
        await setDoc(doc(db,name,row._id), data, {merge:true}); savedId=row._id;
      } else {
        const ref=await addDoc(collection(db,name), data); savedId=ref.id;
      }
      // Maxfiy ma'lumotni alohida (himoyalangan) kolleksiyaga yozamiz
      if(s.privateCol && savedId && Object.keys(privData).length){
        try{ await setDoc(doc(db,s.privateCol,savedId), privData, {merge:true}); }
        catch(err){ toast('Saqlandi, lekin maxfiy maydonlarni yozishda xatolik: '+(err.code||err.message), true); }
      }
      if(s.afterSave){ try{ await s.afterSave(data, isEdit?row:null, formVals); }catch(err){ toast('Saqlandi, lekin sinf rahbarini biriktirishda xatolik: '+(err.code||err.message), true); } }
      toast('Saqlandi ✓'); closeModal(); (name==='students'?renderStudents():renderCollection(name));
    }catch(err){ toast('Xatolik: '+(err.code||err.message), true); btn.disabled=false; btn.textContent='Saqlash'; }
  });
}

/* Rasm yuklash maydonlarini ulash */
function wireImages(name){
  document.querySelectorAll('#m-form .img-pick').forEach(btn=>{
    const k=btn.dataset.k, file=$('#m-form .img-file[data-k="'+k+'"]');
    btn.onclick=()=>file.click();
    file.onchange=async()=>{
      const f=file.files[0]; if(!f) return;
      if(!/^image\//.test(f.type)){ toast('Faqat rasm fayli',true); file.value=''; return; }
      if(f.size>5*1024*1024){ toast('Rasm 5MB dan katta bo‘lmasin',true); file.value=''; return; }
      const prev=$('#m-form .img-prev[data-k="'+k+'"]');
      prev.innerHTML='<span>Yuklanmoqda…</span>';
      try{
        const url=await uploadImage(name, f);
        $('#m-form [name="'+k+'"]').value=url;
        prev.innerHTML=`<img src="${esc(url)}" alt="">`;
        const clr=$('#m-form .img-clear[data-k="'+k+'"]'); if(clr) clr.style.display='';
      }catch(e){ toast('Rasm yuklashda xatolik: '+(e.code||e.message),true); prev.innerHTML='<span>Xatolik</span>'; }
      file.value='';
    };
  });
  document.querySelectorAll('#m-form .img-clear').forEach(btn=>{
    btn.onclick=()=>{ const k=btn.dataset.k; $('#m-form [name="'+k+'"]').value=''; $('#m-form .img-prev[data-k="'+k+'"]').innerHTML='<span>Rasm yo‘q</span>'; btn.style.display='none'; };
  });
}
/* Video maydonlari: YouTube havolasi yoki fayl yuklash */
function wireVideos(name){
  document.querySelectorAll('#m-form .vid-pick').forEach(btn=>{

/* Dinamik ochiluvchi ro'yxatlar (masalan «Sinf rahbari») — foydalanuvchilardan to'ldiriladi */
async function populateDynselects(name, row){
  const sels = [...document.querySelectorAll('#m-form select[data-dyn]')];
  if(!sels.length) return;
  let users; try{ users = await loadCol('users', null); cache.users=users; }catch(e){ return; }
  const roleTag = r => r==='kurator'?'Kurator':(r==='teacher'?'O‘qituvchi':r);
  for(const sel of sels){
    const src = sel.getAttribute('data-dyn');
    let opts=[];
    if(src==='rahbarlar') opts = users.filter(u=>u.role==='kurator'||u.role==='teacher')
      .map(u=>({v:u._id, l:(u.name||u.email||'—') + ` · ${roleTag(u.role)}` + (u.name&&u.email?` · ${u.email}`:'')}));
    // Tahrirlashda: shu sinf kalitiga biriktirilgan rahbarni (kurator/o'qituvchi) oldindan tanlaymiz
    let cur='';
    if(name==='classes' && row){ const k=supervisorOf(users, classDocKey(row)); if(k) cur=k._id; }
    sel.innerHTML = `<option value="">— tanlanmagan —</option>` + opts.map(o=>`<option value="${esc(o.v)}" ${o.v===cur?'selected':''}>${esc(o.l)}</option>`).join('');
    if(!opts.length) sel.insertAdjacentHTML('afterend', `<p class="small muted" style="margin:6px 0 0;color:var(--med-fg,#b45309)">Hozircha «Kurator» yoki «O‘qituvchi» roli berilgan foydalanuvchi yo‘q. Avval «Foydalanuvchilar» bo‘limida rol tayinlang.</p>`);
  }
}
/* subjects sub-editor for students */

function subjRow(s){ s=s||{uz:'',ru:'',s:''};
  return `<div class="subj-row"><input name="subj_uz" placeholder="Fan (UZ)" value="${esc(s.uz||'')}"><input name="subj_ru" placeholder="Fan (RU)" value="${esc(s.ru||'')}"><input name="subj_s" type="number" placeholder="ball" value="${esc(s.s==null?'':s.s)}"><button type="button" class="x subj-del">×</button></div>`;

function wireSubjects(){
  $('#subj-add').onclick=()=>{ const d=document.createElement('div'); d.innerHTML=subjRow(); const el=d.firstElementChild; $('#subj-list').appendChild(el); el.querySelector('.subj-del').onclick=()=>el.remove(); };

async function delDoc(name,id,label){
  const what = label ? `“${label}” (${id})` : `“${id}”`;
  if(!confirm(`${what} — o‘chirilsinmi?\n\n⚠️ Bu amalni ortga qaytarib bo‘lmaydi.`)) return;
  // O'quvchi kabi muhim yozuvlar uchun ikkinchi tasdiq
  if(name==='students' && !confirm('O‘quvchi va uning maxfiy ma’lumoti (JSHSHIR, telefon) butunlay o‘chadi.\nDavom etamizmi?')) return;
  try{ await deleteDoc(doc(db,name,id));
    // O'quvchini o'chirsa — maxfiy ma'lumotini ham o'chiramiz (orfan qolmasin)
    if(name==='students'){ try{ await deleteDoc(doc(db,'student_private',id)); }catch(e){} }
    toast('O‘chirildi');
    if(name==='enrollments') renderEnrollments(); else if(name==='users') renderUsers(); else if(name==='students') renderStudents(); else renderCollection(name);
  }catch(e){ toast('Xatolik: '+(e.code||e.message),true); }
}

  catch(e){ $('#usr-card').innerHTML=`<div class="empty">Xatolik: ${esc(e.code||e.message)}<br><span class="small">Firestore qoidalarida <b>users</b> uchun admin ruxsati borligini tekshiring.</span></div>`; return; }
  const roleOpts=[['parent','Ota-ona'],['student','O‘quvchi'],['teacher','O‘qituvchi'],['kurator','Kurator (sinf rahbari)'],['zavuch','Zavuch (O‘IBDO‘)'],['admin','Administrator']];
  let CLS={classes:{},keys:[]};
  try{ const st=(cache.students&&cache.students.length)?cache.students:await loadCol('students','order'); cache.students=st; await loadDefinedClasses(); CLS=classGroupsMap(st); }catch(e){}
  const draw=(q)=>{
    q=(q||'').trim().toLowerCase();
    const filtered = !q ? rows : rows.filter(r=>[r.name,r.email,r.role].some(v=>String(v==null?'':v).toLowerCase().includes(q)));
    if(!filtered.length){ $('#usr-card').innerHTML=`<div class="empty">${rows.length?'Qidiruv bo‘yicha foydalanuvchi topilmadi.':'Hozircha ro‘yxatdan o‘tgan foydalanuvchi yo‘q.'}</div>`; return; }
    const roleName=rl=>(roleOpts.find(o=>o[0]===rl)||['',rl||'—'])[1];

      : '—';
    const roleChip=rl=>`<span style="display:inline-block;padding:4px 12px;border-radius:999px;font-size:12.5px;font-weight:700;background:${rl==='admin'?'var(--med-bg)':(rl==='zavuch'?'#EAE1F2':'var(--it-bg)')};color:${rl==='admin'?'var(--med-fg)':(rl==='zavuch'?'#5b3d8a':'var(--teal)')}">${esc(roleName(rl))}</span>`;
    const trs = filtered.map(r=>`<tr>
      <td data-label="Ism">${esc(r.name||'')}</td><td data-label="Email">${esc(r.email||'')}</td>

  const clsChecks = CLS.keys.length ? CLS.keys.map(k=>`<label class="uchk"><input type="checkbox" data-cls value="${esc(k)}" ${(Array.isArray(u.assignedClasses)&&u.assignedClasses.includes(k))?'checked':''}> ${esc(CLS.classes[k].label)}</label>`).join('') : '<span class="small muted">Avval «O‘quvchilar» bo‘limida o‘quvchi qo‘shing — sinflar shu yerdan chiqadi.</span>';
  const subjChecks = SUBJECTS.map(s=>`<label class="uchk"><input type="checkbox" data-subj value="${esc(s)}" ${(Array.isArray(u.assignedSubjects)&&u.assignedSubjects.includes(s))?'checked':''}> ${esc(s)}</label>`).join('');

      <div><label class="ulbl">Rol</label>
        <select id="u-role" style="width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px;background:#fff">${roleOpts.map(o=>`<option value="${o[0]}" ${u.role===o[0]?'selected':''}>${esc(o[1])}</option>`).join('')}</select></div>
      <div id="u-cls-wrap"><label class="ulbl">Biriktirilgan sinflar <span class="small muted" style="font-weight:400">— bir nechtasini belgilang</span></label>

  sync(); roleSel.addEventListener('change',sync);

  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });

    const assignedSubjects = (role==='teacher') ? [...ov.querySelectorAll('[data-subj]:checked')].map(c=>c.value) : [];

      <label>Sana<input type="date" id="ci-date" value="${todayStr()}"></label>
    </div></div>
    <div id="ci-body"><div class="loading">Yuklanmoqda…</div></div>`;
  const load=async()=>{
    const day=$('#ci-date').value; if(!day){ $('#ci-body').innerHTML=`<div class="cls-empty" style="margin:0">Sanani tanlang.</div>`; return; }
    $('#ci-body').innerHTML=`<div class="card"><div class="loading">Yuklanmoqda…</div></div>`;
    let rows;
    try{ const snap=await getDocs(query(collection(db,'checkins'), where('day','==',day))); rows=snap.docs.map(d=>({_id:d.id,...d.data()})); }
    catch(e){ $('#ci-body').innerHTML=`<div class="card"><div class="empty">Xatolik: ${esc(e.code||e.message)}<br><span class="small">Ko‘prik hali ulanmagan bo‘lishi mumkin.</span></div></div>`; return; }
    if(!rows.length){ $('#ci-body').innerHTML=`<div class="card"><div class="empty">Bu kunda hali kirish qayd etilmagan. Terminal ulanganini va «Kamera ID» to‘g‘riligini tekshiring.</div></div>`; return; }
    // Har bir shaxsning ENG ERTA kirishini olamiz (birinchi kelish)
    const first={}; rows.forEach(r=>{ const k=(r.personType||'')+':'+(r.refId||r.cameraId||r._id); const ts=r.ts||''; if(!first[k]||ts<first[k].ts) first[k]=r; });
    const list=Object.values(first).sort((a,b)=>String(a.ts||'').localeCompare(String(b.ts||'')));
    const hhmm=iso=>{ const m=String(iso||'').match(/T(\d{2}:\d{2})/); return m?m[1]:esc(String(iso||'').slice(11,16)); };
    const stChip=st=> st==='late' ? `<span class="chip" style="background:var(--med-bg);color:var(--med-fg)">Kech</span>`
                    : st==='present' ? `<span class="chip it" style="background:var(--it-bg);color:var(--teal)">Keldi</span>` : `<span class="muted">—</span>`;
    const typeChip=tp=> tp==='staff' ? `<span class="chip" style="background:#EAE1F2;color:#5b3d8a">Xodim</span>` : `<span class="chip" style="background:var(--it-bg);color:var(--teal)">O‘quvchi</span>`;
    const students=list.filter(r=>r.personType!=='staff'), staff=list.filter(r=>r.personType==='staff');
    const nLate=students.filter(r=>r.status==='late').length, nPres=students.filter(r=>r.status==='present').length;
    const trs=list.map(r=>`<tr><td data-label="Vaqt">${hhmm(r.ts)}</td><td data-label="Ism">${esc(r.name||r.refId||r.cameraId||'—')}</td><td data-label="Turi">${typeChip(r.personType)}</td><td data-label="Holat">${r.personType==='staff'?'<span class="muted">kirdi</span>':stChip(r.status)}</td></tr>`).join('');
    $('#ci-body').innerHTML=`<div class="card">
      <div class="cls-card-head"><h3>${esc(day)}</h3><span class="cls-count">${students.length} o‘quvchi (${nPres} keldi · ${nLate} kech) · ${staff.length} xodim</span></div>
      <div class="tablewrap"><table><thead><tr><th>Vaqt</th><th>Ism</th><th>Turi</th><th>Holat</th></tr></thead><tbody>${trs}</tbody></table></div></div>`;
  };
  $('#ci-date').addEventListener('change',load);
  load();
}

    <div class="card" id="app-card"><div class="loading">Yuklanmoqda…</div></div>`;
  const shareLink = location.origin + location.pathname.replace(/[^/]*$/,'') + 'imtihon.html';

  let rows;

  if(!rows.length){ $('#app-card').innerHTML=`<div class="empty">Hozircha nomzod arizasi yo‘q. Nomzodlarni <b>/imtihon</b> sahifasiga yo‘naltiring.</div>`; return; }
  const stChip=r=>{ const st=r.status||'submitted';

  const recChip=r=>{ const rec=r.result&&r.result.recommendation; if(!rec) return '';

function openApplication(r){
  if(!r) return;
  const res=r.result||null;
  const ans=Array.isArray(r.answers)?r.answers:[];
  const perById={}; if(res&&Array.isArray(res.perQuestion)) res.perQuestion.forEach(p=>{ perById[p.qid]=p; });
  const verdict = res ? `<div class="card" style="margin:0 0 14px;padding:16px 18px;background:#f7f5ef">
      <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center">
        <div><div class="small muted">Daraja</div><div style="font-family:var(--serif);font-size:22px;font-weight:700;color:var(--teal)">${esc(res.level||'—')}</div></div>
        <div><div class="small muted">Umumiy ball</div><div style="font-family:var(--serif);font-size:22px;font-weight:700">${esc(String(res.overallScore!=null?res.overallScore:'—'))}/100</div></div>
        <div><div class="small muted">Tavsiya</div><div style="font-weight:700">${esc(res.recommendation||'—')}</div></div>
      </div>
      ${res.summary?`<p style="margin:12px 0 0">${esc(res.summary)}</p>`:''}
      ${(res.strengths&&res.strengths.length)?`<p style="margin:10px 0 0"><b>Kuchli tomonlari:</b> ${res.strengths.map(esc).join('; ')}</p>`:''}
      ${(res.weaknesses&&res.weaknesses.length)?`<p style="margin:6px 0 0"><b>Zaif tomonlari:</b> ${res.weaknesses.map(esc).join('; ')}</p>`:''}
      ${res.model?`<p class="small muted" style="margin:10px 0 0">AI model: ${esc(res.model)}</p>`:''}
    </div>` : `<div class="card" style="margin:0 0 14px;padding:14px 18px;background:#fff7e8"><b>Hali baholanmagan.</b> AI-grader xizmatini ishga tushiring (<code>node index.cjs grade</code>).</div>`;
  const qhtml = ans.map((a,i)=>{ const p=perById[a.qid]||{};
    return `<div class="card" style="margin:0 0 12px;padding:14px 16px">
      <div class="small muted">${i+1}-savol${p.score!=null?` · <b style="color:var(--teal)">${esc(String(p.score))}/100</b>`:''}</div>
      <p style="white-space:pre-wrap;margin:8px 0 0">${esc(a.text||'—')}</p>
      ${p.feedback?`<p class="small" style="margin:10px 0 0;color:#33564c;border-top:1px dashed var(--border);padding-top:8px"><b>AI izohi:</b> ${esc(p.feedback)}</p>`:''}
    </div>`;
  }).join('');
  $('#modal').innerHTML = `<div class="modal-h"><h3>${esc(r.name||'')} — ${esc(r.specialty||'')}</h3><button class="x" id="m-x">×</button></div>
    <div class="modal-b">${verdict}<div class="small muted" style="margin:0 0 8px">Javoblar</div>${qhtml||'<div class="empty">Javob yo‘q.</div>'}</div>
    <div class="modal-f"><button type="button" class="btn ghost" id="m-cancel">Yopish</button></div>`;
  openModal(); renderMath($('#modal .modal-b')); $('#m-x').onclick=closeModal; $('#m-cancel').onclick=closeModal;
}

/* ---- Imtihon savollari muharriri (AI serversiz qo'lda) ---- */
async function openExamQuestions(spec, onSaved){
  const id = monSlug(spec);
  $('#modal').innerHTML = `<div class="modal-h"><h3>Imtihon savollari — ${esc(spec)}</h3><button class="x" id="m-x">×</button></div>
    <div class="modal-b"><div class="loading">Yuklanmoqda…</div></div>
    <div class="modal-f"></div>`;
  openModal(); $('#m-x').onclick=closeModal;
  let questions=[];
  try{ const s=await getDoc(doc(db,'exam_questions',id)); if(s.exists()&&Array.isArray(s.data().questions)) questions=s.data().questions.map(q=>({text:String(q.text||'')})); }catch(e){}
  const render=()=>{
    const rows = questions.map((q,i)=>`<div class="eq-row" style="display:flex;gap:8px;align-items:flex-start;margin-bottom:14px">
        <span class="q-num" style="flex:0 0 auto;background:var(--it-bg);color:var(--teal);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;margin-top:6px">${i+1}</span>
        <div style="flex:1;min-width:0">
          <textarea data-i="${i}" rows="2" style="width:100%;min-height:52px" placeholder="Savol matni… (formula uchun $…$, masalan: $a^2+b^2$)">${esc(q.text||'')}</textarea>
          <div class="eq-prev" data-prev="${i}" style="margin-top:6px;padding:8px 10px;background:var(--border-2);border-radius:8px;font-size:14.5px;min-height:18px;white-space:pre-wrap;word-break:break-word"></div>
        </div>
        <button type="button" class="x" data-rm="${i}" title="O‘chirish" style="flex:0 0 auto;margin-top:4px">×</button>
      </div>`).join('');
    $('#modal .modal-b').innerHTML = `
      <p class="small muted" style="margin:0 0 6px">Ochiq (insho) savollar yozing — nomzod har biriga to‘liq javob beradi, AI javob sifatiga qarab darajani belgilaydi. 4–8 ta chuqur savol tavsiya etiladi.</p>
      <p class="small" style="margin:0 0 12px;color:#33564c;background:#eef5f2;border:1px solid #d5e6df;border-radius:8px;padding:8px 10px">💡 <b>Formula/matematika</b> uchun matnni <code>$…$</code> ichiga yozing: <code>$p^2$</code> → $p^2$, <code>$a^2+b^2$</code> → $a^2+b^2$, <code>$\\frac{a}{b}$</code> → kasr. Boshqa saytdan «chiroyli» belgilarni ko‘chirmang — ular buziladi (☐). Oddiy yozing, quyida ko‘rinishi chiqadi.</p>
      <div id="eq-list">${rows||'<div class="empty" style="margin-bottom:10px">Hali savol yo‘q. «Savol qo‘shish» bilan boshlang.</div>'}</div>
      <button type="button" class="btn ghost" id="eq-add">➕ Savol qo‘shish</button>`;
    $('#modal .modal-f').innerHTML = `<button type="button" class="btn ghost" id="m-cancel">Bekor</button><button type="button" class="btn gold" id="eq-save">Saqlash</button>`;
    renderMath($('#modal .modal-b'));
    const sync=()=>{ $('#modal').querySelectorAll('#eq-list textarea').forEach(t=>{ questions[Number(t.dataset.i)] = {text:t.value}; }); };
    const updPrev=(t)=>{ const pv=$(`#eq-list [data-prev="${t.dataset.i}"]`); if(!pv) return; const v=t.value.trim(); pv.innerHTML = v ? esc(v) : `<span class="muted" style="opacity:.6">Ko‘rinishi shu yerda chiqadi…</span>`; renderMath(pv); };
    $('#modal').querySelectorAll('#eq-list textarea').forEach(t=>{ updPrev(t); t.addEventListener('input',()=>updPrev(t)); });
    $('#eq-add').onclick=()=>{ sync(); questions.push({text:''}); render(); const tas=$('#modal').querySelectorAll('#eq-list textarea'); if(tas.length) tas[tas.length-1].focus(); };
    $('#modal').querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ sync(); questions.splice(Number(b.dataset.rm),1); render(); });
    $('#m-cancel').onclick=closeModal;
    $('#eq-save').onclick=async()=>{
      sync();
      const clean = questions.map(q=>({text:String(q.text||'').trim()})).filter(q=>q.text);
      if(!clean.length){ if(!confirm('Barcha savollar bo‘sh. Savollarni o‘chirib saqlansinmi?')) return; }
      const out = clean.map((q,i)=>({id:'q'+(i+1), text:q.text}));
      const btn=$('#eq-save'); btn.disabled=true; btn.textContent='Saqlanmoqda…';
      try{
        await setDoc(doc(db,'exam_questions',id), {specialty:spec, slug:id, questions:out, count:out.length, generatedBy:'admin', updatedAt:serverTimestamp()}, {merge:true});
        toast('Savollar saqlandi ✓'); closeModal(); if(typeof onSaved==='function') onSaved();
      }catch(e){ toast('Xatolik: '+(e.code||e.message),true); btn.disabled=false; btn.textContent='Saqlash'; }
    };
  };
  $('#m-x').onclick=closeModal;
  render();
}

      </div></td></tr>`).join('');
    $('#pm-body').innerHTML=reportCard+`<div class="card"><div class="cls-card-head"><h3>${esc(month)}</h3><span class="cls-count">${paid.length} to‘landi · ${pend.length} kutilmoqda · yig‘ildi: ${fmtSom(total)}</span></div>
      <div class="tablewrap"><table><thead><tr><th>O‘quvchi</th><th>Summa</th><th>Holat</th><th></th></tr></thead><tbody>${trs}</tbody></table></div></div>`;
    $('#pm-body').querySelectorAll('[data-cash]').forEach(b=>b.addEventListener('click',async()=>{ try{ await setDoc(doc(db,'invoices',b.dataset.cash),{status:'paid',provider:'cash',paidAt:serverTimestamp()},{merge:true}); toast('Naqd to‘lov belgilandi ✓'); load(); }catch(e){ toast('Xatolik: '+(e.code||e.message),true); } }));
    $('#pm-body').querySelectorAll('[data-cancel]').forEach(b=>b.addEventListener('click',async()=>{ if(!confirm('Bekor qilinsinmi?'))return; try{ await setDoc(doc(db,'invoices',b.dataset.cancel),{status:'canceled'},{merge:true}); load(); }catch(e){ toast('Xatolik: '+(e.code||e.message),true); } }));
    $('#pm-body').querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{ if(!confirm('O‘chirilsinmi?'))return; try{ await deleteDoc(doc(db,'invoices',b.dataset.del)); load(); }catch(e){ toast('Xatolik: '+(e.code||e.message),true); } }));
  };
  $('#pm-gen').addEventListener('click',async()=>{
    const month=$('#pm-month').value, amount=Number(($('#pm-amount').value||'').replace(/\D/g,''))||0;
    if(!month){ toast('Oyni tanlang',true); return; }
    if(amount<=0){ toast('Oylik summani kiriting',true); return; }
    const btn=$('#pm-gen'); btn.disabled=true; btn.textContent='Yaratilmoqda…';
    try{
      // Mavjud hisoblarni tekshiramiz (paid'ni buzmaymiz, dublikat yaratmaymiz)
      const snap=await getDocs(query(collection(db,'invoices'), where('month','==',month)));
      const existing=new Set(snap.docs.map(d=>d.id));
      let created=0;
      for(let i=0;i<students.length;i+=400){
        const batch=writeBatch(db);
        students.slice(i,i+400).forEach(s=>{ const sid=s.studentId||s._id; const id=`${sid}__${month}`; if(existing.has(id))return;
          batch.set(doc(db,'invoices',id),{studentId:sid,studentName:s.name||sid,classKey:classKeyOf(s),month,amount,status:'pending',provider:'',createdAt:serverTimestamp()}); created++; });
        await batch.commit();
      }
      $('#pm-genmsg').textContent = created?`${created} ta yangi hisob-faktura yaratildi (${fmtSom(amount)}).`:'Bu oy uchun barcha hisoblar allaqachon mavjud.';
      toast('Tayyor ✓'); load();
    }catch(e){ toast('Xatolik: '+(e.code||e.message),true); }
    btn.disabled=false; btn.textContent='Hisob-fakturalar yaratish';
  });
  $('#pm-month').addEventListener('change',load);
  // Summa maydonini kiritilganda birliklarga ajratib ko'rsatadi (2 900 000)
  const amtEl=$('#pm-amount'); if(amtEl) amtEl.addEventListener('input',()=>{ const d=amtEl.value.replace(/\D/g,''); amtEl.value = d.replace(/\B(?=(\d{3})+(?!\d))/g,' '); });
  load();
}

/* ---- Modal utils ---- */
function openModal(){ $('#modal-bg').classList.add('show'); }
function closeModal(){ $('#modal-bg').classList.remove('show'); $('#modal').innerHTML=''; }
$('#modal-bg').addEventListener('click', e=>{ if(e.target===$('#modal-bg')) closeModal(); });
addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
</script>
</body>

    kb:[
      {keywords:["python","piton","dasturlash tili"],topic:"Python",answer:"Python — o‘rganish oson, keng qo‘llaniladigan dasturlash tili. U sun’iy intellekt, veb, ilmiy hisob va avtomatlashtirishda ishlatiladi. Oddiy sintaksisi tufayli boshlovchilar uchun juda mos."},
      {keywords:["cpr","reanimatsiya","yurak o‘pka","kokrakka bosish"],topic:"CPR",answer:"CPR (yurak-o‘pka reanimatsiyasi) nafas va yurak to‘xtaganda qo‘llaniladi. Kattalarda ko‘krak markaziga daqiqasiga 100–120 marta, 5–6 sm chuqurlikda bosiladi. Doim avval 103 ni chaqiring va amaliy ko‘nikmani rasmiy kursda o‘rganing."},
      {keywords:["fhir","hl7","standart","ma’lumot almashinuvi"],topic:"FHIR",answer:"FHIR — HL7 ning zamonaviy tibbiy ma’lumot almashinuv standarti. U ma’lumotni «resurslar» ko‘rinishida, veb (JSON/REST) orqali almashadi va turli tizimlarni bir-biriga bog‘laydi."},
      {keywords:["html","css","farq"],topic:"HTML va CSS",answer:"HTML sahifaning tuzilmasini (sarlavha, matn, havola) belgilaydi; CSS esa uning ko‘rinishini (rang, o‘lcham, joylashuv) bezaydi. Sodda qilib aytganda, HTML — skelet, CSS — kiyim."},
      {keywords:["antibiotik","bakteriya","infeksiya"],topic:"Antibiotiklar",answer:"Antibiotiklar faqat bakterial infeksiyalarga ta’sir qiladi, viruslarga emas. Kursni oxirigacha, shifokor ko‘rsatmasi bo‘yicha tugatish kerak, aks holda bakteriyalar dorilarga chidamli bo‘lib qoladi."},
      {keywords:["sql","ma’lumotlar bazasi","sorov","select"],topic:"SQL",answer:"SQL — ma’lumotlar bazasi bilan ishlash tili. Asosiy buyruqlar: SELECT (o‘qish), INSERT (qo‘shish), UPDATE (yangilash), DELETE (o‘chirish). Masalan: SELECT ism FROM bemorlar."},
      {keywords:["ehr","emr","elektron karta","bemor kartasi"],topic:"EHR va EMR",answer:"EMR — bitta klinikadagi elektron bemor kartasi. EHR — muassasalar o‘rtasida almashinadigan kengroq sog‘liq yozuvi. Ikkalasi ham qog‘oz kartani almashtirib, ma’lumotni tez va xavfsiz topishga yordam beradi."},
      {keywords:["cpu","protsessor"],topic:"CPU",answer:"CPU (protsessor) — kompyuterning «miyasi». U barcha hisob-kitob va buyruqlarni bajaradi. Tezligi gigagerts (GHz) da o‘lchanadi."},
      {keywords:["ram","xotira"],topic:"RAM",answer:"RAM — vaqtincha, tez xotira. Ochiq dasturlar shu yerda ishlaydi va quvvat o‘chsa ma’lumot yo‘qoladi. SSD yoki HDD esa doimiy saqlash uchun ishlatiladi."},
      {keywords:["shok","holat"],topic:"Shok",answer:"Shok — a’zolarga yetarli qon bormayotgan xavfli holat. Belgilari: rangpar sovuq teri, tez va kuchsiz puls, holsizlik. Bemorni yotqizing, isiting va darhol 103 ni chaqiring."},
      {keywords:["kuyish","kuydi","olov"],topic:"Kuyish",answer:"Kuygan joyni 10–20 daqiqa oqar salqin suv ostida ushlang. Muz qo‘ymang, moy yoki tish pastasi surtmang, pufakni yormang. Katta yoki chuqur kuyishda tez yordamga murojaat qiling."},
      {keywords:["dicom","tasvir","rentgen","mrt"],topic:"DICOM",answer:"DICOM — tibbiy tasvirlarni (rentgen, KT, MRT) saqlash va almashish standarti. Tasvir bilan birga bemor ma’lumotini ham saqlaydi. PACS tizimi bu tasvirlarni boshqaradi."},
      {keywords:["ai","sun’iy intellekt","ml","mashina o‘qitish"],topic:"Tibbiyotda AI",answer:"Sun’iy intellekt tibbiyotda tasvir tahlili, bashorat va qaror qo‘llab-quvvatlashda yordam beradi. Biroq u shifokorni almashtirmaydi — yakuniy qaror malakali mutaxassis zimmasida."},
      {keywords:["telemeditsina","masofa","videokonsultatsiya"],topic:"Telemeditsina",answer:"Telemeditsina — masofadan turib tibbiy xizmat ko‘rsatish: videokonsultatsiya, masofaviy kuzatuv va onlayn retsept. Ayniqsa uzoq hududlar va harakatlanishi qiyin bemorlar uchun foydali."},
      {keywords:["terminologiya","atama","prefiks","suffiks","ildiz"],topic:"Tibbiy terminologiya",answer:"Tibbiy atamalar prefiks (old qism), ildiz (asosiy ma’no) va suffiksdan tuziladi. Masalan: gastrit = gastr (oshqozon) + itis (yallig‘lanish). Qismlarni bilib, notanish atamani tushunish mumkin."},
      {keywords:["dns"],topic:"DNS",answer:"DNS (Domain Name System) domen nomini (masalan google.com) IP-manzilga o‘giradi. Bu bizga raqamli manzillarni eslab qolmasdan saytlarga kirish imkonini beradi."},
      {keywords:["parol","xavfsizlik","kiberxavfsizlik"],topic:"Parol xavfsizligi",answer:"Kuchli parol uzun, murakkab (harf, raqam, belgi) va har bir hisob uchun noyob bo‘lishi kerak. Ikki bosqichli tasdiqlashni yoqing va parolni hech kim bilan ulashmang."},
      {keywords:["hipaa","gdpr","maxfiylik","maxfiy"],topic:"Ma’lumot maxfiyligi",answer:"Bemor ma’lumoti qonun bilan himoyalangan (masalan HIPAA, GDPR). Uni himoya qilish uchun kirish nazorati, shifrlash, audit jurnali va zaxira nusxalardan foydalaniladi."},
      {keywords:["srs","kartochka","takrorlash","interval"],topic:"SRS va takrorlash",answer:"SRS (interval takrori) — atamalarni uzoq muddat eslab qolishning samarali usuli. Yaxshi bilgan kartochkalar kamroq, qiyinlari tez-tez ko‘rsatiladi. Har kuni oz-ozdan takrorlash eng yaxshi natija beradi."},
      {keywords:["streak","ketma-ket","kun","seriya"],topic:"Streak",answer:"Streak — ketma-ket faol kunlar soni. Har kuni kamida bir dars yoki kartochka bilan shug‘ullansangiz, streak oshadi. Bu o‘rganishni odatga aylantirishga yordam beradi."},
      {keywords:["qanday boshlayman","boshlash","qayerdan"],topic:"Qayerdan boshlash",answer:"Bosh sahifadan «Davom etish» tugmasini bosing yoki Kurslar bo‘limidan o‘zingizga qiziq yo‘nalishni tanlang. Har darsdan keyin kartochka va test bilan bilimingizni mustahkamlang."},
      {keywords:["vena","arteriya","qon tomir","kapillyar"],topic:"Qon tomirlar",answer:"Arteriyalar qonni yurakdan a’zolarga olib boradi, venalar esa qonni yurakka qaytaradi. Kapillyarlar — eng mayda tomirlar bo‘lib, modda almashinuvi aynan shu yerda kechadi."},
      {keywords:["icd","kasallik kodi","kodlash","loinc","snomed"],topic:"ICD va kodlash",answer:"ICD-10/11 — kasalliklar va tashxislarning xalqaro klassifikatsiyasi. Kodlash tizimlari (ICD, LOINC, SNOMED) tibbiy tushunchalarga yagona kod berib, hisobot va tahlilni osonlashtiradi."},
      {keywords:["doza","dori miqdori","dozalash"],topic:"Doza",answer:"Doza — bir marta yoki bir kunda qabul qilinadigan dori miqdori. U yosh, vazn va holatga qarab belgilanadi. Dorini faqat shifokor ko‘rsatmasi bo‘yicha, ko‘rsatilgan dozada qabul qiling."},
      {keywords:["iqror","platforma","maktab","school","haqida"],topic:"Iqror IT MED School haqida",answer:"Iqror IT MED School — IT, tibbiyot va tibbiy informatikani o‘rgatuvchi oflayn platforma. Bu yerda darslar, takrorlash kartochkalari (SRS), testlar va AI murabbiy mavjud. Ma’lumotlaringiz shu qurilmada saqlanadi."}
    ]
  };

  /* ---- Qisqa yordamchilar ---- */
  const $ = (s,r=document)=>r.querySelector(s);
  const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const page = $('#page');
  const DAY = 86400000;
  const todayStr = () => new Date().toISOString().slice(0,10);

  /* ---- Indekslar ---- */
  const TRACK_BY_ID = Object.fromEntries(DB.tracks.map(t=>[t.id,t]));
  const ALL_LESSONS = [];
  const LESSON_BY_ID = {};
  DB.tracks.forEach(t=>t.modules.forEach(m=>m.lessons.forEach(l=>{
    const rec={...l,trackId:t.id,moduleId:m.id,moduleTitle:m.title};
    ALL_LESSONS.push(rec); LESSON_BY_ID[l.id]=rec;
  })));
  const CARD_BY_ID = Object.fromEntries(DB.cards.map(c=>[c.id,c]));

  /* ---- Holat (localStorage) ---- */
  const LS_KEY='iqror_state_v1';
  function baseState(){return{profile:{name:''},xp:0,streak:{count:0,last:null},done:{},srs:{},quizBest:{},badges:[],settings:{theme:'dark'},tutorLog:[],created:todayStr(),activeDays:[]};}
  let state = loadState();
  function loadState(){
    const s=baseState();
    try{const raw=JSON.parse(localStorage.getItem(LS_KEY)||'{}');Object.assign(s,raw);
      s.profile={...baseState().profile,...(raw.profile||{})};
      s.streak={...baseState().streak,...(raw.streak||{})};
      s.settings={...baseState().settings,...(raw.settings||{})};
      s.done=raw.done||{};s.srs=raw.srs||{};s.quizBest=raw.quizBest||{};s.badges=raw.badges||[];s.tutorLog=raw.tutorLog||[];s.activeDays=raw.activeDays||[];
    }catch(e){/* buzilgan bo'lsa toza holat */}
    return s;
  }
  const save=()=>{
    try{state.updatedAt=Date.now();localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}
    try{if(window.IqrorCloud&&window.IqrorCloud.onLocalChange)window.IqrorCloud.onLocalChange();}catch(e){}
  };

  /* ---- Holatlarni birlashtirish (lokal + bulut) ---- */
  function mergeStates(a,b){
    if(!b)return a; if(!a)return b;
    const m=Object.assign(baseState(),a);
    m.xp=Math.max(a.xp||0,b.xp||0);
    m.done=Object.assign({},b.done||{},a.done||{});
    m.srs=Object.assign({},b.srs||{});
    for(const k in (a.srs||{})){const x=a.srs[k],y=(b.srs||{})[k];m.srs[k]=(!y||(x.seen||0)>=(y.seen||0))?x:y;}
    m.quizBest={};[...new Set([...Object.keys(a.quizBest||{}),...Object.keys(b.quizBest||{})])].forEach(k=>m.quizBest[k]=Math.max((a.quizBest||{})[k]||0,(b.quizBest||{})[k]||0));
    m.badges=[...new Set([...(a.badges||[]),...(b.badges||[])])];
    m.activeDays=[...new Set([...(a.activeDays||[]),...(b.activeDays||[])])];
    const as=a.streak||{count:0,last:null},bs=b.streak||{count:0,last:null};
    m.streak=(String(as.last||'')>=String(bs.last||''))?{...as}:{...bs};
    m.profile=Object.assign({},b.profile||{},a.profile||{}); if(!m.profile.name)m.profile.name=(b.profile&&b.profile.name)||'';
    m.settings=a.settings||b.settings||{theme:'dark'};
    m.tutorLog=(a.tutorLog&&a.tutorLog.length)?a.tutorLog:(b.tutorLog||[]);
    m.created=(a.created&&b.created)?(a.created<b.created?a.created:b.created):(a.created||b.created||todayStr());
    m.updatedAt=Math.max(a.updatedAt||0,b.updatedAt||0);
    return m;
  }

  /* ---- Bulut moduli bilan ko‘prik ---- */
  let cloudStatus={s:'offline',t:'Oflayn'};
  window.IqrorApp={
    getState:()=>state,
    mergeStates,
    applyCloudState(obj){if(!obj)return;state=Object.assign(baseState(),obj);save();applyTheme();refreshHeader();checkBadges();toast('☁️ Bulut bilan sinxronlandi');router();},
    setCloudStatus(s,t){cloudStatus={s,t};const pill=$('#cloud-pill'),txt=$('#cloud-txt');
      if(pill&&txt){pill.classList.remove('hide');txt.textContent=t;pill.style.borderColor=s==='synced'?'var(--ok)':(s==='error'?'var(--bad)':'var(--border2)');}
      const ps=$('#pf-cloud-status');if(ps)ps.textContent=t;
      const so=$('#pf-signout');if(so)so.classList.toggle('hide',!(s==='synced'||s==='connecting'));}
  };

  /* ---- XP / daraja / streak ---- */
  const LEVELS=['Yangi o‘quvchi','Boshlovchi','Amaliyotchi','Malakali','Mutaxassis','Ekspert','Ustoz'];
  const levelOf = xp => Math.min(LEVELS.length-1, Math.floor(Math.sqrt(xp/60)));
  const xpForLevel = lv => Math.ceil(lv*lv*60);
  function addXp(n){state.xp=Math.max(0,(state.xp|0)+n);save();refreshHeader();}
  function markActiveToday(){
    const t=todayStr();
    if(!state.activeDays.includes(t))state.activeDays.push(t);
    if(state.streak.last===t)return;
    const y=new Date(Date.now()-DAY).toISOString().slice(0,10);
    state.streak.count = (state.streak.last===y)?(state.streak.count+1):1;
    state.streak.last=t;save();refreshHeader();checkBadges();
  }
  function refreshHeader(){
    $('#xp-val').textContent=state.xp|0;
    $('#streak-val').textContent=state.streak.count|0;
  }

  /* ---- SRS: SM-2 algoritmi ---- */
  function srsState(id){return state.srs[id];}
  function isDue(id){const s=state.srs[id];return !s || (s.due||0)<=Date.now();}
  function dueCards(){return DB.cards.filter(c=>isDue(c.id));}
  function newCards(){return DB.cards.filter(c=>!state.srs[c.id]);}
  function gradeCard(id,q){ // q: 0=Bilmadim,3=Qiyin,4=Yaxshi,5=Oson
    let s=state.srs[id]||{ef:2.5,interval:0,reps:0,lapses:0,due:0,seen:0};
    s.seen=(s.seen||0)+1;
    if(q<3){s.reps=0;s.interval=1;s.lapses=(s.lapses||0)+1;}
    else{
      s.reps=(s.reps||0)+1;
      if(s.reps===1)s.interval=1;
      else if(s.reps===2)s.interval=6;
      else s.interval=Math.max(1,Math.round(s.interval*s.ef));
      s.ef=Math.max(1.3, s.ef + (0.1-(5-q)*(0.08+(5-q)*0.02)));
    }
    s.due=Date.now()+s.interval*DAY;
    state.srs[id]=s;addXp(q>=4?3:2);markActiveToday();save();
  }
  function srsStats(){
    const total=DB.cards.length;
    const learned=DB.cards.filter(c=>{const s=state.srs[c.id];return s&&s.reps>=2;}).length;
    return{total,learned,due:dueCards().length,seen:Object.keys(state.srs).length};
  }

  /* ---- Progress hisob-kitobi ---- */
  const lessonDone = id => !!state.done[id];
  function moduleProgress(m){const d=m.lessons.filter(l=>lessonDone(l.id)).length;return{done:d,total:m.lessons.length,pct:m.lessons.length?Math.round(d/m.lessons.length*100):0};}
  function trackProgress(t){const ls=t.modules.flatMap(m=>m.lessons);const d=ls.filter(l=>lessonDone(l.id)).length;return{done:d,total:ls.length,pct:ls.length?Math.round(d/ls.length*100):0};}
  function overallProgress(){const d=ALL_LESSONS.filter(l=>lessonDone(l.id)).length;return{done:d,total:ALL_LESSONS.length,pct:ALL_LESSONS.length?Math.round(d/ALL_LESSONS.length*100):0};}
  function completeLesson(id){
    if(lessonDone(id))return false;
    state.done[id]=Date.now();addXp(50);markActiveToday();save();checkBadges();return true;
  }

  /* ---- Yutuqlar (badges) ---- */
  const BADGES=[
    {id:'first-lesson',em:'🎓',t:'Birinchi qadam',d:'Birinchi darsni tugatdingiz',test:()=>overallProgress().done>=1},
    {id:'five-lessons',em:'📖',t:'Bilim ishqibozi',d:'5 ta dars tugatildi',test:()=>overallProgress().done>=5},
    {id:'track-it',em:'💻',t:'IT bilimdoni',d:'IT yo‘nalishini yakunladingiz',test:()=>{const t=TRACK_BY_ID.it;return t&&trackProgress(t).pct===100;}},
    {id:'track-med',em:'🩺',t:'Tibbiyot bilimdoni',d:'Tibbiyot yo‘nalishini yakunladingiz',test:()=>{const t=TRACK_BY_ID.med;return t&&trackProgress(t).pct===100;}},
    {id:'srs-50',em:'🗂️',t:'Kartochka ustasi',d:'50 marta kartochka takrorlandi',test:()=>Object.values(state.srs).reduce((n,s)=>n+(s.seen||0),0)>=50},
    {id:'quiz-perfect',em:'💯',t:'Mukammal test',d:'Testda 100% ball',test:()=>Object.values(state.quizBest).some(v=>v>=100)},
    {id:'streak-3',em:'🔥',t:'Barqarorlik',d:'3 kun ketma-ket',test:()=>state.streak.count>=3},
    {id:'streak-7',em:'⭐',t:'Bir hafta',d:'7 kun ketma-ket',test:()=>state.streak.count>=7},
    {id:'graduate',em:'🏅',t:'Bitiruvchi',d:'Barcha darslar tugatildi',test:()=>overallProgress().pct===100},
  ];
  function checkBadges(){
    let gained=null;
    BADGES.forEach(b=>{if(!state.badges.includes(b.id)&&b.test()){state.badges.push(b.id);gained=b;}});
    if(gained){save();toast(`🏆 Yangi yutuq: ${gained.t}`);}
  }

  /* ---- Toast ---- */
  function toast(msg,ms=2600){
    const el=document.createElement('div');el.className='toast';el.textContent=msg;
    $('#toasts').appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},ms);
  }

  /* ---- Mavzu (theme) ---- */
  function applyTheme(){
    document.documentElement.dataset.theme=state.settings.theme;
    $('#btn-theme').textContent=state.settings.theme==='dark'?'🌙':'☀️';
    $('meta[name=theme-color]').setAttribute('content',state.settings.theme==='dark'?'#0a0f1e':'#eef2f9');
  }
  $('#btn-theme').addEventListener('click',()=>{state.settings.theme=state.settings.theme==='dark'?'light':'dark';save();applyTheme();});

  /* =========================================================================
     ROUTER
     ========================================================================= */
  const routes={home:renderHome,courses:renderCourses,track:renderTrack,lesson:renderLesson,srs:renderSRS,quiz:renderQuiz,tutor:renderTutor,achievements:renderAchievements,profile:renderProfile};
  function parseHash(){const h=(location.hash||'#home').slice(1);return h.split('/').map(x=>{try{return decodeURIComponent(x);}catch(e){return x;}});}
  function router(){
    const parts=parseHash();const sec=parts[0]||'home';
    $$('#sidenav a, #mobnav a').forEach(a=>a.classList.toggle('active',a.dataset.sec===sec));
    (routes[sec]||renderHome)(parts.slice(1));
    page.scrollIntoView({block:'start'});window.scrollTo({top:0,behavior:'instant'in window?'instant':'auto'});
  }
  addEventListener('hashchange',router);
  const go=h=>{location.hash=h;};
  window.go=go;

  /* =========================================================================
     SAHIFALAR
     ========================================================================= */
  function trackChip(t){return `<span class="chip ${t.id}">${t.icon} ${esc(t.title)}</span>`;}

  function renderHome(){
    const ov=overallProgress();const lv=levelOf(state.xp);const ss=srsStats();
    const next=ALL_LESSONS.find(l=>!lessonDone(l.id));
    const curLvXp=xpForLevel(lv),nextLvXp=xpForLevel(lv+1);
    const lvPct=Math.min(100,Math.round((state.xp-curLvXp)/Math.max(1,nextLvXp-curLvXp)*100));
    const hi = state.profile.name?`, ${esc(state.profile.name)}`:'';
    page.innerHTML=`
      <section class="card" style="background:
        radial-gradient(700px 300px at 90% -30%,rgba(59,130,246,.18),transparent),
        linear-gradient(180deg,var(--panel),var(--panel2))">
        <div class="kicker">Iqror IT MED School</div>
        <h1 style="font-size:clamp(1.5rem,3vw,2.1rem);margin-top:6px">Xush kelibsiz${hi}! 👋</h1>
        <p class="lead" style="max-width:640px">IT, tibbiyot va tibbiy informatikani bitta joyda o‘rganing — darslar, takrorlash kartochkalari (SRS), testlar va AI murabbiy bilan. Hammasi oflayn ishlaydi.</p>
        <div class="row" style="margin-top:6px">
          ${next?`<button class="btn primary" onclick="go('lesson/${next.trackId}/${next.moduleId}/${next.id}')">▶ Davom etish: ${esc(next.title)}</button>`
                :`<button class="btn primary" onclick="go('courses')">Kurslarni ko‘rish</button>`}
          <button class="btn" onclick="go('srs')">🗂️ Bugungi takrorlash (${ss.due})</button>
        </div>
      </section>

      <div class="grid g4" style="margin-top:16px">
        <div class="card stat"><div class="ic">📚</div><div class="n">${ov.done}/${ov.total}</div><div class="l">Tugatilgan darslar</div></div>
        <div class="card stat"><div class="ic">🗂️</div><div class="n">${ss.learned}</div><div class="l">O‘zlashtirilgan kartochka</div></div>
        <div class="card stat"><div class="ic">🔥</div><div class="n">${state.streak.count}</div><div class="l">Ketma-ket kun</div></div>
        <div class="card stat" role="link" tabindex="0" style="cursor:pointer" onclick="go('achievements')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();go('achievements')}"><div class="ic">🏆</div><div class="n">${state.badges.length}/${BADGES.length}</div><div class="l">Yutuqlar →</div></div>
      </div>

      <div class="grid g3" style="margin-top:16px;grid-template-columns:320px 1fr">
        <div class="card center">
          <h3>Umumiy progress</h3>
          <div class="ring" style="--p:${ov.pct};margin:12px auto"><b>${ov.pct}%</b></div>
          <div class="muted small">Daraja: <b style="color:var(--fg)">${LEVELS[lv]}</b> (${lv}-daraja)</div>
          <div class="bar" style="margin-top:10px"><i style="width:${lvPct}%"></i></div>
          <div class="faint small" style="margin-top:6px">${state.xp} XP · keyingi darajagacha ${Math.max(0,nextLvXp-state.xp)} XP</div>
        </div>
        <div class="card">
          <h3>Yo‘nalishlar</h3>
          <div class="stack" style="margin-top:6px">
            ${DB.tracks.map(t=>{const tp=trackProgress(t);return `
              <div>
                <div class="row between"><div class="row" style="gap:8px">${trackChip(t)}<span class="muted small">${tp.done}/${tp.total} dars</span></div><b>${tp.pct}%</b></div>
                <div class="bar" style="margin-top:6px;cursor:pointer" onclick="go('track/${t.id}')"><i style="width:${tp.pct}%;background:linear-gradient(90deg,${t.color},color-mix(in srgb,${t.color} 55%,#fff))"></i></div>
              </div>`;}).join('')}
          </div>
        </div>
      </div>`;
  }

  function renderCourses(){
    page.innerHTML=`
      <div class="breadcrumb">Kurslar</div>
      <h1>Kurslar</h1>
      <p class="lead">Uch yo‘nalish, ${ALL_LESSONS.length} ta dars. O‘zingizga qulay yo‘nalishdan boshlang.</p>
      <div class="grid g3" style="margin-top:14px">
        ${DB.tracks.map(t=>{const tp=trackProgress(t);return `
          <div class="card" style="border-top:3px solid ${t.color}">
            <div style="font-size:2rem">${t.icon}</div>
            <h3 style="margin-top:6px">${esc(t.title)}</h3>
            <p class="muted small">${esc(t.tagline)}</p>
            <div class="row between small" style="margin-top:8px"><span class="muted">${t.modules.length} modul · ${t.modules.flatMap(m=>m.lessons).length} dars</span><b>${tp.pct}%</b></div>
            <div class="bar" style="margin:8px 0 12px"><i style="width:${tp.pct}%;background:linear-gradient(90deg,${t.color},color-mix(in srgb,${t.color} 55%,#fff))"></i></div>
            <button class="btn block" onclick="go('track/${t.id}')">Ochish →</button>
          </div>`;}).join('')}
      </div>`;
  }

  function renderTrack(p){
    const t=TRACK_BY_ID[p[0]];if(!t){go('courses');return;}
    page.innerHTML=`
      <div class="breadcrumb"><a onclick="go('courses')">Kurslar</a> / ${esc(t.title)}</div>
      <div class="card" style="border-left:4px solid ${t.color}">
        <div class="row" style="gap:14px"><div style="font-size:2.2rem">${t.icon}</div>
          <div class="grow"><h1 style="margin:0">${esc(t.title)}</h1><p class="muted" style="margin:4px 0 0">${esc(t.tagline)}</p></div>
          <div class="center"><div class="ring" style="--p:${trackProgress(t).pct};--c:${t.color};width:84px;height:84px"><b style="font-size:1rem">${trackProgress(t).pct}%</b></div></div>
        </div>
      </div>
      <div class="stack" style="margin-top:16px">
        ${t.modules.map((m,mi)=>{const mp=moduleProgress(m);return `
          <div class="card">
            <div class="row between">
              <div><div class="kicker" style="color:${t.color}">Modul ${mi+1}</div><h3 style="margin:4px 0 0">${esc(m.title)}</h3></div>
              <div class="pill">${mp.done}/${mp.total}</div>
            </div>
            <p class="muted small" style="margin:8px 0">${esc(m.summary)}</p>
            <div class="stack" style="gap:8px">
              ${m.lessons.map((l,li)=>`
                <button class="btn ghost between" style="justify-content:space-between;width:100%" onclick="go('lesson/${t.id}/${m.id}/${l.id}')">
                  <span class="row" style="gap:10px"><span style="width:22px">${lessonDone(l.id)?'✅':(li+1)+'.'}</span><span>${esc(l.title)}</span></span>
                  <span class="muted small">${l.minutes} daqiqa →</span>
                </button>`).join('')}
            </div>
          </div>`;}).join('')}
      </div>`;

      ex.innerHTML=`<b>${pick===q.correct?'✅ To‘g‘ri!':'❌ Noto‘g‘ri'}</b><div class="muted small" style="margin-top:4px">${esc(q.explain)}</div>`;

  /* ---------- AI murabbiy ---------- */
  const norm=s=>(s||'').toLowerCase().replace(/[‘’'`.,!?:;()]/g,' ').replace(/\s+/g,' ').trim();
  function localTutor(q){
    const n=norm(q);const words=n.split(' ').filter(w=>w.length>2);
    let best=null,bestScore=0;
    for(const e of DB.kb){
      let score=0;
      for(const kw of e.keywords){const k=norm(kw);if(!k)continue;if(n.includes(k))score+=2;else if(words.some(w=>k.includes(w)||w.includes(k)))score+=1;}
      if(score>bestScore){bestScore=score;best=e;}
    }
    // atamalardan qidirish (kartochkalar)
    if(bestScore<2){
      for(const c of DB.cards){if(n.includes(norm(c.front))){return{answer:`**${c.front}** — ${c.back}`,source:'kartochka bazasi'};}}
    }
    if(best&&bestScore>=1)return{answer:best.answer,source:'oflayn bilim bazasi'};
    return{answer:'Bu savolga aniq javobim yo‘q, lekin men IT, tibbiyot va tibbiy informatika bo‘yicha yordam bera olaman. Masalan: "Python nima?", "CPR qanday bajariladi?", "FHIR nima?" deb so‘rang. Aniqroq atama yozsangiz, yaxshiroq javob beraman.',source:'oflayn'};
  }
  async function askTutor(q){
    // To'liq oflayn — mahalliy bilim bazasi va kartochkalardan javob beradi.
    return localTutor(q);
  }
  const SUGGEST=['Python nima?','CPR qanday bajariladi?','FHIR nima?','HTML va CSS farqi','Antibiotik nima?','SQL so‘rovi nima?'];
  function renderTutor(){
    page.innerHTML=`

        <div class="chatbar">
          <input id="t-input" class="grow" placeholder="Savolingizni yozing..." autocomplete="off" />

      <div class="row" style="margin-top:10px">${SUGGEST.map(s=>`<button class="btn sm" data-sg="${esc(s)}">${esc(s)}</button>`).join('')}</div>`;
    const log=$('#chatlog');
    const add=(who,text,src)=>{const d=document.createElement('div');d.className='msg '+who;
      d.innerHTML=fmt(text)+(src?`<div class="src">manba: ${esc(src)}</div>`:'');log.appendChild(d);log.scrollTop=log.scrollHeight;};
    const fmt=t=>esc(t).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    if(state.tutorLog.length)state.tutorLog.slice(-20).forEach(m=>add(m.who,m.text,m.src));
    else add('a','Assalomu alaykum! Men Iqror IT MED School murabbiyiman. Nimani o‘rganmoqchisiz?','oflayn bilim bazasi');
    const send=async()=>{
      const q=$('#t-input').value.trim();if(!q)return;$('#t-input').value='';
      add('u',q);state.tutorLog.push({who:'u',text:q});
      const {answer,source}=await askTutor(q);
      add('a',answer,source);state.tutorLog.push({who:'a',text:answer,src:source});
      state.tutorLog=state.tutorLog.slice(-40);save();markActiveToday();

    $('#t-send').addEventListener('click',send);

      if(window.IqrorCloud&&window.IqrorCloud.syncNow){toast('🔄 Sinxronlanmoqda...');try{await window.IqrorCloud.syncNow();}catch(e){}}
      else toast('Bulut hozircha mavjud emas (internet yoki Firebase sozlamasi kerak)');

    $('#pf-signout').addEventListener('click',async()=>{
      if(window.IqrorCloud&&window.IqrorCloud.signOut){await window.IqrorCloud.signOut();renderProfile();}

  <!-- Firebase bulut moduli (ixtiyoriy): analitika + anonim autentifikatsiya + Firestore sinxronlash.
       Oflayn yoki sozlanmagan bo‘lsa, ilova baribir to‘liq ishlayveradi. -->
  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyAfOT0etOb72udhI7jVOOdck-K97Fr__DA",
      authDomain: "iqror-72879.firebaseapp.com",
      projectId: "iqror-72879",
      storageBucket: "iqror-72879.firebasestorage.app",
      messagingSenderId: "1082381849678",
      appId: "1:1082381849678:web:f9a657404b83ac88c71f1f",
      measurementId: "G-LDD3BFGKVP"
    };
    const V = "https://www.gstatic.com/firebasejs/10.12.5";
    const A = () => window.IqrorApp || {};
    const setStatus = (s,t) => { try{ A().setCloudStatus && A().setCloudStatus(s,t); }catch(e){} };

    (async () => {
      let appMod, authMod, fsMod, anMod;
      try {
        setStatus('connecting','Ulanmoqda...');
        [appMod, authMod, fsMod] = await Promise.all([
          import(`${V}/firebase-app.js`),
          import(`${V}/firebase-auth.js`),
          import(`${V}/firebase-firestore.js`)
        ]);
      } catch (e) {
        // Internet yo‘q yoki CDN bloklangan — jimgina oflayn rejim
        setStatus('offline','Oflayn rejim');
        return;
      }

      try {
        const app = appMod.initializeApp(firebaseConfig);
        // Analitika (qo‘llab-quvvatlansa)
        import(`${V}/firebase-analytics.js`).then(an => {
          try { an.isSupported().then(ok => { if (ok) an.getAnalytics(app); }).catch(()=>{}); } catch(e){}
        }).catch(()=>{});

        const auth = authMod.getAuth(app);
        const db = fsMod.getFirestore(app);
        const { onAuthStateChanged, signInAnonymously, signOut } = authMod;
        const { doc, getDoc, setDoc } = fsMod;

        let uid = null, ready = false, pushTimer = null;

        function handleErr(e){
          const code = String((e && e.code) || e || '');
          if (code.includes('permission')) setStatus('error','Sinxronlash o‘chiq (Firestore qoidalari)');
          else if (code.includes('unavailable') || code.includes('network')) setStatus('offline','Oflayn (tarmoq yo‘q)');
          else setStatus('error','Ulanish xatosi');
        }
        async function pushNow(){
          if (!uid) return;
          try {
            const st = A().getState ? A().getState() : null;
            if (!st) return;
            await setDoc(doc(db,'progress',uid), JSON.parse(JSON.stringify(st)));
            setStatus('synced','Sinxron ✓');
          } catch (e) { handleErr(e); }
        }
        async function pullMerge(){
          if (!uid) return;
          try {
            const snap = await getDoc(doc(db,'progress',uid));
            if (snap.exists()) {
              const cloud = snap.data();
              const local = A().getState ? A().getState() : null;
              const merged = A().mergeStates ? A().mergeStates(local, cloud) : cloud;
              A().applyCloudState && A().applyCloudState(merged);
            }
          } catch (e) { handleErr(e); }
        }

        window.IqrorCloud = {
          onLocalChange(){ if (!ready || !uid) return; clearTimeout(pushTimer); pushTimer = setTimeout(pushNow, 1500); },
          async syncNow(){ await pullMerge(); await pushNow(); },
          async signOut(){ try { await signOut(auth); setStatus('offline','Chiqildi'); } catch(e){} },
          isReady: () => ready
        };

        onAuthStateChanged(auth, async (user) => {
          if (user) { uid = user.uid; ready = true; setStatus('connecting','Sinxronlanmoqda...'); await pullMerge(); await pushNow(); }
          else { uid = null; ready = false; setStatus('offline','Oflayn (kirilmagan)'); }
        });

        // Anonim kirish (Firebase konsolida yoqilgan bo‘lsa)
        signInAnonymously(auth).catch((e) => {
          if (String(e && e.code).includes('operation-not-allowed'))
            setStatus('offline','Anonim kirish o‘chiq (Firebase sozlang)');
          else setStatus('offline','Oflayn rejim');
        });
      } catch (e) {
        setStatus('offline','Oflayn rejim');
      }
    })();
  </script>

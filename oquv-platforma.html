<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Iqror IT MED School — IT va Tibbiyot o‘quv platformasi</title>
  <meta name="description" content="Iqror IT MED School — IT, tibbiyot va tibbiy informatika bo‘yicha oflayn ishlaydigan o‘quv platformasi (darslar, SRS kartochkalar, testlar, AI murabbiy)." />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230ea5e9'/%3E%3Cpath d='M32 14v36M14 32h36' stroke='white' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    :root{
      --bg:#0a0f1e; --bg2:#0c1226; --panel:#111a30; --panel2:#0e1729; --elev:#152140;
      --fg:#e8edf6; --muted:#93a1b8; --faint:#64748b;
      --border:#1e2b4d; --border2:#26365e;
      --it:#3b82f6; --med:#10b981; --minf:#a78bfa;
      --accent:#0ea5e9; --accent2:#22d3ee;
      --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444;
      --ring:rgba(14,165,233,.35);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
    }
    :root[data-theme="light"]{
      --bg:#eef2f9; --bg2:#e6ecf6; --panel:#ffffff; --panel2:#f5f8fd; --elev:#ffffff;
      --fg:#0f1b34; --muted:#4a5a75; --faint:#7286a3;
      --border:#dbe4f1; --border2:#c9d6ea;
      --ring:rgba(14,165,233,.25);
      --shadow:0 10px 30px rgba(20,40,80,.10);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:
        radial-gradient(1000px 600px at 100% -10%, rgba(59,130,246,.14), transparent 60%),
        radial-gradient(900px 500px at -10% 10%, rgba(16,185,129,.12), transparent 55%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      background-attachment:fixed;
      color:var(--fg);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      line-height:1.55; min-height:100dvh; overflow-x:hidden;
    }
    a{color:inherit}
    h1,h2,h3,h4{line-height:1.25;margin:0 0 .4em}
    p{margin:0 0 .7em}
    .muted{color:var(--muted)} .faint{color:var(--faint)} .small{font-size:.85rem}
    .wrap{max-width:1240px;margin:0 auto;padding:16px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .between{justify-content:space-between}
    .stack{display:flex;flex-direction:column;gap:12px}
    .hide{display:none!important}
    .grow{flex:1}
    .center{text-align:center}

    /* Header */
    header.top{position:sticky;top:0;z-index:40;backdrop-filter:blur(12px);
      background:color-mix(in srgb,var(--bg) 72%, transparent);border-bottom:1px solid var(--border)}
    .brand{display:flex;gap:10px;align-items:center;text-decoration:none}
    .logo{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:0 0 auto;
      background:linear-gradient(135deg,var(--it),var(--med));box-shadow:var(--shadow);color:#fff;font-weight:800;position:relative;overflow:hidden}
    .logo svg{width:24px;height:24px}
    .brand b{font-size:1.05rem;letter-spacing:.2px;display:block}
    .brand .tag{font-size:.72rem;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
    .icon-btn{border:1px solid var(--border2);background:var(--panel);color:var(--fg);border-radius:12px;
      width:40px;height:40px;display:grid;place-items:center;cursor:pointer;font-size:1.05rem;transition:.15s}
    .icon-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 12px;border-radius:999px;border:1px solid var(--border2);
      background:var(--panel);font-weight:600;font-size:.85rem}

    /* Layout */
    main.shell{display:grid;grid-template-columns:250px 1fr;gap:18px;max-width:1240px;margin:0 auto;padding:18px 16px 60px}
    nav.side{position:sticky;top:80px;align-self:start;display:flex;flex-direction:column;gap:6px;max-height:calc(100dvh - 96px);overflow:auto}
    nav.side a{display:flex;gap:10px;align-items:center;padding:11px 13px;border-radius:12px;border:1px solid transparent;
      color:var(--muted);text-decoration:none;font-weight:600;transition:.15s}
    nav.side a .ic{width:22px;text-align:center}
    nav.side a:hover{background:var(--panel);color:var(--fg)}
    nav.side a.active{background:var(--panel);color:var(--fg);border-color:var(--border2);box-shadow:var(--shadow)}
    nav.side a.active .ic{filter:drop-shadow(0 0 6px var(--ring))}
    .side-foot{margin-top:10px;padding:12px;border:1px solid var(--border);border-radius:14px;background:var(--panel2)}

    /* Cards & components */
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
    .card.tight{padding:14px}
    .grid{display:grid;gap:16px}
    .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
    .g-auto{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
    @media(max-width:1040px){main.shell{grid-template-columns:1fr}nav.side{display:none}}
    @media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}.wrap{padding:12px}}
    @media(max-width:920px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}

    .btn{border:1px solid var(--border2);background:var(--panel);color:var(--fg);border-radius:12px;padding:10px 16px;
      cursor:pointer;font-weight:600;font-size:.92rem;transition:.15s;display:inline-flex;gap:8px;align-items:center;text-decoration:none}
    .btn:hover{border-color:var(--accent);transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#04121e;border:none}
    .btn.ghost{background:transparent}
    .btn.sm{padding:7px 12px;font-size:.85rem;border-radius:10px}
    .btn.block{width:100%;justify-content:center}
    .btn.ok{background:var(--ok);color:#04160a;border:none}
    .btn.bad{background:var(--bad);color:#fff;border:none}

    .chip{display:inline-flex;gap:6px;align-items:center;padding:4px 10px;border-radius:999px;font-size:.76rem;font-weight:700;
      border:1px solid var(--border2);background:var(--panel)}
    .chip.it{color:var(--it);border-color:color-mix(in srgb,var(--it) 45%,var(--border2))}
    .chip.med{color:var(--med);border-color:color-mix(in srgb,var(--med) 45%,var(--border2))}
    .chip.minf{color:var(--minf);border-color:color-mix(in srgb,var(--minf) 45%,var(--border2))}

    .bar{height:9px;border-radius:999px;background:var(--elev);overflow:hidden;border:1px solid var(--border)}
    .bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s ease}

    .ring{--p:0;--c:var(--accent);width:120px;height:120px;border-radius:50%;display:grid;place-items:center;
      background:radial-gradient(closest-side,var(--panel) 78%,transparent 79%),
        conic-gradient(var(--c) calc(var(--p)*1%),var(--elev) 0);position:relative}
    .ring b{font-size:1.5rem}

    .stat{padding:16px}
    .stat .n{font-size:1.9rem;font-weight:800;line-height:1}
    .stat .l{color:var(--muted);font-size:.82rem;margin-top:6px}
    .stat .ic{font-size:1.3rem}

    .lead{font-size:1.05rem;color:var(--muted)}
    .kicker{text-transform:uppercase;letter-spacing:1.5px;font-size:.72rem;color:var(--accent);font-weight:800}

    /* Lesson content */
    .prose h3{margin-top:1.1em}
    .prose ul{margin:.2em 0 .9em;padding-left:1.2em}
    .prose li{margin:.25em 0}
    .prose code, pre{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    pre{background:#050a16;border:1px solid var(--border);border-radius:12px;padding:14px;overflow:auto;font-size:.86rem;color:#d6e2ff}
    :root[data-theme="light"] pre{background:#0d1730;color:#dbe6ff}
    .note{border-left:4px solid var(--warn);background:color-mix(in srgb,var(--warn) 10%,transparent);
      padding:10px 14px;border-radius:0 10px 10px 0;margin:.5em 0}
    .objectives{list-style:none;padding:0;margin:0}
    .objectives li{padding:8px 0 8px 30px;position:relative;border-bottom:1px dashed var(--border)}
    .objectives li:before{content:"✓";position:absolute;left:4px;color:var(--ok);font-weight:800}
    .termcard{border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--panel2)}
    .termcard b{color:var(--accent2)}

    /* Flashcard */
    .flash-wrap{perspective:1400px;max-width:520px;margin:0 auto}
    .flash{position:relative;height:280px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.7,.2,1);cursor:pointer}
    .flash.flip{transform:rotateY(180deg)}
    .flash .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;border:1px solid var(--border2);
      display:grid;place-items:center;text-align:center;padding:26px;background:linear-gradient(180deg,var(--panel),var(--panel2));box-shadow:var(--shadow)}
    .flash .back{transform:rotateY(180deg);background:linear-gradient(180deg,var(--elev),var(--panel))}
    .flash .face .q{font-size:1.5rem;font-weight:700}
    .flash .face .a{font-size:1.12rem}

    /* Quiz */
    .opt{display:block;width:100%;text-align:left;border:1px solid var(--border2);background:var(--panel);color:var(--fg);
      padding:13px 15px;border-radius:12px;cursor:pointer;margin-bottom:10px;transition:.15s;font-weight:500}
    .opt:hover:not(:disabled){border-color:var(--accent);background:var(--elev)}
    .opt.correct{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 18%,transparent)}
    .opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 16%,transparent)}
    .opt:disabled{cursor:default}

    /* Chat */
    .chat{display:flex;flex-direction:column;height:min(60dvh,460px);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .chatlog{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--panel2)}
    .msg{max-width:82%;padding:10px 14px;border-radius:14px;white-space:pre-wrap}
    .msg.u{align-self:flex-end;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#04121e;border-bottom-right-radius:4px}
    .msg.a{align-self:flex-start;background:var(--elev);border:1px solid var(--border);border-bottom-left-radius:4px}
    .msg .src{font-size:.7rem;color:var(--muted);margin-top:6px}
    .chatbar{display:flex;gap:8px;padding:10px;background:var(--panel);border-top:1px solid var(--border)}
    input,select,textarea{font:inherit;color:var(--fg);background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px}
    input:focus,select:focus,textarea:focus{outline:2px solid var(--ring);outline-offset:1px;border-color:var(--accent)}

    .badge{display:flex;gap:12px;align-items:center;padding:14px;border:1px solid var(--border);border-radius:14px;background:var(--panel2)}
    .badge .em{font-size:1.8rem;filter:grayscale(1);opacity:.4}
    .badge.on .em{filter:none;opacity:1}
    .badge.on{border-color:color-mix(in srgb,var(--accent) 40%,var(--border))}

    /* Toast */
    #toasts{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
    .toast{background:var(--elev);border:1px solid var(--border2);color:var(--fg);padding:11px 18px;border-radius:12px;box-shadow:var(--shadow);
      animation:pop .25s ease}
    @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    /* Mobile bottom nav */
    .mobnav{display:none}
    @media(max-width:1040px){
      .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:color-mix(in srgb,var(--bg) 85%,transparent);
        backdrop-filter:blur(12px);border-top:1px solid var(--border);justify-content:space-around;padding:6px max(8px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom))}
      .mobnav a{flex:1;text-align:center;color:var(--muted);text-decoration:none;font-size:.66rem;padding:6px 2px;border-radius:10px}
      .mobnav a .ic{display:block;font-size:1.15rem;margin-bottom:1px}
      .mobnav a.active{color:var(--accent)}
      main.shell{padding-bottom:80px}
    }
    @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
    ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
    .divider{height:1px;background:var(--border);margin:14px 0}
    .breadcrumb{color:var(--muted);font-size:.85rem;margin-bottom:10px}
    .breadcrumb a{color:var(--accent);cursor:pointer;text-decoration:none}
  </style>
</head>

  <noscript><div class="wrap"><div class="card">Ilovani ishlatish uchun brauzeringizda JavaScript yoqilgan bo‘lishi kerak.</div></div></noscript>

  <script>
  "use strict";
  /* =========================================================================
     Iqror IT MED School — bir faylli (self-contained) o‘quv platformasi
     Bo‘limlar: Ma'lumot bazasi (DB) · Holat (state) · SRS (SM-2) · Router ·
     Sahifalar · Testlar · AI murabbiy · Yutuqlar · PWA/eksport
     ========================================================================= */

  /* ---- Ma'lumot bazasi (kontent) ---- */
  const DB = {
    tracks:[
      {id:"it",title:"IT yo‘nalishi",icon:"💻",color:"#3b82f6",tagline:"Kompyuter, dasturlash, veb va tarmoqlar",
        modules:[
          {id:"it-basics",title:"Kompyuter va IT asoslari",summary:"Kompyuter qanday ishlashi, apparat va dasturiy ta’minot, operatsion tizim hamda internet asoslari.",
            lessons:[
              {id:"it-basics-l1",title:"Kompyuter tuzilishi va ishlash prinsipi",minutes:8,
                objectives:["Apparat (hardware) va dasturiy (software) ta’minot farqini tushunish","Kompyuterning asosiy qismlari vazifasini bilish","Ma’lumot qanday saqlanishi va qayta ishlanishini tasavvur qilish"],
                sections:[
                  {heading:"Apparat va dasturiy ta’minot",paragraphs:["Kompyuter ikki qismdan iborat: apparat ta’minot (hardware) — qo‘l bilan ushlab bo‘ladigan fizik qurilmalar, va dasturiy ta’minot (software) — apparatni boshqaradigan dasturlar. Ular birgalikda ishlaydi: dasturiy ta’minot buyruq beradi, apparat esa bajaradi.","Masalan, brauzer — bu dastur (software), ekran va protsessor esa uni ishlatadigan apparatdir."]},
                  {heading:"Asosiy qismlar",paragraphs:["Har bir kompyuterda ma’lumotni kiritish, qayta ishlash, saqlash va chiqarish uchun bir nechta muhim qism bor."],bullets:["Protsessor (CPU) — «miya», barcha hisob-kitob va buyruqlarni bajaradi.","Operativ xotira (RAM) — vaqtincha, tez xotira; kompyuter o‘chsa tozalanadi.","Doimiy xotira (SSD/HDD) — fayllar uzoq muddat saqlanadigan joy.","Kiritish qurilmalari — klaviatura, sichqoncha; chiqarish — monitor, printer."]},
                  {heading:"Ma’lumot va ikkilik sanoq",paragraphs:["Kompyuter hamma narsani 0 va 1 (bit) ko‘rinishida saqlaydi. 8 bit = 1 bayt. Matn, rasm, video — barchasi ikkilik sanoq tizimida kodlanadi.","1024 bayt taxminan 1 kilobayt (KB), 1024 KB taxminan 1 megabayt (MB) va hokazo."]}
                ],
                summary:"Kompyuter apparat va dasturiy ta’minotdan iborat; protsessor ma’lumotni qayta ishlaydi, xotira uni saqlaydi, hamma narsa esa 0 va 1 ko‘rinishida kodlanadi.",
                terms:[{term:"CPU (protsessor)",def:"Kompyuterning barcha hisob va buyruqlarni bajaradigan asosiy qismi."},{term:"RAM",def:"Vaqtincha tez xotira; qurilma o‘chganda ma’lumot yo‘qoladi."},{term:"Bit va bayt",def:"Bit — 0 yoki 1; 8 bit = 1 bayt, ma’lumot o‘lchov birligi."},{term:"Hardware / Software",def:"Apparat — fizik qurilmalar; dasturiy — ularni boshqaruvchi dasturlar."}]},
              {id:"it-basics-l2",title:"Operatsion tizim va internet asoslari",minutes:9,
                objectives:["Operatsion tizim vazifasini tushunish","Fayl va papka tizimi bilan ishlashni bilish","Internet va veb qanday ishlashini tasavvur qilish"],
                sections:[
                  {heading:"Operatsion tizim (OS)",paragraphs:["Operatsion tizim — apparat bilan dasturlar o‘rtasidagi ko‘prik. U xotirani boshqaradi, fayllarni tartibga soladi va boshqa dasturlarni ishga tushiradi. Mashhur OS lar: Windows, macOS, Linux, Android va iOS."],bullets:["Fayllar papkalarda (kataloglarda) tartiblanadi.","Har bir faylning nomi va kengaytmasi bor: hisobot.pdf, rasm.png.","OS bir vaqtda ko‘p dasturlarni boshqaradi (multitasking)."]},
                  {heading:"Internet va veb",paragraphs:["Internet — dunyodagi kompyuterlarni bog‘lovchi global tarmoq. Veb (WWW) esa internet ustida ishlaydigan sahifalar tizimi; siz brauzer orqali veb-saytlarga kirasiz.","Har bir qurilmaning IP-manzili bor (masalan 192.168.1.5). Domen nomlari (google.com) esa IP-manzillarga DNS orqali o‘giriladi."]},
                  {heading:"Xavfsiz ishlash",paragraphs:["Internetda o‘zingizni himoya qiling."],bullets:["Kuchli va noyob parollardan foydalaning.","Noma’lum havolalarga bosmang, shubhali fayllarni yuklamang.","Muhim hisoblarda ikki bosqichli tasdiqlashni yoqing.","HTTPS (qulf belgisi) bor saytlarga ishoning."]}
                ],
                summary:"Operatsion tizim apparat va dasturlarni bog‘laydi, fayllarni boshqaradi; internet esa qurilmalarni bog‘lovchi global tarmoq bo‘lib, veb-saytlar brauzer orqali ochiladi.",
                terms:[{term:"Operatsion tizim",def:"Apparatni va dasturlarni boshqaradigan asosiy dasturiy ta’minot (Windows, Linux...)."},{term:"IP-manzil",def:"Tarmoqdagi har bir qurilmaning raqamli manzili."},{term:"DNS",def:"Domen nomlarini (google.com) IP-manzilga o‘giradigan tizim."},{term:"HTTPS",def:"Shifrlangan, xavfsiz veb-aloqa protokoli."}]}
            ]},
          {id:"it-prog",title:"Dasturlash asoslari (Python)",summary:"Algoritm tushunchasi, o‘zgaruvchilar, shartlar, sikllar va funksiyalar — Python misolida.",
            lessons:[
              {id:"it-prog-l1",title:"Algoritm, o‘zgaruvchi va ma’lumot turlari",minutes:10,
                objectives:["Algoritm nima ekanini tushunish","O‘zgaruvchi va asosiy ma’lumot turlarini bilish","Oddiy Python dasturini o‘qiy olish"],
                sections:[
                  {heading:"Algoritm nima?",paragraphs:["Algoritm — biror masalani yechish uchun aniq, ketma-ket qadamlar to‘plami. Masalan, choy damlash retsepti ham algoritmdir. Dasturlashda biz algoritmni kompyuter tushunadigan tilda yozamiz.","Yaxshi algoritm aniq, cheklangan (tugaydigan) va bir ma’noli bo‘ladi."]},
                  {heading:"O‘zgaruvchi va ma’lumot turlari",paragraphs:["O‘zgaruvchi — qiymat saqlanadigan nomlangan «quti». Python’da qiymat turi avtomatik aniqlanadi."],bullets:["int — butun son: 42","float — kasrli son: 3.14","str — matn (satr): «Salom»","bool — mantiqiy: True yoki False"],code:{lang:"python",text:"ism = \"Ali\"\nyosh = 20\nboy = 1.75\ntalaba = True\nprint(ism, yosh, boy)"}},
                  {heading:"Amallar va kiritish",paragraphs:["Sonlar ustida +, -, *, / amallarini bajarish mumkin. input() foydalanuvchidan ma’lumot oladi (u har doim matn qaytaradi, kerak bo‘lsa int() bilan songa o‘giramiz)."],code:{lang:"python",text:"a = int(input(\"Birinchi son: \"))\nb = int(input(\"Ikkinchi son: \"))\nprint(\"Yig‘indi:\", a + b)"}}
                ],
                summary:"Algoritm — masala yechish qadamlari; o‘zgaruvchilar qiymatlarni saqlaydi; Python’da asosiy turlar int, float, str va bool.",
                terms:[{term:"Algoritm",def:"Masalani yechishning aniq, ketma-ket qadamlari."},{term:"O‘zgaruvchi",def:"Qiymat saqlanadigan nomlangan xotira joyi."},{term:"Ma’lumot turi",def:"Qiymat ko‘rinishi: int, float, str, bool va boshqalar."},{term:"input() / print()",def:"input — ma’lumot olish, print — natijani ekranga chiqarish."}]},
              {id:"it-prog-l2",title:"Shartlar, sikllar va funksiyalar",minutes:11,
                objectives:["Shart operatorlari (if/else) bilan qaror qabul qilish","Sikllar (for/while) yordamida takrorlash","Funksiyalar yaratib, kodni qayta ishlatish"],
                sections:[
                  {heading:"Shartlar: if / elif / else",paragraphs:["Dastur ba’zan sharoitga qarab turli yo‘l tutishi kerak. Buning uchun if operatoridan foydalanamiz."],code:{lang:"python",text:"yosh = 18\nif yosh >= 18:\n    print(\"Voyaga yetgan\")\nelif yosh >= 13:\n    print(\"O‘smir\")\nelse:\n    print(\"Bola\")"}},
                  {heading:"Sikllar: for va while",paragraphs:["Sikl — bir amalni ko‘p marta takrorlash usuli. for ma’lum sondagi takror uchun, while esa shart bajarilguncha ishlaydi."],code:{lang:"python",text:"# 1 dan 5 gacha\nfor i in range(1, 6):\n    print(i)\n\n# shart bajarilguncha\nson = 0\nwhile son < 3:\n    print(\"Salom\")\n    son = son + 1"}},
                  {heading:"Funksiyalar",paragraphs:["Funksiya — nom berilgan kod bo‘lagi; uni istalgancha chaqirish mumkin. Bu takrorni kamaytiradi va kodni tartibli qiladi."],code:{lang:"python",text:"def salomlash(ism):\n    return \"Salom, \" + ism + \"!\"\n\nprint(salomlash(\"Dilnoza\"))"}}
                ],
                summary:"if/elif/else qaror qabul qiladi, for/while takrorlaydi, funksiyalar esa kodni qayta ishlatish va tartibga solishga yordam beradi.",
                terms:[{term:"if / else",def:"Shartga qarab turli kod bajaradigan operator."},{term:"Sikl (loop)",def:"Amalni takrorlaydigan tuzilma: for va while."},{term:"Funksiya",def:"Nomlangan, qayta ishlatiladigan kod bo‘lagi."},{term:"range()",def:"Sonlar ketma-ketligini hosil qiluvchi Python funksiyasi."}]}
            ]},
          {id:"it-web",title:"Veb-texnologiyalar",summary:"HTML tuzilma, CSS dizayn va JavaScript interaktivligi — zamonaviy veb-sahifa asoslari.",
            lessons:[
              {id:"it-web-l1",title:"HTML va CSS asoslari",minutes:10,
                objectives:["HTML yordamida sahifa tuzilmasini yaratish","CSS bilan ko‘rinishni bezash","Teg, atribut va selektor tushunchalarini bilish"],
                sections:[
                  {heading:"HTML — sahifa skeleti",paragraphs:["HTML (HyperText Markup Language) veb-sahifaning tuzilmasini belgilaydi. U teglardan iborat: <h1> sarlavha, <p> matn, <a> havola, <img> rasm. Teglar ko‘pincha ochiladi va yopiladi: <p>Matn</p>."],code:{lang:"html",text:"<!DOCTYPE html>\n<html>\n  <body>\n    <h1>Salom, dunyo!</h1>\n    <p>Bu mening birinchi sahifam.</p>\n    <a href=\"https://iqror.uz\">Havola</a>\n  </body>\n</html>"}},
                  {heading:"CSS — ko‘rinish va uslub",paragraphs:["CSS (Cascading Style Sheets) sahifaning ranglari, o‘lchamlari va joylashuvini belgilaydi. Selektor orqali elementni tanlaymiz va unga uslub beramiz."],code:{lang:"css",text:"h1 {\n  color: #0ea5e9;\n  text-align: center;\n}\np {\n  font-size: 16px;\n  line-height: 1.5;\n}"}},
                  {heading:"Responsiv dizayn",paragraphs:["Zamonaviy saytlar telefon, planshet va kompyuterda yaxshi ko‘rinishi kerak. Buning uchun moslashuvchan o‘lchamlar (%, rem) va media so‘rovlardan foydalaniladi."]}
                ],
                summary:"HTML sahifa tuzilmasini, CSS esa uning ko‘rinishini belgilaydi; responsiv dizayn sayt turli ekranlarga moslashishini ta’minlaydi.",
                terms:[{term:"HTML teg",def:"Sahifa elementini belgilovchi buyruq, masalan <p> yoki <h1>."},{term:"Atribut",def:"Tegga qo‘shimcha ma’lumot beruvchi qism, masalan href."},{term:"CSS selektor",def:"Uslub beriladigan elementni tanlaydigan qoida."},{term:"Responsiv dizayn",def:"Sahifaning turli ekran o‘lchamlariga moslashishi."}]},
              {id:"it-web-l2",title:"JavaScript bilan interaktivlik",minutes:10,
                objectives:["JavaScript vazifasini tushunish","O‘zgaruvchi va funksiyalar bilan ishlash","Sahifa elementlariga hodisa (event) qo‘shish"],
                sections:[
                  {heading:"JavaScript nima?",paragraphs:["JavaScript — veb-sahifani jonlantiruvchi dasturlash tili. HTML tuzilma, CSS ko‘rinish bersa, JavaScript harakat va mantiqni qo‘shadi: tugma bosilganda o‘zgarish, ma’lumot tekshirish, animatsiya."]},
                  {heading:"O‘zgaruvchi va funksiya",paragraphs:["O‘zgaruvchilar let/const bilan e’lon qilinadi, funksiyalar esa qayta ishlatiladigan mantiqni saqlaydi."],code:{lang:"javascript",text:"let ism = \"Aziz\";\nfunction salom(kim) {\n  return \"Salom, \" + kim + \"!\";\n}\nconsole.log(salom(ism));"}},
                  {heading:"Hodisalar (events)",paragraphs:["Foydalanuvchi harakatlariga (bosish, yozish) javob berish uchun hodisa tinglovchilar (event listener) ishlatiladi."],code:{lang:"javascript",text:"const tugma = document.querySelector(\"button\");\ntugma.addEventListener(\"click\", () => {\n  alert(\"Tugma bosildi!\");\n});"}}
                ],
                summary:"JavaScript veb-sahifaga interaktivlik qo‘shadi: o‘zgaruvchilar, funksiyalar va hodisalar orqali foydalanuvchi harakatlariga javob beradi.",
                terms:[{term:"JavaScript",def:"Veb-sahifani interaktiv qiladigan dasturlash tili."},{term:"DOM",def:"Sahifa elementlarining daraxt ko‘rinishidagi modeli."},{term:"Event listener",def:"Foydalanuvchi harakatiga javob beradigan funksiya."},{term:"console.log()",def:"Natijani brauzer konsoliga chiqaruvchi buyruq."}]}
            ]},
          {id:"it-data",title:"Ma’lumotlar bazasi va tarmoqlar",summary:"SQL va ma’lumotlar bazasi asoslari, kompyuter tarmoqlari hamda kiberxavfsizlik tamoyillari.",
            lessons:[
              {id:"it-data-l1",title:"Ma’lumotlar bazasi va SQL",minutes:10,
                objectives:["Ma’lumotlar bazasi nima ekanini tushunish","Jadval, ustun va yozuv tushunchalarini bilish","Oddiy SQL so‘rovlarini o‘qiy olish"],
                sections:[
                  {heading:"Ma’lumotlar bazasi (MB)",paragraphs:["Ma’lumotlar bazasi — tartiblangan ma’lumotlar to‘plami. Relatsion bazalarda ma’lumot jadvallarda saqlanadi: har bir jadval ustunlar (maydonlar) va qatorlar (yozuvlar)dan iborat.","Masalan, «bemorlar» jadvalida id, ism, yosh va tug‘ilgan_sana ustunlari bo‘lishi mumkin."]},
                  {heading:"SQL so‘rovlari",paragraphs:["SQL (Structured Query Language) — ma’lumotlar bazasi bilan muloqot tili. Asosiy buyruqlar: SELECT (o‘qish), INSERT (qo‘shish), UPDATE (yangilash), DELETE (o‘chirish)."],code:{lang:"sql",text:"-- Barcha bemorlarni olish\nSELECT ism, yosh FROM bemorlar\nWHERE yosh > 40\nORDER BY yosh DESC;"}},
                  {heading:"Kalitlar va bog‘lanish",paragraphs:["Har bir jadvalda noyob birlamchi kalit (primary key) bo‘ladi, u yozuvlarni farqlaydi."],bullets:["Birlamchi kalit (PRIMARY KEY) — har bir yozuvni yagona aniqlaydi.","Tashqi kalit (FOREIGN KEY) — jadvallarni o‘zaro bog‘laydi.","Indeks — qidiruvni tezlashtiradi."]}
                ],
                summary:"Ma’lumotlar bazasi ma’lumotni jadvallarda saqlaydi; SQL tili orqali biz ma’lumotni o‘qiymiz, qo‘shamiz, yangilaymiz va o‘chiramiz.",
                terms:[{term:"Jadval (table)",def:"Ustun va qatorlardan iborat ma’lumot to‘plami."},{term:"SQL",def:"Ma’lumotlar bazasi bilan ishlash tili (SELECT, INSERT...)."},{term:"Birlamchi kalit",def:"Har bir yozuvni yagona aniqlaydigan maydon."},{term:"SELECT",def:"Bazadan ma’lumot o‘qiydigan SQL buyrug‘i."}]},
              {id:"it-data-l2",title:"Kompyuter tarmoqlari va kiberxavfsizlik",minutes:10,
                objectives:["Tarmoq va uning turlarini bilish","TCP/IP va protokollar haqida tasavvurga ega bo‘lish","Asosiy kiberxavfsizlik tamoyillarini tushunish"],
                sections:[
                  {heading:"Tarmoqlar",paragraphs:["Kompyuter tarmog‘i — bir-biri bilan bog‘langan qurilmalar. LAN — mahalliy (uy, ofis), WAN — keng hududli (internet). Qurilmalar router va kommutator (switch) orqali bog‘lanadi."]},
                  {heading:"TCP/IP va protokollar",paragraphs:["Ma’lumot tarmoqda kichik bo‘laklarga (paketlar) bo‘linib uzatiladi. TCP/IP — bu jarayonni boshqaruvchi asosiy protokollar to‘plami."],bullets:["HTTP/HTTPS — veb-sahifalar uchun.","DNS — domen nomlarini IP-manzilga o‘giradi.","TCP — ma’lumotni ishonchli yetkazadi."]},
                  {heading:"Kiberxavfsizlik asoslari",paragraphs:["Kiberxavfsizlik — ma’lumot va tizimlarni ruxsatsiz kirish, o‘g‘irlash yoki buzishdan himoya qilish. Ayniqsa tibbiyotda bemor ma’lumotlari maxfiy bo‘lishi shart."],bullets:["Konfidensiallik, yaxlitlik, foydalanuvchanlik (CIA) — asosiy uch tamoyil.","Shifrlash ma’lumotni himoya qiladi.","Fishing va zararli dasturlardan ehtiyot bo‘ling."],note:"Tibbiy tizimlarda bemor ma’lumotlarini himoya qilish qonuniy talab (masalan HIPAA, GDPR)."}
                ],
                summary:"Tarmoqlar qurilmalarni bog‘laydi, TCP/IP ma’lumot almashinuvini boshqaradi; kiberxavfsizlik esa ma’lumotni himoya qilib, ayniqsa tibbiyotda muhim ahamiyatga ega.",
                terms:[{term:"LAN / WAN",def:"Mahalliy va keng hududli tarmoqlar."},{term:"TCP/IP",def:"Internetda ma’lumot uzatishning asosiy protokollari."},{term:"Shifrlash",def:"Ma’lumotni o‘qib bo‘lmaydigan holatga keltirib himoyalash."},{term:"Fishing",def:"Aldov orqali maxfiy ma’lumotni o‘g‘irlash urinishi."}]}
            ]}
        ]},
      {id:"med",title:"Tibbiyot yo‘nalishi",icon:"🩺",color:"#10b981",tagline:"Tibbiyot asoslari, anatomiya va birinchi yordam",
        modules:[
          {id:"med-term",title:"Tibbiy terminologiya va asoslar",summary:"Tibbiy atamalar tuzilishi, lotin-yunon ildizlari hamda tananing asosiy tizimlari.",
            lessons:[
              {id:"med-term-l1",title:"Tibbiy atamalar tuzilishi",minutes:9,
                objectives:["Tibbiy atama qismlarini ajrata olish","Prefiks, ildiz va suffiks vazifasini bilish","Umumiy tibbiy atamalarni izohlay olish"],
                sections:[
                  {heading:"Atama qismlari",paragraphs:["Ko‘pchilik tibbiy atamalar lotin va yunon tillaridan olingan. Atama uch qismdan iborat bo‘lishi mumkin: prefiks (old qism), ildiz (asosiy ma’no) va suffiks (oxirgi qism)."],bullets:["Ildiz — asosiy ma’no, masalan «kardi» (yurak).","Prefiks — old qism, masalan «bradi-» (sekin).","Suffiks — oxirgi qism, masalan «-itis» (yallig‘lanish)."]},
                  {heading:"Misollar",paragraphs:["Qismlarni birlashtirib ma’noni topamiz."],bullets:["Kardiologiya = kardi (yurak) + logiya (fan) → yurak haqidagi fan.","Bradikardiya = bradi (sekin) + kardi (yurak) → yurakning sekin urishi.","Gastrit = gastr (oshqozon) + itis (yallig‘lanish) → oshqozon yallig‘lanishi."]},
                  {heading:"Foydali ildiz va suffikslar",bullets:["derma — teri, gastro — oshqozon, nefro — buyrak.","neyro — asab, hemo — qon.","-ologiya — fan, -itis — yallig‘lanish, -ektomiya — olib tashlash."],paragraphs:["Ushbu qismlarni yodlab olsangiz, yuzlab yangi atamaning ma’nosini mustaqil topa olasiz."]}
                ],
                summary:"Tibbiy atamalar prefiks, ildiz va suffiksdan tuziladi; qismlarni bilib, notanish atamaning ma’nosini topish mumkin.",
                terms:[{term:"Ildiz (root)",def:"Atamaning asosiy ma’nosini bildiruvchi qism, masalan kardi — yurak."},{term:"Prefiks",def:"Atama boshidagi ma’no o‘zgartiruvchi qism, masalan bradi — sekin."},{term:"Suffiks",def:"Atama oxiridagi qism, masalan -itis — yallig‘lanish."},{term:"-ektomiya",def:"A’zoni jarrohlik yo‘li bilan olib tashlashni bildiruvchi suffiks."}]},
              {id:"med-term-l2",title:"Tananing tizimlari va anatomik yo‘nalishlar",minutes:9,
                objectives:["Tananing asosiy tizimlarini sanay olish","Anatomik yo‘nalish atamalarini bilish","A’zolar tizimlari o‘zaro bog‘liqligini tushunish"],
                sections:[
                  {heading:"A’zolar tizimlari",paragraphs:["Inson tanasi bir nechta o‘zaro bog‘langan tizimlardan iborat. Har biri o‘z vazifasini bajaradi, lekin birgalikda ishlaydi."],bullets:["Yurak-qon tomir tizimi — qon aylanishi.","Nafas tizimi — kislorod almashinuvi.","Ovqat hazm qilish tizimi — oziq-ovqatni hazm qilish.","Asab tizimi — boshqaruv va signal uzatish.","Suyak-mushak tizimi — tayanch va harakat."]},
                  {heading:"Anatomik yo‘nalishlar",paragraphs:["Shifokorlar tana qismlarini aniq tasvirlash uchun standart yo‘nalish atamalaridan foydalanadi."],bullets:["Anterior (old) — Posterior (orqa).","Superior (yuqori) — Inferior (past).","Medial (o‘rtaga yaqin) — Lateral (chetga yaqin).","Proksimal (markazga yaqin) — Distal (uzoq)."]},
                  {heading:"Nima uchun muhim?",paragraphs:["Aniq terminologiya tibbiy xatolarni kamaytiradi va shifokorlar, hamshiralar hamda IT tizimlari o‘rtasida bir xil tushunishni ta’minlaydi."]}
                ],
                summary:"Inson tanasi o‘zaro bog‘langan tizimlardan iborat; anatomik yo‘nalish atamalari tana qismlarini aniq tasvirlash imkonini beradi.",
                terms:[{term:"Yurak-qon tomir tizimi",def:"Yurak va qon tomirlar orqali qonni aylantiruvchi tizim."},{term:"Anterior / Posterior",def:"Old va orqa tomonni bildiruvchi anatomik atamalar."},{term:"Proksimal / Distal",def:"Tana markaziga yaqin va undan uzoq joyni bildiradi."},{term:"A’zolar tizimi",def:"Umumiy vazifani bajaruvchi a’zolar guruhi."}]}
            ]},
          {id:"med-anat",title:"Anatomiya va fiziologiya",summary:"Yurak-qon tomir, nafas, asab hamda ovqat hazm qilish tizimlari tuzilishi va vazifasi.",
            lessons:[
              {id:"med-anat-l1",title:"Yurak-qon tomir va nafas tizimi",minutes:11,
                objectives:["Yurak tuzilishi va qon aylanishini tushunish","Qon tomir turlarini farqlash","Nafas tizimi vazifasini bilish"],
                sections:[
                  {heading:"Yurak va qon aylanishi",paragraphs:["Yurak — mushakli nasos; u qonni butun tanaga haydaydi. Yurak to‘rt bo‘lmadan iborat: ikki bo‘lmacha (atrium) va ikki qorincha (ventrikul).","Qon kislorod va oziq moddalarni to‘qimalarga yetkazadi, karbonat angidrid va chiqindilarni olib ketadi."]},
                  {heading:"Qon tomirlar",bullets:["Arteriyalar — qonni yurakdan olib ketadi (odatda kislorodli).","Venalar — qonni yurakka qaytaradi.","Kapillyarlar — eng mayda tomirlar; modda almashinuvi shu yerda kechadi."]},
                  {heading:"Nafas tizimi",paragraphs:["Nafas tizimi kislorodni qabul qilib, karbonat angidridni chiqaradi. Havo burun → traxeya → bronxlar → o‘pkadagi alveolalarga boradi. Alveolalarda gaz almashinuvi ro‘y beradi: kislorod qonga o‘tadi, karbonat angidrid chiqadi."]}
                ],
                summary:"Yurak qonni haydaydi, arteriya-vena-kapillyarlar uni tarqatadi; nafas tizimi esa o‘pka alveolalarida kislorod va karbonat angidridni almashtiradi.",
                terms:[{term:"Yurak qorinchasi",def:"Qonni yurakdan tashqariga haydaydigan bo‘lim (ventrikul)."},{term:"Arteriya",def:"Qonni yurakdan a’zolarga olib boradigan tomir."},{term:"Kapillyar",def:"Modda almashinuvi kechadigan eng mayda qon tomir."},{term:"Alveola",def:"O‘pkada gaz almashinuvi bo‘ladigan mayda havo pufakchasi."}]},
              {id:"med-anat-l2",title:"Asab va ovqat hazm qilish tizimi",minutes:11,
                objectives:["Asab tizimi qismlarini bilish","Neyron vazifasini tushunish","Ovqat hazm qilish bosqichlarini bilish"],
                sections:[
                  {heading:"Asab tizimi",paragraphs:["Asab tizimi tanani boshqaradi va signal uzatadi. U markaziy (bosh miya va orqa miya) hamda periferik (nervlar) qismlarga bo‘linadi.","Neyron — asab tizimining asosiy hujayrasi; elektr signallar orqali ma’lumot uzatadi."]},
                  {heading:"Bosh miya",bullets:["Katta miya — fikrlash, xotira, harakat.","Miyacha — muvozanat va koordinatsiya.","Miya sopi — nafas va yurak urishi kabi hayotiy funksiyalar."]},
                  {heading:"Ovqat hazm qilish tizimi",paragraphs:["Bu tizim oziq-ovqatni mayda moddalarga ajratib, qonga so‘riladigan holga keltiradi.","Yo‘l: og‘iz → qizilo‘ngach → oshqozon → ingichka ichak → yo‘g‘on ichak. Jigar va oshqozon osti bezi hazm shirasini ishlab chiqaradi."]}
                ],
                summary:"Asab tizimi neyronlar orqali tanani boshqaradi; ovqat hazm qilish tizimi esa oziq moddalarni parchalab, organizmga so‘rilishini ta’minlaydi.",
                terms:[{term:"Neyron",def:"Elektr signal uzatuvchi asab hujayrasi."},{term:"Markaziy asab tizimi",def:"Bosh miya va orqa miyadan iborat boshqaruv markazi."},{term:"Oshqozon",def:"Ovqatni kislota va fermentlar bilan hazm qiladigan a’zo."},{term:"Ingichka ichak",def:"Oziq moddalar asosan so‘riladigan hazm a’zosi."}]}
            ]},
          {id:"med-aid",title:"Birinchi tibbiy yordam",summary:"Shoshilinch holatlarda birinchi yordam: CPR, qon ketishi, kuyish va shikastlanishlar.",
            lessons:[
              {id:"med-aid-l1",title:"CPR va shoshilinch holatlar",minutes:11,
                objectives:["Shoshilinch vaziyatda to‘g‘ri ketma-ketlikni bilish","CPR (yurak-o‘pka reanimatsiyasi) tamoyilini tushunish","Shok belgilarini taniy olish"],
                sections:[
                  {heading:"Birinchi qadamlar",paragraphs:["Har qanday shoshilinch holatda avval xavfsizlikni tekshiring, keyin jabrlanuvchini baholang va tez tibbiy yordam chaqiring (103)."],bullets:["Xavf — o‘zingiz va atrofdagilar xavfsizligini tekshiring.","Reaksiya — jabrlanuvchini chaqiring, yelkasidan asta silkiting.","Yordam chaqiring — 103 raqamiga qo‘ng‘iroq qiling.","Nafas yo‘li ochiq ekanini, nafas va qon aylanishini baholang."]},
                  {heading:"CPR — yurak-o‘pka reanimatsiyasi",paragraphs:["Agar kishi hushsiz bo‘lsa va normal nafas olmayotgan bo‘lsa, darhol yurak-o‘pka reanimatsiyasi boshlanadi. Kattalar uchun: ko‘krak markaziga daqiqasiga 100–120 marta, taxminan 5–6 sm chuqurlikda bosing.","Agar maxsus o‘qitilmagan bo‘lsangiz, faqat ko‘krakka bosish (hands-only CPR) ham hayot saqlaydi. O‘qitilgan bo‘lsangiz, 30 marta bosish va 2 marta sun’iy nafas (30:2) nisbatida davom eting."],note:"Bu ma’lumot faqat o‘quv maqsadida. Haqiqiy CPR ko‘nikmasini akkreditatsiyalangan kursda amaliy o‘rganing va doim 103 ni chaqiring."},
                  {heading:"Shok",paragraphs:["Shok — a’zolarga yetarli qon bormayotgan xavfli holat. Belgilari: rangpar va sovuq teri, tez va kuchsiz puls, holsizlik. Jabrlanuvchini yotqizing, oyoqlarini biroz ko‘taring, isiting va tez yordam chaqiring."]}
                ],
                summary:"Shoshilinch holatda xavfsizlik, reaksiya va yordam chaqirish birinchi o‘rinda; nafas yo‘q bo‘lsa CPR qilinadi; shok belgilarini erta tanib, tez yordam kerak.",
                terms:[{term:"CPR",def:"Yurak-o‘pka reanimatsiyasi: ko‘krakka bosish va sun’iy nafas."},{term:"103",def:"O‘zbekistonda tez tibbiy yordam raqami."},{term:"Shok",def:"A’zolarga qon yetishmasligidan kelib chiqadigan xavfli holat."},{term:"Kompressiya",def:"Ko‘krak qafasiga ritmik bosish orqali qon aylanishini qo‘llab-quvvatlash."}]},
              {id:"med-aid-l2",title:"Qon ketishi, kuyish va shikastlanishlar",minutes:10,
                objectives:["Tashqi qon ketishini to‘xtatish usulini bilish","Kuyish darajalarini farqlash","Singan suyakda nima qilishni tushunish"],
                sections:[
                  {heading:"Qon ketishini to‘xtatish",paragraphs:["Kuchli tashqi qon ketishida jarohatga toza mato bilan bevosita bosim bering va uni yuqoriga ko‘taring (agar singan bo‘lmasa).","Bosimni davom ettiring va tez yordam chaqiring. Toza qo‘lqop yoki paketdan foydalanib, o‘zingizni qondan himoya qiling."]},
                  {heading:"Kuyishlar",bullets:["1-daraja — faqat teri qizaradi (yuza).","2-daraja — pufakchalar paydo bo‘ladi.","3-daraja — teri qatlamlari chuqur shikastlanadi.","Yordam: kuygan joyni 10–20 daqiqa oqib turgan salqin suv ostida ushlang; muz qo‘ymang, moy surtmang."],note:"Katta yoki chuqur kuyishlarda darhol tibbiy yordamga murojaat qiling."},
                  {heading:"Singan suyaklar va cho‘zilish",paragraphs:["Singan suyakda joyni qimirlatmang, immobilizatsiya qiling (qo‘zg‘almas qilib bog‘lang) va tez yordam chaqiring.","Cho‘zilish yoki lat yeyishda RICE tamoyili qo‘llaniladi: Rest (dam), Ice (muz), Compression (bog‘lash), Elevation (ko‘tarish)."]}
                ],
                summary:"Qon ketishida bevosita bosim, kuyishda salqin suv, singan suyakda immobilizatsiya qo‘llaniladi; jiddiy hollarda doimo tez yordam chaqiriladi.",
                terms:[{term:"Bevosita bosim",def:"Qon ketishini to‘xtatish uchun jarohatga to‘g‘ridan-to‘g‘ri bosish."},{term:"2-daraja kuyish",def:"Terida pufakchalar paydo bo‘ladigan kuyish darajasi."},{term:"Immobilizatsiya",def:"Shikastlangan qismni qo‘zg‘almas holatda saqlash."},{term:"RICE",def:"Cho‘zilishda: dam, muz, siqib bog‘lash va ko‘tarish tamoyili."}]}
            ]},
          {id:"med-pharm",title:"Farmakologiya asoslari",summary:"Dori shakllari, dozalash, asosiy dori guruhlari va xavfsiz qo‘llash.",
            lessons:[
              {id:"med-pharm-l1",title:"Dori shakllari va dozalash",minutes:10,
                objectives:["Asosiy dori shakllarini bilish","Doza va qo‘llash yo‘llarini tushunish","Retsept mohiyatini anglash"],
                sections:[
                  {heading:"Dori shakllari",bullets:["Qattiq — tabletka, kapsula, kukun.","Suyuq — sirop, eritma, in’ektsiya.","Mahalliy — malham, krem, ko‘z tomchisi."]},
                  {heading:"Qo‘llash yo‘llari",paragraphs:["Dori organizmga turli yo‘llar bilan kiritiladi; yo‘l ta’sir tezligi va davomiyligiga ta’sir qiladi."],bullets:["Peroral (og‘iz orqali) — eng keng tarqalgan.","In’ektsion — vena, mushak yoki teri ostiga.","Mahalliy — teri yoki shilliq qavatga.","Ingalyatsion — nafas orqali (masalan astma dorilari)."]},
                  {heading:"Doza va xavfsizlik",paragraphs:["Doza — bir marta yoki bir kunda qabul qilinadigan dori miqdori. U bemorning yoshi, vazni va holatiga qarab belgilanadi.","Doza ortiqcha bo‘lsa, zaharlanish xavfi bor; kam bo‘lsa, samara bermaydi."],note:"Dorini faqat shifokor tavsiyasi bilan va ko‘rsatilgan dozada qabul qiling. O‘z-o‘zini davolash xavfli."}
                ],
                summary:"Dorilar qattiq, suyuq va mahalliy shakllarda bo‘ladi; ular turli yo‘llar bilan kiritiladi; to‘g‘ri doza samaradorlik va xavfsizlik uchun hal qiluvchi ahamiyatga ega.",
                terms:[{term:"Doza",def:"Bir marta yoki bir kunda qabul qilinadigan dori miqdori."},{term:"Peroral",def:"Dorini og‘iz orqali qabul qilish yo‘li."},{term:"In’ektsiya",def:"Dorini igna orqali tanaga kiritish (vena, mushak, teri osti)."},{term:"Retsept",def:"Shifokor tomonidan yozilgan dori tayinlovi."}]},
              {id:"med-pharm-l2",title:"Asosiy dori guruhlari va xavfsizlik",minutes:10,
                objectives:["Keng tarqalgan dori guruhlarini bilish","Antibiotiklarni to‘g‘ri qo‘llashni tushunish","Qo‘shimcha va o‘zaro ta’sir haqida bilish"],
                sections:[
                  {heading:"Umumiy dori guruhlari",bullets:["Analgetiklar — og‘riqni qoldiradi (masalan parasetamol).","Antibiotiklar — bakterial infeksiyalarga qarshi.","Antipiretiklar — haroratni tushiradi.","Antigistaminlar — allergiyaga qarshi."]},
                  {heading:"Antibiotiklarni to‘g‘ri qo‘llash",paragraphs:["Antibiotiklar faqat bakterial infeksiyalarga ta’sir qiladi, viruslarga (masalan oddiy shamollash) emas. Kursni oxirigacha tugatish kerak, aks holda bakteriyalar dorilarga chidamli (rezistent) bo‘lib qoladi."],note:"Antibiotikni shifokorsiz va noto‘g‘ri ishlatish antibiotikka chidamlilikni kuchaytiradi — bu global sog‘liq muammosi."},
                  {heading:"Qo‘shimcha va o‘zaro ta’sir",paragraphs:["Har bir dori foydali ta’sir bilan birga qo‘shimcha (nojo‘ya) ta’sir ham berishi mumkin. Ba’zi dorilar bir-biri bilan yoki ovqat bilan o‘zaro ta’sir qiladi. Shu sabab qabul qilayotgan barcha dorilaringizni shifokorga ayting."]}
                ],
                summary:"Asosiy dori guruhlari turli maqsadlarga xizmat qiladi; antibiotiklar faqat bakteriyalarga qarshi ishlaydi va kursni tugatish shart; har bir dorining qo‘shimcha va o‘zaro ta’sirini hisobga olish kerak.",
                terms:[{term:"Analgetik",def:"Og‘riqni kamaytiradigan dori (masalan parasetamol)."},{term:"Antibiotik",def:"Bakterial infeksiyalarga qarshi ishlatiladigan dori."},{term:"Antibiotik rezistentligi",def:"Bakteriyalarning dorilarga chidamli bo‘lib qolishi."},{term:"Nojo‘ya ta’sir",def:"Dorining kutilmagan yoki nomaqbul qo‘shimcha ta’siri."}]}
            ]}
        ]},
      {id:"minf",title:"Tibbiy informatika",icon:"🧬",color:"#a78bfa",tagline:"Sog‘liqni saqlash va IT uyg‘unligi",
        modules:[
          {id:"minf-intro",title:"Sog‘liqni saqlash informatikasi",summary:"Tibbiy informatika nima, uning maqsadi va tibbiy ma’lumotlar turlari.",
            lessons:[
              {id:"minf-intro-l1",title:"Tibbiy informatika nima?",minutes:9,
                objectives:["Tibbiy informatika ta’rifini bilish","Uning maqsad va foydasini tushunish","IT va tibbiyot qanday birlashishini ko‘rish"],
                sections:[
                  {heading:"Ta’rif",paragraphs:["Tibbiy informatika (health informatics) — tibbiyot, axborot texnologiyalari va ma’lumotlar tahlilini birlashtirgan soha.","Uning maqsadi — bemor ma’lumotlarini to‘g‘ri to‘plash, saqlash va tahlil qilib, sog‘liqni saqlash sifatini oshirish."]},
                  {heading:"Nima uchun kerak?",bullets:["Bemor ma’lumotlarini tez va xavfsiz topish.","Xatolarni kamaytirish (masalan dori dozasida).","Tashxis va davolashda qaror qo‘llab-quvvatlash.","Kasalliklar tarqalishini kuzatish (epidemiologiya)."]},
                  {heading:"Kim ishlatadi?",paragraphs:["Shifokorlar, hamshiralar, laboratoriya xodimlari va sog‘liqni saqlash menejerlari tibbiy informatika tizimlaridan foydalanadi. IT mutaxassislari esa bu tizimlarni yaratadi va qo‘llab-quvvatlaydi."]}
                ],
                summary:"Tibbiy informatika tibbiyot va IT ni birlashtirib, bemor ma’lumotlarini samarali boshqaradi hamda sog‘liqni saqlash sifatini oshiradi.",
                terms:[{term:"Tibbiy informatika",def:"Tibbiyot, IT va ma’lumotlar tahlilini birlashtirgan soha."},{term:"Raqamli sog‘liqni saqlash",def:"Sog‘liqni saqlashda raqamli texnologiyalardan foydalanish."},{term:"Qaror qo‘llab-quvvatlash",def:"Shifokorga tashxis va davolashda yordam beruvchi tizim."},{term:"Epidemiologiya",def:"Kasalliklar tarqalishi va nazoratini o‘rganuvchi soha."}]},
              {id:"minf-intro-l2",title:"Tibbiy ma’lumotlar turlari",minutes:9,
                objectives:["Tibbiy ma’lumot turlarini farqlash","Strukturlangan va strukturlanmagan ma’lumotni tushunish","Ma’lumot sifati muhimligini bilish"],
                sections:[
                  {heading:"Ma’lumot turlari",bullets:["Demografik — ism, yosh, jins, manzil.","Klinik — tashxis, simptom, davolash rejasi.","Laboratoriya — qon tahlili, natijalar.","Tasviriy — rentgen, MRT, KT tasvirlari.","Retsept va dori ma’lumotlari."]},
                  {heading:"Strukturlangan va strukturlanmagan",paragraphs:["Strukturlangan ma’lumot aniq maydonlarda saqlanadi (masalan «harorat: 38.5»).","Strukturlanmagan ma’lumot erkin matn, rasm yoki ovoz bo‘lishi mumkin (masalan shifokorning yozuvi). Uni avtomatik tahlil qilish qiyinroq."]},
                  {heading:"Ma’lumot sifati",paragraphs:["Yaxshi qarorlar sifatli ma’lumotga tayanadi. Ma’lumot to‘liq, aniq, dolzarb va bir xil formatda bo‘lishi kerak. Sifatsiz ma’lumot noto‘g‘ri tashxisga olib kelishi mumkin."]}
                ],
                summary:"Tibbiy ma’lumot demografik, klinik, laboratoriya va tasviriy turlarga bo‘linadi; strukturlangan yoki strukturlanmagan bo‘lishi mumkin; sifatli ma’lumot to‘g‘ri qaror uchun asosdir.",
                terms:[{term:"Strukturlangan ma’lumot",def:"Aniq maydon va formatda saqlangan ma’lumot."},{term:"Strukturlanmagan ma’lumot",def:"Erkin matn, rasm yoki ovoz kabi tartibsiz ma’lumot."},{term:"Klinik ma’lumot",def:"Tashxis, simptom va davolashga oid ma’lumot."},{term:"Ma’lumot sifati",def:"Ma’lumotning to‘liqligi, aniqligi va dolzarbligi."}]}
            ]},
          {id:"minf-ehr",title:"Elektron tibbiy yozuvlar (EHR)",summary:"EHR/EMR tizimlari, elektron bemor kartasi hamda ma’lumot maxfiyligi va xavfsizligi.",
            lessons:[
              {id:"minf-ehr-l1",title:"EHR va EMR: elektron bemor kartasi",minutes:10,
                objectives:["EHR va EMR farqini bilish","Elektron bemor kartasi mazmunini tushunish","Foyda va qiyinchiliklarni ko‘rish"],
                sections:[
                  {heading:"EHR va EMR",paragraphs:["EMR (Electronic Medical Record) — bitta klinikadagi bemorning elektron kartasi. EHR (Electronic Health Record) — kengroq tushuncha: bemorning turli muassasalardagi to‘liq sog‘liq tarixi, u muassasalar o‘rtasida almashinishi mumkin."]},
                  {heading:"Karta mazmuni",bullets:["Bemor ma’lumotlari va tibbiy tarix.","Tashxislar va davolash rejalari.","Retseptlar va dori ro‘yxati.","Laboratoriya va tasvir natijalari.","Allergiyalar va emlash ma’lumotlari."]},
                  {heading:"Foyda va qiyinchiliklar",paragraphs:["EHR ma’lumotni tez topish, xatolarni kamaytirish va shifokorlar ishini muvofiqlashtirishni yaxshilaydi.","Qiyinchiliklar: yuqori narx, o‘qitish zarurati va tizimlar o‘rtasida moslik (interoperability) muammosi."]}
                ],
                summary:"EMR bitta klinika kartasi, EHR esa muassasalar o‘rtasida almashinadigan keng bemor yozuvi; ular ma’lumotni tartibga soladi, ammo moslik va maxfiylik masalalarini hal qilish kerak.",
                terms:[{term:"EMR",def:"Bitta klinikadagi bemorning elektron tibbiy kartasi."},{term:"EHR",def:"Muassasalar o‘rtasida almashinadigan to‘liq elektron sog‘liq yozuvi."},{term:"Interoperability",def:"Turli tizimlarning ma’lumot almashina olish qobiliyati."},{term:"Bemor kartasi",def:"Bemorning tibbiy tarixi va ma’lumotlari jamlanmasi."}]},
              {id:"minf-ehr-l2",title:"Ma’lumot maxfiyligi va xavfsizligi",minutes:10,
                objectives:["Bemor ma’lumoti maxfiyligini anglash","HIPAA va GDPR tamoyillarini bilish","Xavfsizlik choralarini tushunish"],
                sections:[
                  {heading:"Nima uchun maxfiylik?",paragraphs:["Sog‘liq ma’lumoti eng nozik shaxsiy ma’lumotlardan biri. Uning oshkor bo‘lishi bemorga zarar yetkazishi mumkin, shu sabab u qonun bilan himoya qilinadi."]},
                  {heading:"HIPAA va GDPR",bullets:["HIPAA (AQSh) — tibbiy ma’lumotni himoya qiladigan qonun.","GDPR (Yevropa) — shaxsiy ma’lumotlar himoyasi qonuni.","Ko‘p davlatlarda o‘xshash qonunlar mavjud."]},
                  {heading:"Xavfsizlik choralari",bullets:["Kirish nazorati — faqat ruxsatli xodimlar ko‘radi.","Shifrlash — ma’lumot o‘g‘irlansa ham o‘qib bo‘lmaydi.","Audit jurnali — kim, qachon ko‘rganini qayd etadi.","Zaxira nusxa (backup) va kuchli parollar."],note:"Maxfiylik buzilishi qonuniy javobgarlik va bemor ishonchini yo‘qotishga olib keladi."}
                ],
                summary:"Bemor ma’lumoti qonun bilan himoyalangan; HIPAA va GDPR tamoyillariga amal qilib, kirish nazorati, shifrlash va audit orqali ma’lumot xavfsizligini ta’minlash kerak.",
                terms:[{term:"HIPAA",def:"AQShda tibbiy ma’lumot maxfiyligini himoya qiluvchi qonun."},{term:"GDPR",def:"Yevropa Ittifoqining shaxsiy ma’lumotlar himoya qonuni."},{term:"Shifrlash",def:"Ma’lumotni o‘qib bo‘lmaydigan holatga keltirib himoyalash."},{term:"Kirish nazorati",def:"Ma’lumotga faqat ruxsatli shaxslarni qo‘yish."}]}
            ]},
          {id:"minf-std",title:"Tibbiy ma’lumot standartlari",summary:"HL7, FHIR, DICOM va tibbiy kodlash tizimlari orqali o‘zaro moslik.",
            lessons:[
              {id:"minf-std-l1",title:"HL7 va FHIR",minutes:10,
                objectives:["Standartlar nima uchun kerakligini tushunish","HL7 va FHIR haqida tasavvurga ega bo‘lish","Ma’lumot almashinuvi qanday ishlashini bilish"],
                sections:[
                  {heading:"Nega standart kerak?",paragraphs:["Turli kasalxonalar turli tizimlardan foydalanadi. Ular bir-biri bilan ma’lumot almashishi uchun umumiy «til» — standart kerak. Standart bo‘lmasa, ma’lumot yo‘qoladi yoki noto‘g‘ri tushuniladi."]},
                  {heading:"HL7 va FHIR",paragraphs:["HL7 (Health Level 7) — tibbiy ma’lumot almashinuvi standartlarini ishlab chiquvchi tashkilot va standartlar oilasi.","FHIR (Fast Healthcare Interoperability Resources) — HL7 ning zamonaviy, internetga asoslangan standarti. U ma’lumotni «resurslar» (Bemor, Kuzatuv, Retsept) ko‘rinishida, veb (REST/JSON) orqali almashadi."],bullets:["FHIR zamonaviy veb-texnologiyalarga (JSON, REST API) tayanadi.","Har bir resurs alohida, qayta ishlatiladigan bo‘lak.","Mobil va bulutli ilovalar bilan oson integratsiyalanadi."]},
                  {heading:"Qanday ishlaydi?",paragraphs:["Ilova FHIR serveriga so‘rov yuboradi (masalan «shu bemorning tahlillarini ber») va JSON formatda javob oladi. Bu turli tizimlar bir-biri bilan gaplashishini ta’minlaydi."]}
                ],
                summary:"Standartlar turli tibbiy tizimlarni o‘zaro bog‘laydi; HL7 — standartlar oilasi, FHIR esa uning zamonaviy, veb (JSON/REST) asosidagi ma’lumot almashinuv standarti.",
                terms:[{term:"HL7",def:"Tibbiy ma’lumot almashinuvi standartlarini ishlab chiquvchi tashkilot/standart."},{term:"FHIR",def:"HL7 ning zamonaviy, veb (JSON/REST) asosidagi moslik standarti."},{term:"Resurs (FHIR)",def:"Bemor yoki Kuzatuv kabi qayta ishlatiladigan ma’lumot bo‘lagi."},{term:"REST API",def:"Tizimlar internet orqali ma’lumot almashadigan interfeys."}]},
              {id:"minf-std-l2",title:"ICD, DICOM va kodlash tizimlari",minutes:10,
                objectives:["Tibbiy kodlash tizimlari maqsadini bilish","ICD, LOINC va SNOMED haqida tasavvurga ega bo‘lish","DICOM tasvir standartini tushunish"],
                sections:[
                  {heading:"Nega kodlash?",paragraphs:["Kasalliklar va muolajalar nomlari har xil aytilishi mumkin. Kodlash tizimlari ularga yagona kod berib, hisobot, tahlil va to‘lovlarni osonlashtiradi."]},
                  {heading:"Asosiy tizimlar",bullets:["ICD-10/11 — kasalliklar va tashxislar xalqaro klassifikatsiyasi (JSST).","LOINC — laboratoriya tahlillari kodlari.","SNOMED CT — klinik atamalarning keng lug‘ati.","CPT — muolaja va xizmatlar kodlari."]},
                  {heading:"DICOM — tibbiy tasvirlar",paragraphs:["DICOM (Digital Imaging and Communications in Medicine) — rentgen, KT, MRT kabi tibbiy tasvirlarni saqlash va almashish standarti.","DICOM fayli tasvir bilan birga bemor va qurilma ma’lumotini ham saqlaydi. PACS tizimlari bu tasvirlarni saqlaydi va ko‘rsatadi."]}
                ],
                summary:"Kodlash tizimlari (ICD, LOINC, SNOMED) tibbiy tushunchalarga yagona kod beradi; DICOM esa tibbiy tasvirlarni saqlash va almashinuv standartidir.",
                terms:[{term:"ICD-10",def:"Kasalliklar va tashxislarning xalqaro klassifikatsiyasi."},{term:"LOINC",def:"Laboratoriya tahlillari uchun standart kodlar tizimi."},{term:"DICOM",def:"Tibbiy tasvirlarni saqlash va almashish standarti."},{term:"PACS",def:"Tibbiy tasvirlarni saqlash va ko‘rish tizimi."}]}
            ]},
          {id:"minf-ai",title:"Tibbiyotda AI va telemeditsina",summary:"Sun’iy intellekt, mashina o‘qitish, telemeditsina va kiyiladigan qurilmalarning tibbiyotdagi o‘rni.",
            lessons:[
              {id:"minf-ai-l1",title:"Tibbiyotda sun’iy intellekt",minutes:10,
                objectives:["AI va mashina o‘qitish (ML) tushunchasini bilish","Tibbiyotda AI qo‘llanishlarini ko‘rish","Imkoniyat va cheklovlarni anglash"],
                sections:[
                  {heading:"AI va ML nima?",paragraphs:["Sun’iy intellekt (AI) — kompyuterlarning inson kabi aqlli vazifalarni bajarishi.","Mashina o‘qitish (ML) — AI ning bir turi; tizim ma’lumotlardan namuna (pattern) o‘rganib, bashorat qiladi. Qancha ko‘p sifatli ma’lumot bo‘lsa, natija shuncha yaxshi."]},
                  {heading:"Tibbiyotda qo‘llanishlar",bullets:["Tasvir tahlili — rentgen yoki MRTda kasallikni aniqlash.","Erta ogohlantirish — bemor holati yomonlashishini bashorat qilish.","Dori kashfiyoti va tibbiy tadqiqot.","Qaror qo‘llab-quvvatlash — shifokorga tashxisda yordam."]},
                  {heading:"Cheklov va etika",paragraphs:["AI shifokorni almashtirmaydi, balki unga yordam beradi. Modellar noto‘g‘ri yoki adolatsiz (bias) bo‘lishi mumkin, shu sabab natijalarni shifokor tekshirishi shart."],note:"AI natijalari maslahat sifatida qaraladi; yakuniy tibbiy qaror doim malakali mutaxassis zimmasida."}
                ],
                summary:"AI va mashina o‘qitish tibbiy tasvir tahlili, bashorat va qaror qo‘llab-quvvatlashda yordam beradi; ammo natijalar shifokor nazorati ostida, etik va xavfsiz qo‘llanishi kerak.",
                terms:[{term:"Sun’iy intellekt (AI)",def:"Kompyuterlarning aqlli vazifalarni bajarishi."},{term:"Mashina o‘qitish (ML)",def:"Ma’lumotdan o‘rganib bashorat qiladigan AI turi."},{term:"Bias (xolislik yo‘qligi)",def:"Model natijasidagi adolatsizlik yoki noto‘g‘ri moyillik."},{term:"Qaror qo‘llab-quvvatlash",def:"Shifokorga tashxis va davolashda yordam beruvchi tizim."}]},
              {id:"minf-ai-l2",title:"Telemeditsina va kiyiladigan qurilmalar",minutes:10,
                objectives:["Telemeditsina afzalliklarini bilish","Kiyiladigan qurilmalar vazifasini tushunish","Raqamli sog‘liq kelajagini ko‘rish"],
                sections:[
                  {heading:"Telemeditsina",paragraphs:["Telemeditsina — masofadan turib tibbiy xizmat ko‘rsatish: videokonsultatsiya, masofaviy kuzatuv va onlayn retseptlar.","U ayniqsa uzoq hududlar va harakatlanishi qiyin bemorlar uchun foydali."]},
                  {heading:"Kiyiladigan qurilmalar",paragraphs:["Kiyiladigan qurilmalar (smart-soat, fitnes-bilaguzuk) yurak urishi, qadamlar, uyqu va kislorod darajasini kuzatadi. Bu ma’lumotlar doimiy kuzatuvga va kasalliklarni erta aniqlashga yordam beradi."],bullets:["Yurak urishi (optik PPG sensori orqali).","Yurak ritmi/EKG — faqat ba’zi ilg‘or modellarda.","Qonda kislorod (SpO2) va jismoniy faollik.","Uyqu sifati; ba’zi qurilmalar yiqilishni aniqlaydi."]},
                  {heading:"Kelajak va e’tibor",paragraphs:["Raqamli sog‘liq o‘sib bormoqda, ammo ma’lumot maxfiyligi va aniqligi muhim. Qurilma ma’lumoti tibbiy tashxis o‘rnini bosmaydi."]}
                ],
                summary:"Telemeditsina masofadan tibbiy xizmat beradi, kiyiladigan qurilmalar sog‘liqni doimiy kuzatadi; ular qulaylik yaratadi, ammo maxfiylik va aniqlik e’tiborni talab qiladi.",
                terms:[{term:"Telemeditsina",def:"Masofadan turib tibbiy xizmat ko‘rsatish."},{term:"Kiyiladigan qurilma",def:"Sog‘liq ko‘rsatkichlarini kuzatuvchi shaxsiy qurilma (smart-soat)."},{term:"SpO2",def:"Qondagi kislorod to‘yinganlik darajasi ko‘rsatkichi."},{term:"Masofaviy kuzatuv",def:"Bemor holatini uzoqdan doimiy nazorat qilish."}]}
            ]}
        ]}
    ],
    quiz:[
      {id:"it-q1",track:"it",q:"CPU qanday vazifani bajaradi?",options:["Ma’lumotni doimiy saqlaydi","Barcha hisob va buyruqlarni bajaradi","Faqat rasmlarni chizadi","Internetga ulaydi"],correct:1,explain:"CPU (protsessor) — kompyuterning asosiy hisoblash qismi.",difficulty:"oson"},

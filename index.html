<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Iqror Academy — IT va MED yo‘nalishlarida kuchli maktab ta'limi</title>
<meta name="description" content="Iqror Academy — IT va MED yo‘nalishlarida chuqurlashtirilgan ta'lim. Ochiq natijalar, reytinglar, o‘qituvchilar va yutuqlar bitta platformada.">
<meta name="theme-color" content="#155A4E">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Iqror Academy">
<meta property="og:title" content="Iqror Academy">
<meta property="og:description" content="IT va MED yo‘nalishlarida natijaga yo‘naltirilgan zamonaviy maktab.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 458.82 522.7'%3E%3Crect x='0' y='0' width='458.82' height='115.76' fill='%231F9982'/%3E%3Cpolygon points='118.69,411.72 0,288.91 0,175.52 458.82,175.52 458.82,289.07 341.08,410.90 230.28,296.26' fill='%23F6C05E'/%3E%3Cpolygon points='159.91,451.95 230.65,381.21 301.40,451.95 230.65,522.70' fill='%231F9982'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F1; --ink:#1C2723; --teal:#236B5D; --teal-2:#35796B; --teal-d:#16453B;
    --gold:#E2B562; --gold-d:#CFA24C; --muted:#586459; --on-gold:#173E36; --border:#E7EAE6; --border-2:#F0F2EC;
    --white:#FFFFFF; --it-bg:#EAF2EF; --it-fg:#236B5D; --med-bg:#F7F1E3; --med-fg:#977322;
    --serif:'Roboto Condensed',system-ui,sans-serif; --sans:'Roboto Condensed',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --wrap:1240px; --shadow:0 10px 28px rgba(18,42,32,0.08);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
  img{max-width:100%;display:block}
  a{color:inherit}
  ::selection{background:var(--gold);color:var(--on-gold)}
  h1,h2,h3{font-family:var(--serif);margin:0;text-wrap:balance}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .reveal{animation:fadeUp .7s ease both}
  /* Sahifalar (bo'limlar) almashinuvi uchun yumshoq o'tish */
  @keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .page-enter{animation:pageIn .5s cubic-bezier(.22,.61,.36,1) both;will-change:opacity,transform}
  @media(prefers-reduced-motion:reduce){.reveal,.page-enter{animation:none}}
  input:focus,select:focus,button:focus-visible,a:focus-visible{outline:2px solid var(--teal-2);outline-offset:2px}
  .wrap{max-width:var(--wrap);margin:0 auto;padding-left:32px;padding-right:32px}
  .kicker{display:inline-flex;align-items:center;gap:9px;color:var(--teal-2);font-weight:600;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px}
  .kicker::before{content:"";width:18px;height:1.5px;background:currentColor;border-radius:2px;flex:0 0 auto}
  .section-head{max-width:640px;margin-bottom:48px}
  .section-head h2{font-weight:400;font-size:40px;line-height:1.18;letter-spacing:0;margin-bottom:16px}
  .section-head p{font-size:17px;line-height:1.65;color:var(--muted);margin:0}
  section{padding:96px 0}

  /* ---- NAV ---- */
  .nav{position:sticky;top:0;z-index:60;background:rgba(246,243,235,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-inner{display:flex;flex-wrap:wrap;align-items:center;column-gap:16px;row-gap:12px;padding-top:14px;padding-bottom:14px}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink);order:1}
  .brand .mark{width:32px;height:auto;flex:0 0 auto}
  .brand b{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:.04em;display:block;line-height:1}
  .brand small{font-size:10px;font-weight:600;letter-spacing:.18em;color:var(--teal-2);margin-top:3px;display:block}
  /* Desktop/planshet: nav-drop shaffof — bolalari to'g'ridan-to'g'ri nav-inner flex ichida */
  .nav-drop{display:contents}
  .langsw{order:2;margin-left:auto;display:flex;gap:2px;background:#E9E4D6;border-radius:999px;padding:3px}
  .langsw button{border:none;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);background:transparent;color:var(--muted);transition:.15s}
  .langsw button.on{background:var(--teal);color:#fff}
  #auth-ui{order:3;display:flex;align-items:center;gap:8px;min-width:0}
  #auth-chip{flex-wrap:wrap}
  #auth-name{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
  .btn-cta{order:4;background:var(--gold);color:var(--on-gold);font-weight:700;font-size:14px;padding:10px 20px;border-radius:10px;text-decoration:none;transition:background .15s;white-space:nowrap}
  .btn-cta:hover{background:var(--gold-d)}
  body.is-auth .btn-cta{display:none}
  /* Menyu havolalari o'z qatoriga tushib markazda tartiblanadi — hech qachon qisilmaydi */
  .nav-links{order:5;flex:0 0 100%;display:flex;flex-wrap:wrap;justify-content:center;gap:9px 22px;font-size:15px;font-weight:500;margin:2px 0 0}
  .nav-links a{color:var(--ink);text-decoration:none;transition:color .15s;white-space:nowrap;padding:2px}
  .nav-links a:hover{color:var(--teal-2)}
  .nav-links a.active{color:var(--teal-2);font-weight:700}
  .navtoggle{display:none;border:1px solid var(--border);background:var(--white);border-radius:10px;width:44px;height:44px;cursor:pointer;font-size:20px;align-items:center;justify-content:center;flex:0 0 auto;order:6}
  /* Faqat telefon: to'liq menyu hamburgerga yig'iladi */
  @media(max-width:767px){
    .nav-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;position:relative}
    .brand{justify-self:start}
    .langsw{justify-self:center;margin:0}
    .navtoggle{display:flex;justify-self:end}
    .nav-drop{display:none;position:absolute;top:100%;left:0;right:0;flex-direction:column;background:var(--bg);border-bottom:1px solid var(--border);box-shadow:0 14px 26px rgba(13,81,72,.10);padding:6px 0;gap:0;z-index:70}
    .nav-drop.open{display:flex}
    .nav-links{position:static;display:flex;flex-direction:column;flex-basis:auto;gap:0;margin:0;width:100%;font-size:15.5px}
    .nav-links a{padding:14px 24px;border-top:1px solid var(--border-2);text-align:left}
    .nav-links a:first-child{border-top:none}
    .btn-cta{margin:12px 24px 6px;text-align:center;padding:13px}
    #auth-ui{width:auto;flex-wrap:wrap;justify-content:center;gap:8px;padding:12px 24px 6px;border-top:1px solid var(--border-2)}
    #auth-chip{flex-wrap:wrap;justify-content:center}
    #auth-name{max-width:none}
  }

  /* ---- HERO ---- */
  .hero{background:linear-gradient(160deg,#1A6355 0%,#155249 60%,#13483F 100%);color:#fff;position:relative;overflow:hidden}
  .hero .ghost{position:absolute;right:-80px;top:-60px;opacity:.07;pointer-events:none}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:64px;align-items:center;padding:88px 0 0;position:relative}
  .badge-pill{display:inline-block;background:rgba(237,184,76,.16);border:1px solid rgba(237,184,76,.5);color:var(--gold);font-size:13px;font-weight:600;letter-spacing:.06em;padding:7px 16px;border-radius:999px}
  .hero h1{font-weight:300;font-size:56px;line-height:1.14;letter-spacing:0;margin:24px 0 22px}
  .hero p.sub{font-size:18.5px;line-height:1.65;color:rgba(255,255,255,.82);max-width:52ch;margin:0 0 36px}
  .hero-btns{display:flex;gap:14px;flex-wrap:wrap}
  .btn-gold{background:var(--gold);color:var(--on-gold);font-weight:700;font-size:16px;padding:15px 30px;border-radius:12px;text-decoration:none;transition:background .15s}
  .btn-gold:hover{background:var(--gold-d)}
  .btn-ghost{border:1.5px solid rgba(255,255,255,.35);color:#fff;font-weight:600;font-size:16px;padding:15px 30px;border-radius:12px;text-decoration:none;transition:.15s}
  .btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.06)}
  .hero-visual{height:420px;border-radius:20px;background:
      radial-gradient(120% 120% at 80% 10%,rgba(237,184,76,.22),transparent 55%),
      linear-gradient(150deg,#1C6E5F,#154C44);
      border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;position:relative;overflow:hidden}
  .hero-visual .emblem{width:150px;height:auto;opacity:.96;filter:drop-shadow(0 12px 30px rgba(0,0,0,.35))}
  .hero-visual .cap{position:absolute;bottom:20px;left:24px;right:24px;font-size:13.5px;color:rgba(255,255,255,.72)}
  .hero-stats{border-top:1px solid rgba(255,255,255,.16);display:grid;grid-template-columns:repeat(4,1fr);gap:32px;padding:32px 0 56px;margin-top:64px}
  .hero-stats .v{font-family:var(--serif);font-weight:700;font-size:40px;color:var(--gold)}
  .hero-stats .l{font-size:14.5px;color:rgba(255,255,255,.72);margin-top:6px}
  /* Bosh sahifadagi aloqa + ariza bloki (teal fon ustida) */
  .hero-contact{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:start;padding:44px 0 76px;position:relative;border-top:1px solid rgba(255,255,255,.16);scroll-margin-top:96px}
  .hero-contact .kicker.light{color:var(--gold)}
  .hero-contact h2{color:#fff;font-weight:300;font-size:34px;line-height:1.2;margin:6px 0 14px}
  .hero-contact .hc-info>p{color:rgba(255,255,255,.82);font-size:16.5px;line-height:1.6;margin:0 0 30px;max-width:46ch}
  .hero-contact .contact-info.light{color:#fff}
  .hero-contact .contact-info.light .r span.l{color:rgba(255,255,255,.6)}
  .hero-contact .contact-info.light a{color:var(--gold)}
  .hero-contact .contact-info.light span:not(.l){color:rgba(255,255,255,.92)}
  @media(max-width:900px){ .hero-contact{grid-template-columns:1fr;gap:36px;padding:36px 0 60px} }

  /* ---- CARDS / COURSES ---- */
  .cards-2{display:grid;grid-template-columns:1fr 1fr;gap:28px}
  .course-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;display:flex;flex-direction:column;gap:20px;transition:.18s}
  .course-card:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .course-card .top{display:flex;align-items:center;gap:16px}
  .course-card .ic{width:52px;height:52px;border-radius:14px;background:var(--teal);display:grid;place-items:center;flex:0 0 auto}
  .course-card h3{font-weight:700;font-size:26px}
  .course-card p{font-size:15.5px;line-height:1.65;color:var(--muted);margin:0}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13.5px;font-weight:600;padding:7px 14px;border-radius:999px}
  .chip.it{background:var(--it-bg);color:var(--it-fg)}
  .chip.med{background:var(--med-bg);color:var(--med-fg)}
  .card-meta{margin-top:auto;padding-top:16px;border-top:1px dashed var(--border);font-size:14px;font-weight:600;color:var(--teal-2)}

  /* ---- RESULTS ---- */
  .band{background:var(--white);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .results-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:28px;align-items:start}
  .lb{background:var(--bg);border:1px solid var(--border);border-radius:20px;overflow:hidden}
  .lb-head{display:flex;align-items:baseline;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--border)}
  .lb-head h3{font-weight:700;font-size:20px}
  .lb-head span{font-size:13px;font-weight:600;color:var(--muted)}
  .lb-row{display:grid;grid-template-columns:44px 1fr 116px 150px;gap:14px;align-items:center;padding:13px 26px;border-bottom:1px solid var(--border-2)}
  .lb-row .rank{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:15px}
  .lb-row .nm{font-weight:600;font-size:15px}
  .lb-row .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .trk{justify-self:start;font-size:12px;font-weight:700;letter-spacing:.08em;padding:5px 12px;border-radius:999px}
  .trk.it{background:var(--it-bg);color:var(--it-fg)} .trk.med{background:var(--med-bg);color:var(--med-fg)}
  /* A'lochilar (90+) — rasmli kartochkalar (poster uslubi) */
  .honor-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;align-items:start}
  .honor-card{position:relative;margin:0;aspect-ratio:3/4;border-radius:20px;overflow:hidden;background:linear-gradient(160deg,#1C6E5F,#0E2C22);box-shadow:0 14px 34px rgba(9,40,30,.20);border:1px solid rgba(226,181,98,.25)}
  /* Tayyor poster: rasm o'z o'lchamida to'liq ko'rinadi (ustiga matn chizilmaydi) */
  .honor-card.poster{aspect-ratio:auto;background:#0E2C22}
  .honor-card.poster img{position:static;display:block;width:100%;height:auto}
  .honor-photo{position:absolute;inset:0}
  .honor-photo img{width:100%;height:100%;object-fit:cover;object-position:top center}
  .honor-ini{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:clamp(40px,6vw,64px);color:rgba(255,255,255,.85)}
  .honor-emb{position:absolute;right:-24px;bottom:40px;width:150px;opacity:.06;pointer-events:none}
  .honor-cls{position:absolute;top:12px;left:12px;background:rgba(226,181,98,.95);color:var(--on-gold);font-size:12px;font-weight:700;letter-spacing:.04em;padding:5px 13px;border-radius:999px;z-index:2}
  .honor-ov{position:absolute;left:0;right:0;bottom:0;padding:38px 16px 16px;background:linear-gradient(to top,rgba(9,40,30,.97),rgba(9,40,30,.72) 48%,transparent);z-index:1}
  .honor-name{color:#fff;font-weight:700;font-size:16.5px;line-height:1.2;margin-bottom:7px}
  .honor-score{display:flex;align-items:baseline;gap:6px}
  .honor-score b{font-family:var(--serif);font-weight:700;font-size:32px;color:var(--gold);line-height:1}
  .honor-score span{font-size:11.5px;font-weight:700;color:rgba(255,255,255,.82);letter-spacing:.1em;text-transform:uppercase}
  .honor-foot{margin:30px auto 0;max-width:640px;text-align:center;font-size:14.5px;color:var(--muted)}
  @media(max-width:900px){ .honor-grid{grid-template-columns:repeat(3,1fr)} }
  @media(max-width:640px){ .honor-grid{grid-template-columns:repeat(2,1fr);gap:12px} }
  .lb-score{display:flex;align-items:center;gap:10px}
  .lb-bar{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden}
  .lb-bar>i{display:block;height:100%;background:var(--teal-2);border-radius:99px}
  .lb-score b{font-family:var(--serif);font-weight:700;font-size:15px;width:32px;text-align:right}
  .search-card{background:var(--teal);color:#fff;border-radius:20px;padding:32px;position:sticky;top:92px}
  .search-card h3{font-weight:700;font-size:20px;margin-bottom:8px}
  .search-card p{font-size:13.5px;color:rgba(255,255,255,.65);margin:0 0 20px;line-height:1.5}
  .search-form{display:flex;gap:10px;margin-bottom:20px}
  .search-form input{flex:1;border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-family:var(--sans);background:#fff;color:var(--ink)}
  .search-form button{background:var(--gold);color:var(--on-gold);border:none;border-radius:10px;padding:0 20px;font-weight:700;font-size:14.5px;font-family:var(--sans);cursor:pointer;transition:.15s}
  .search-form button:hover{background:var(--gold-d)}
  .notfound{background:rgba(237,184,76,.16);border:1px solid rgba(207,162,76,.55);border-radius:12px;padding:14px 16px;font-size:14px;font-weight:600;color:#8a4b00}
  .found{background:var(--white);color:var(--ink);border:1px solid var(--border);border-radius:16px;padding:24px}
  .found .fh{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .found .fh b{font-family:var(--serif);font-weight:700;font-size:19px}
  .found .fid{background:var(--it-bg);color:var(--teal);font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap;margin-left:auto}
  .found-photo{width:52px;height:52px;border-radius:50%;overflow:hidden;flex:0 0 auto;border:1px solid var(--border)}
  .found-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .found .fg{font-size:13px;color:var(--muted);margin-bottom:18px}
  .found .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .found .metrics .m{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
  .found .metrics .m b{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--teal);display:block}
  .found .metrics .m span{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}
  .found .subs-l{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .subrow{display:grid;grid-template-columns:130px 1fr 34px;gap:10px;align-items:center;margin-bottom:10px}
  .subrow span:first-child{font-size:13.5px;font-weight:500}
  .subrow .sb{height:6px;background:var(--border-2);border-radius:99px;overflow:hidden}
  .subrow .sb>i{display:block;height:100%;background:var(--gold);border-radius:99px}
  .subrow b{font-weight:700;font-size:13.5px;text-align:right}

  /* ---- TEACHERS ---- */
  .cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .tcard{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:14px;transition:.18s}
  .tcard:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .tcard .top{display:flex;align-items:center;gap:16px}
  .avatar{width:72px;height:72px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:24px;color:var(--teal);background:var(--it-bg)}
  .avatar.photo{background:none;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .tcard .nm{font-family:var(--serif);font-weight:700;font-size:18px}
  .tcard .subj{font-size:13.5px;color:var(--teal-2);font-weight:600;margin-top:3px}
  .stars{color:var(--gold);font-size:17px;letter-spacing:2px}
  .rating{font-family:var(--serif);font-weight:700;font-size:17px}
  .votes{font-size:12.5px;color:var(--muted)}
  .tstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px dashed var(--border);padding-top:14px}
  .tstats b{font-weight:700;font-size:16px} .tstats span{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}

  /* ---- ACHIEVEMENTS ---- */
  .ach{background:linear-gradient(160deg,#22705F,#18544A);color:#fff}
  .ach .kicker{color:var(--gold)}
  .ach h2{color:#fff}
  .ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
  .ach h3.col{font-family:var(--serif);font-weight:700;font-size:18px;margin-bottom:28px;color:rgba(255,255,255,.85)}
  .tl-item{display:grid;grid-template-columns:76px 1fr;gap:24px;padding:18px 0 18px 28px;border-left:2px solid rgba(237,184,76,.35);position:relative}
  .tl-item .dot{position:absolute;left:-6px;top:26px;width:10px;height:10px;border-radius:50%;background:var(--gold)}
  .tl-item .yr{font-family:var(--serif);font-weight:700;font-size:19px;color:var(--gold)}
  .tl-item .tx{font-size:15.5px;line-height:1.55;color:rgba(255,255,255,.88)}
  .sa{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px 24px;display:grid;grid-template-columns:44px 1fr auto;gap:18px;align-items:center;margin-bottom:14px}
  .sa .st{width:44px;height:44px;border-radius:50%;background:rgba(237,184,76,.16);border:1px solid rgba(237,184,76,.5);display:grid;place-items:center;color:var(--gold);font-size:18px}
  .sa .nm{font-weight:600;font-size:15.5px}
  .sa .tx{font-size:13.5px;color:rgba(255,255,255,.65);margin-top:3px;line-height:1.5}
  .sa .yr{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--gold)}

  /* ---- NEWS ---- */
  .cards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
  .news{background:var(--white);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:.18s}
  .news:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .news .thumb{height:160px;display:grid;place-items:center;background:linear-gradient(150deg,#1C6E5F,#154C44)}
  .news .thumb svg{width:44px;height:54px;opacity:.9}
  .news .thumb.has-img{display:block}
  .news .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .news .thumb{position:relative}
  .news.has-video{cursor:pointer}
  .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;background:rgba(15,40,30,.62);color:#fff;display:grid;place-items:center;z-index:2;transition:.16s;padding-left:3px}
  .news.has-video:hover .play-btn,.news.has-video:focus-visible .play-btn{background:var(--teal);transform:translate(-50%,-50%) scale(1.07)}
  .vid-modal{position:fixed;inset:0;background:rgba(10,25,20,.82);display:grid;place-items:center;z-index:200;padding:20px}
  .vid-box{position:relative;width:min(940px,100%)}
  .vid-frame{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden}
  .vid-frame iframe,.vid-frame video{position:absolute;inset:0;width:100%;height:100%;border:0}
  .vid-x{position:absolute;top:-44px;right:0;width:36px;height:36px;border-radius:50%;border:none;background:#fff;color:var(--ink);font-size:22px;line-height:1;cursor:pointer;display:grid;place-items:center}
  .vid-box.img{width:auto;max-width:min(94vw,1100px)}
  .vid-img{display:block;max-width:100%;max-height:86vh;border-radius:12px;object-fit:contain}
  /* Galereya */
  .gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .gitem{position:relative;margin:0;border-radius:14px;overflow:hidden;background:var(--it-bg);aspect-ratio:4/3;cursor:pointer;border:1px solid var(--border)}
  .gitem img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
  .gitem:hover img{transform:scale(1.05)}
  .gi-ph{width:100%;height:100%;display:grid;place-items:center;color:var(--muted);font-size:13px;padding:12px;text-align:center}
  .gitem figcaption{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(12,30,24,.82));color:#fff;font-size:13px;font-weight:500;padding:22px 12px 10px;opacity:0;transition:opacity .2s}
  .gitem:hover figcaption,.gitem:focus-visible figcaption{opacity:1}
  @media(max-width:1000px){ .gallery-grid{grid-template-columns:repeat(3,1fr)} }
  @media(max-width:640px){ .gallery-grid{grid-template-columns:repeat(2,1fr);gap:10px} }
  /* Ota-onalar fikri */
  .rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .rev-card{margin:0;background:var(--white);border:1px solid var(--border);border-radius:18px;padding:26px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow)}
  .rev-card .stars{color:var(--gold);font-size:16px;letter-spacing:2px}
  .rev-card blockquote{margin:0;font-size:15.5px;line-height:1.6;color:var(--ink)}
  .rev-by{display:flex;align-items:center;gap:12px;margin-top:auto}
  .rev-av{width:48px;height:48px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:17px;color:var(--teal);background:var(--it-bg);overflow:hidden}
  .rev-av.photo{background:none}
  .rev-av img{width:100%;height:100%;object-fit:cover}
  .rev-meta{display:flex;flex-direction:column;line-height:1.3;min-width:0}
  .rev-meta b{font-size:15px;color:var(--ink)}
  .rev-meta small{font-size:12.5px;color:var(--muted)}
  @media(max-width:1000px){ .rev-grid{grid-template-columns:1fr 1fr} }
  @media(max-width:640px){ .rev-grid{grid-template-columns:1fr} }
  /* ---- Bo'lim ichidagi kichik sarlavha (sub-head) ---- */
  .sub-head{max-width:640px;margin:60px auto 26px;text-align:center}
  .sub-head:first-child{margin-top:0}
  .sub-head h3{font-family:var(--serif);font-weight:300;font-size:29px;color:var(--ink);margin:8px 0}
  .sub-head p{font-size:15.5px;line-height:1.6;color:var(--muted);margin:0}
  .sub-head .kicker{justify-content:center}
  /* ---- QABUL: bosqichlar ---- */
  .adm-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .adm-step{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px 20px;box-shadow:var(--shadow)}
  .adm-num{width:42px;height:42px;border-radius:12px;background:var(--it-bg);color:var(--teal);font-weight:700;font-size:19px;display:grid;place-items:center;margin-bottom:14px}
  .adm-c h4{font-size:17px;font-weight:700;color:var(--ink);margin:0 0 6px}
  .adm-c p{font-size:14px;line-height:1.55;color:var(--muted);margin:0}
  /* ---- QABUL: narxlar ---- */
  .price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:stretch}
  .price-card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:30px 24px;box-shadow:var(--shadow);display:flex;flex-direction:column;position:relative}
  .price-card.featured{border-color:var(--gold);box-shadow:0 16px 42px rgba(207,162,76,.20)}
  .price-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--on-gold);font-size:12px;font-weight:700;padding:5px 15px;border-radius:999px;white-space:nowrap}
  .price-name{font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--teal)}
  .price-amt{margin:12px 0 20px;display:flex;align-items:baseline;gap:6px}
  .price-amt b{font-family:var(--serif);font-weight:400;font-size:34px;color:var(--ink);line-height:1}
  .price-amt span{font-size:14px;color:var(--muted)}
  .price-feat{list-style:none;margin:0 0 22px;padding:0;display:flex;flex-direction:column;gap:11px;flex:1}
  .price-feat li{position:relative;padding-left:26px;font-size:14.5px;line-height:1.45;color:var(--ink)}
  .price-feat li::before{content:"✓";position:absolute;left:0;top:0;color:var(--teal);font-weight:700}
  .price-cta{display:block;text-align:center;background:var(--it-bg);color:var(--teal);font-weight:700;padding:12px;border-radius:12px;text-decoration:none;transition:.15s}
  .price-cta:hover{background:var(--teal);color:#fff}
  .price-card.featured .price-cta{background:var(--gold);color:var(--on-gold)}
  .price-card.featured .price-cta:hover{background:var(--gold-d)}
  /* ---- QABUL: hujjatlar ---- */
  .qab-docs{background:var(--it-bg);border-radius:20px;padding:32px 30px;margin-top:56px}
  .doc-list{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:13px 34px}
  .doc-list li{position:relative;padding-left:30px;font-size:15px;line-height:1.5;color:var(--ink)}
  .doc-list li::before{content:"📄";position:absolute;left:0;top:0}
  .doc-note{margin:22px 0 0;font-size:14px;color:var(--muted)}
  /* ---- QABUL: FAQ ---- */
  .faq-list{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
  .faq-item{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s}
  .faq-item.open{border-color:var(--teal-2)}
  .faq-q{width:100%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 22px;text-align:left;font-family:var(--sans);font-size:16px;font-weight:600;color:var(--ink)}
  .faq-ic{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--it-bg);color:var(--teal);font-size:18px;line-height:1;display:grid;place-items:center;transition:.2s}
  .faq-item.open .faq-ic{background:var(--teal);color:#fff;transform:rotate(45deg)}
  .faq-a{padding:0 22px 18px}
  .faq-a p{margin:0;font-size:15px;line-height:1.6;color:var(--muted)}
  /* ---- O'quv taqvimi (tadbirlar) ---- */
  .ev-list{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .ev-item{display:flex;gap:16px;align-items:flex-start;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
  .ev-date{flex:0 0 auto;width:60px;text-align:center;background:var(--med-bg);border-radius:12px;padding:9px 0}
  .ev-date b{display:block;font-family:var(--serif);font-size:24px;color:var(--med-fg);line-height:1.05}
  .ev-date span{font-size:11.5px;font-weight:700;color:var(--med-fg);text-transform:uppercase;letter-spacing:.03em}
  .ev-body h4{margin:0 0 5px;font-size:16px;font-weight:700;color:var(--ink)}
  .ev-body p{margin:0;font-size:14px;line-height:1.5;color:var(--muted)}
  @media(max-width:900px){
    .adm-steps{grid-template-columns:1fr 1fr}
    .price-grid{grid-template-columns:1fr}
    .doc-list{grid-template-columns:1fr}
    .ev-list{grid-template-columns:1fr}
  }
  @media(max-width:560px){ .adm-steps{grid-template-columns:1fr} }
  .news .body{padding:20px 22px 24px;display:flex;flex-direction:column;gap:10px;flex:1}
  .news .row{display:flex;align-items:center;gap:10px}
  .news .tag{background:var(--it-bg);color:var(--teal);font-size:11.5px;font-weight:700;letter-spacing:.06em;padding:4px 10px;border-radius:999px}
  .news .date{font-size:12.5px;color:var(--muted)}
  .news h3{font-weight:700;font-size:16.5px;line-height:1.4}

  /* ---- CONTACT ---- */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
  .contact-info{display:flex;flex-direction:column;gap:20px;font-size:15.5px}
  .contact-info .r{display:grid;grid-template-columns:130px 1fr;gap:16px}
  .contact-info .r span.l{color:var(--muted);font-weight:600}
  .contact-info a{color:var(--teal);font-weight:700;text-decoration:none}
  .form{background:var(--white);border:1px solid var(--border);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .form-banner{position:relative;background:linear-gradient(135deg,var(--teal-d) 0%,var(--teal) 55%,var(--teal-2) 100%);color:#fff;padding:26px 32px;display:flex;align-items:center;gap:16px;overflow:hidden}
  .form-banner::after{content:"";position:absolute;right:-46px;top:-46px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
  .form-banner::before{content:"";position:absolute;left:-30px;bottom:-60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
  .fb-mark{width:44px;height:auto;flex:0 0 auto;position:relative;z-index:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.2))}
  .fb-txt{display:flex;flex-direction:column;gap:3px;min-width:0;position:relative;z-index:1}
  .fb-txt b{font-family:var(--serif);font-weight:700;font-size:19px;letter-spacing:.06em;line-height:1}
  .fb-txt span{font-size:13px;color:rgba(255,255,255,.85);line-height:1.35}
  .form-body{padding:30px 32px 34px;display:flex;flex-direction:column;gap:16px}
  .form-note{font-size:14px;color:var(--muted);margin:-4px 0 4px;line-height:1.5}
  .form h3{font-weight:700;font-size:23px;margin:0}
  .form label{display:flex;flex-direction:column;gap:7px;font-size:13px;font-weight:700;color:var(--muted)}
  .form input,.form select{border:1px solid var(--border);border-radius:11px;padding:13px 16px;font-size:15px;font-family:var(--sans);background:#fff;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  .form input:focus,.form select:focus{outline:none;border-color:var(--teal-2);box-shadow:0 0 0 3px rgba(53,121,107,.15)}
  .form button{background:var(--gold);color:var(--on-gold);border:none;border-radius:12px;padding:15px;font-weight:700;font-size:16px;font-family:var(--sans);cursor:pointer;margin-top:6px;transition:transform .15s,background .15s,box-shadow .15s;box-shadow:0 6px 16px rgba(226,181,98,.28)}
  .form button:hover{background:var(--gold-d);transform:translateY(-1px);box-shadow:0 8px 20px rgba(226,181,98,.34)}
  .form .thanks{background:var(--it-bg);border:1px solid var(--teal-2);color:var(--teal);border-radius:12px;padding:14px 16px;font-size:14.5px;font-weight:600}
  @media(max-width:560px){ .form-banner{padding:22px 22px} .form-body{padding:24px 22px 28px} .fb-txt b{font-size:17px} }

  /* ---- IMKONIYATLAR (Facilities) ---- */
  .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .feat{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:12px;transition:.18s}
  .feat:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .feat .fi{width:54px;height:54px;border-radius:14px;background:var(--it-bg);display:grid;place-items:center;flex:0 0 auto}
  .feat .fi svg{width:28px;height:28px;fill:var(--teal-2)}
  .feat h3{font-weight:600;font-size:19px}
  .feat p{font-size:14.5px;line-height:1.6;color:var(--muted);margin:0}
  .feat .fnote{margin-top:auto;font-size:13px;font-weight:600;color:var(--teal-2);padding-top:6px}

  /* ---- SINF NATIJALARI (Class results) ---- */
  .class-panel{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:28px}
  .cp-head h3{font-weight:600;font-size:22px;margin-bottom:6px}
  .cp-head p{font-size:14.5px;color:var(--muted);margin:0 0 20px;line-height:1.55}
  .cp-selects{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .cp-selects label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--muted)}
  .cp-selects select{border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:var(--sans);background:#fff;color:var(--ink);cursor:pointer}
  .cp-selects select:disabled{opacity:.55;cursor:not-allowed;background:var(--bg)}
  .cls-summary{display:flex;flex-wrap:wrap;gap:12px;margin:22px 0 16px}
  .cls-summary .cs{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 18px;min-width:118px}
  .cls-summary .cs b{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--teal);display:block;line-height:1.1}
  .cls-summary .cs span{font-size:12px;color:var(--muted)}
  .cls-table{border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .cls-row{display:grid;grid-template-columns:40px 1fr 108px 104px;gap:12px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border-2);font-size:14.5px}
  .cls-row:last-child{border-bottom:none}
  .cls-row.hd{background:var(--bg);font-weight:600;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .cls-row .cr-rank{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:14px;background:var(--it-bg);color:var(--teal)}
  .cls-row .cr-nm{font-weight:600}
  .cls-row .cr-nm small{display:block;font-weight:400;font-size:12px;color:var(--muted)}
  .cls-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
  .cls-bar>i{display:block;height:100%;background:var(--teal-2);border-radius:99px}
  .cls-detailbtn{background:var(--it-bg);color:var(--teal);border:none;border-radius:8px;padding:7px 10px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:.15s}
  .cls-detailbtn:hover{background:#DCEBE7}
  .cls-empty{background:var(--bg);border:1px dashed var(--border);border-radius:12px;padding:26px;text-align:center;color:var(--muted);font-size:14.5px;margin-top:20px}
  .cls-detail{margin-top:16px}
  /* Kabinet — davomat */
  .kab-att-card{margin-top:16px;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px}
  .kab-att-card .subs-l{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .kab-att-card .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kab-att-card .metrics .m{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
  .kab-att-card .metrics .m b{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--teal);display:block}
  .kab-att-card .metrics .m span{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}
  .att-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);margin-bottom:10px}
  .att-legend span{display:inline-flex;align-items:center;gap:5px}
  .inv-list{display:flex;flex-direction:column;gap:8px}
  .inv-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 13px;background:var(--bg);border-radius:11px}
  .inv-m{font-weight:700;min-width:82px}
  .inv-a{font-family:var(--serif);font-weight:700;color:var(--teal);flex:1;min-width:120px}
  .inv-btns{display:flex;gap:8px}
  .inv-pay{display:inline-block;padding:8px 16px;border-radius:9px;font-weight:700;font-size:13.5px;color:#fff;text-decoration:none}
  .inv-pay.click{background:#00aaff}
  .inv-pay.uzum{background:#7000ff}
  .inv-pay:hover{opacity:.9}
  .inv-paid{color:#1d7a44;font-weight:700;font-size:14px}
  .att-legend i,.att-chip i{width:9px;height:9px;border-radius:50%;display:inline-block;flex:0 0 auto}
  .att-recent{display:flex;flex-wrap:wrap;gap:7px}
  .att-chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 9px}
  /* Kabinet: monitoring baholari */
  .mon-klist{display:flex;flex-direction:column;gap:8px}
  .mon-krow{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg);border:1px solid var(--border-2);border-radius:10px}
  .mon-ksubj{flex:1;font-weight:600;font-size:14.5px;color:var(--ink)}
  .mon-kper{font-size:12.5px;color:var(--muted)}
  .mon-kval{flex:0 0 auto;font-family:var(--serif);font-weight:700;font-size:20px;color:var(--teal);min-width:44px;text-align:right}
  /* Kabinet: bir nechta farzand */
  .kab-children{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:6px}
  .kab-children-l{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .kab-children-l .kab-cnt{background:var(--teal);color:#fff;border-radius:99px;padding:1px 8px;font-size:11px;margin-left:6px;letter-spacing:0}
  .kab-chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .kab-chip{display:inline-flex;align-items:stretch;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg);transition:border-color .18s,box-shadow .18s}
  .kab-chip.on{border-color:var(--teal-2);box-shadow:0 3px 10px rgba(21,90,78,.14)}
  .kab-chip-main{border:none;background:transparent;padding:9px 13px;cursor:pointer;text-align:left;font-family:var(--sans);display:flex;flex-direction:column;gap:1px;min-width:0}
  .kab-chip-main b{font-size:14px;color:var(--ink);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
  .kab-chip-main span{font-size:11.5px;color:var(--muted);font-weight:600}
  .kab-chip.on .kab-chip-main b{color:var(--teal)}
  .kab-chip-x{border:none;border-left:1px solid var(--border);background:transparent;color:var(--muted);font-size:18px;line-height:1;cursor:pointer;padding:0 11px}
  .kab-chip-x:hover{background:#fbeae1;color:#C2410C}
  .kab-add{max-width:420px}
  .kab-add .search-form{display:flex;gap:8px}
  .kab-add .search-form input{flex:1;min-width:0}
  /* Kabinet — desktop uchun keng, premium maket */
  .kab-narrow{max-width:600px}
  .kab-main{display:flex;flex-direction:column;gap:16px;margin-top:16px}
  .kab-main .kab-att-card{margin-top:0}
  @media(min-width:960px){
    #kab-detail.kab-2col{display:grid;grid-template-columns:340px minmax(0,1fr);gap:22px;align-items:start;margin-top:18px}
    #kab-detail.kab-2col > .found{position:sticky;top:96px}
    #kab-detail.kab-2col > .kab-main{margin-top:0}
    .kab-att-card .metrics{gap:12px}
    .ktt-grid{grid-template-columns:repeat(3,1fr)}
    .gchart svg{max-width:560px}
  }
  /* Kabinet: baholar jadvali + grafik */
  .gtable-wrap{overflow-x:auto;margin-bottom:14px}
  .gtable{width:100%;border-collapse:collapse;font-size:13.5px;min-width:340px}
  .gtable th{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:8px 6px;text-align:center;border-bottom:1px solid var(--border)}
  .gtable th:first-child{text-align:left}
  .gtable td{padding:7px 6px;text-align:center;border-bottom:1px solid var(--border)}
  .gtable tbody tr:last-child td{border-bottom:none}
  .gtable .gsub{font-weight:600;color:var(--ink);text-align:left}
  .gtable .gavg{font-weight:700;color:var(--teal)}
  .gtable .gcell{font-weight:700;color:var(--muted)}
  .gtable .gcell.g5{color:#1F9982}.gtable .gcell.g4{color:#2E9A88}.gtable .gcell.g3{color:#B98A2E}.gtable .gcell.g2{color:#C86A3A}
  .gchart{background:var(--bg);border-radius:12px;padding:14px 12px 6px}
  .gchart-t{font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
  /* Kabinet: dars jadvali + uy vazifalari */
  .ktt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .ktt-day{background:var(--bg);border-radius:10px;padding:12px 14px}
  .ktt-day-h{font-weight:700;font-size:13px;color:var(--teal);margin-bottom:8px}
  .ktt-row{display:flex;gap:10px;font-size:13.5px;padding:3px 0}
  .ktt-time{color:var(--muted);min-width:52px;flex:0 0 auto}
  .ktt-subj{color:var(--ink);font-weight:500;overflow-wrap:anywhere}
  @media(max-width:560px){ .ktt-grid{grid-template-columns:1fr} }
  .khw-list{display:flex;flex-direction:column;gap:10px}
  .khw-item{background:var(--bg);border-radius:10px;padding:12px 14px}
  .khw-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:4px}
  .khw-subj{font-weight:700;font-size:13.5px;color:var(--teal)}
  .khw-due{font-size:12px;color:var(--muted);flex:0 0 auto}
  .khw-text{font-size:14px;color:var(--ink);overflow-wrap:anywhere}

  /* ---- FOOTER ---- */
  footer{background:var(--teal-d);color:rgba(255,255,255,.75)}
  .foot-inner{display:flex;align-items:center;gap:40px;padding:56px 0 40px;flex-wrap:wrap}
  footer .brand b{color:#fff;font-size:20px}
  footer .brand small{color:var(--gold);font-size:9px}
  footer p{font-size:14px;margin:0;max-width:44ch}
  footer .rights{margin-left:auto;font-size:13px}

  /* ---- RESPONSIVE ---- */
  @media(max-width:1000px){
    .hero-grid{grid-template-columns:1fr;gap:36px;padding-top:56px}
    .hero h1{font-size:42px}
    .results-grid{grid-template-columns:1fr}
    .search-card{position:static}
    .ach-grid{grid-template-columns:1fr;gap:40px}
    .contact-grid{grid-template-columns:1fr;gap:40px}
    .cards-3{grid-template-columns:1fr 1fr}
    .cards-4{grid-template-columns:1fr 1fr}
    .feat-grid{grid-template-columns:1fr 1fr}
  }
  @media(max-width:760px){
    .wrap{padding-left:20px;padding-right:20px}
    section{padding:64px 0}
    .section-head{margin-bottom:34px}
    .section-head h2{font-size:30px}
    .hero h1{font-size:34px}
    .hero p.sub{font-size:17px}
    .cards-2,.cards-3,.cards-4,.feat-grid{grid-template-columns:1fr}
    .cp-selects{grid-template-columns:1fr}
    .cls-row{grid-template-columns:32px 1fr 66px;gap:10px;padding:11px 14px}
    .cls-row .cr-act{display:none}
    .hero-stats{grid-template-columns:1fr 1fr;gap:24px}
    .lb,.search-card,.results-grid>*{min-width:0}
    .lb-row{display:flex;align-items:center;gap:11px;padding:12px 16px}
    .lb-row .rank{flex:0 0 auto;width:34px;height:34px}
    .lb-row>div:not(.lb-score){flex:1 1 auto;min-width:0}
    .lb-row .nm{white-space:normal;overflow-wrap:anywhere}
    .lb-row .sub{white-space:normal}
    .lb-row .trk{flex:0 0 auto}
    .lb-row .lb-score{flex:0 0 auto;gap:0}
    .lb-row .lb-score .lb-bar{display:none}
    .lb-row .lb-score b{font-size:16px;width:auto}
    .search-card{padding:24px 22px}
    .search-form input{min-width:0}
    .found .metrics{gap:8px}
    .foot-inner{gap:20px}
    footer .rights{margin-left:0;width:100%}
  }
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
  /* ---- AI yordamchi (chatbot) ---- */
  .ai-chat{position:fixed;right:20px;bottom:20px;z-index:80;font-family:var(--sans)}
  .ai-fab{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--teal),var(--teal-2));color:#fff;border:none;border-radius:30px;padding:13px 20px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 10px 26px rgba(18,42,32,.28);transition:transform .15s,box-shadow .15s}
  .ai-fab:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(18,42,32,.34)}
  .ai-panel{position:absolute;right:0;bottom:64px;width:min(380px,calc(100vw - 32px));height:min(560px,calc(100dvh - 120px));background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 24px 60px rgba(18,42,32,.24);display:flex;flex-direction:column;overflow:hidden}
  .ai-chat[hidden],.ai-panel[hidden]{display:none}   /* hidden atributi display'ni bosib o'tsin */
  .ai-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(135deg,var(--teal-d),var(--teal));color:#fff;font-weight:700}
  .ai-head-t{display:inline-flex;align-items:center;gap:9px}
  .ai-dot{width:9px;height:9px;border-radius:50%;background:#5fd39a;box-shadow:0 0 0 3px rgba(95,211,154,.25)}
  .ai-x{background:transparent;border:none;color:#fff;font-size:24px;line-height:1;cursor:pointer;padding:0 4px}
  .ai-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
  .ai-m{max-width:84%;padding:10px 13px;border-radius:14px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .ai-m.bot{align-self:flex-start;background:#fff;border:1px solid var(--border);border-bottom-left-radius:5px;color:var(--ink)}
  .ai-m.me{align-self:flex-end;background:var(--teal);color:#fff;border-bottom-right-radius:5px}
  .ai-m.typing{color:var(--muted);font-style:italic}
  .ai-inp{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:#fff}
  .ai-inp input{flex:1;border:1px solid var(--border);border-radius:22px;padding:11px 16px;font-size:14.5px;font-family:var(--sans);outline:none}
  .ai-inp input:focus{border-color:var(--teal-2);box-shadow:0 0 0 3px rgba(53,121,107,.14)}
  .ai-inp button{flex:0 0 auto;width:42px;height:42px;border:none;border-radius:50%;background:var(--gold);color:var(--on-gold);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .ai-inp button:disabled{opacity:.5;cursor:default}
  .ai-note{padding:0 14px 12px;color:var(--muted);text-align:center;background:#fff}
  @media(max-width:520px){ .ai-fab-txt{display:none} .ai-fab{padding:14px} .ai-chat{right:14px;bottom:14px} }
</style>

function ytId(u){ const m=String(u||"").match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m?m[1]:""; }
function openVideo(url){
  const yt=ytId(url);
  const media = yt
    ? `<iframe src="https://www.youtube.com/embed/${yt}?autoplay=1&rel=0" title="Video" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>`
    : `<video src="${esc(url)}" controls autoplay playsinline></video>`;
  const bg=document.createElement("div"); bg.className="vid-modal";
  bg.innerHTML=`<div class="vid-box" role="dialog" aria-modal="true" aria-label="Video"><button class="vid-x" aria-label="Yopish">×</button><div class="vid-frame">${media}</div></div>`;
  document.body.appendChild(bg);
  const prevFocus=document.activeElement;
  const close=()=>{ bg.remove(); document.removeEventListener("keydown",onKey); try{ prevFocus&&prevFocus.focus&&prevFocus.focus(); }catch(e){} };
  const onKey=e=>{ if(e.key==="Escape") close(); };
  bg.addEventListener("click",e=>{ if(e.target===bg) close(); });
  bg.querySelector(".vid-x").onclick=close;
  document.addEventListener("keydown",onKey);
  try{ bg.querySelector(".vid-x").focus(); }catch(e){}
}

function renderKabinet(){
  const t=T[lang], host=$("#kabinet-body"); if(!host) return;
  const A=window.IqrorAuth;
  if(!A || !A.getUser || !A.getUser()){ host.innerHTML=`<div class="kab-narrow"><div class="cls-empty">${esc(t.kab_login)}</div></div>`; return; }
  const childIds = A.getChildIds ? A.getChildIds() : (A.getChildId&&A.getChildId()?[A.getChildId()]:[]);
  const active = A.getActiveChild ? A.getActiveChild() : (childIds[0]||"");
  const addForm = `<div class="kab-add"><div class="search-form"><input id="kab-input" type="text" placeholder="${esc(t.kab_ph)}" aria-label="${esc(t.kab_prompt)}"><button id="kab-add-btn" type="button">${esc(t.kab_add)}</button></div>
      <div id="kab-msg" class="notfound" style="display:none;margin-top:10px"></div></div>`;
  function wireAdd(){
    const btn=$("#kab-add-btn"), inp=$("#kab-input"); if(!btn||!inp) return;
    const add=async()=>{ const val=inp.value.trim(); if(!val) return; const s=findStudent(val); const msg=$("#kab-msg");
      if(!s){ if(msg){ msg.style.display="block"; msg.textContent=t.kab_notfound; } return; }
      if(childIds.includes(s.id)){ if(msg){ msg.style.display="block"; msg.textContent=t.kab_dup; } return; }
      try{ await A.addChild(s.id); renderKabinet(); }catch(e){ if(msg){ msg.style.display="block"; msg.textContent=t.kab_saveerr; } }
    };
    btn.onclick=add;
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); add(); } });
  }
  if(!childIds.length){
    host.innerHTML=`<div class="kab-narrow"><div class="found" style="padding:24px"><p style="margin:0 0 14px;color:var(--muted)">${esc(t.kab_prompt)}</p>${addForm}</div></div>`;
    wireAdd(); return;
  }
  const chips = childIds.map(id=>{ const st=findStudent(id); const nm=st?st.name:id;
    return `<div class="kab-chip ${id===active?'on':''}"><button class="kab-chip-main" data-sel="${esc(id)}"><b>${esc(nm)}</b><span>${esc(id)}</span></button><button class="kab-chip-x" data-rm="${esc(id)}" aria-label="${esc(t.kab_remove)}">×</button></div>`;
  }).join('');
  const s = findStudent(active);
  const detail = s ? (studentCardHTML(s)+`<div class="kab-main"><div id="kab-tsummary"></div><div id="kab-invoices"></div><div id="kab-att"></div><div id="kab-grades"></div><div id="kab-monitoring"></div><div id="kab-timetable"></div><div id="kab-homework"></div></div>`)
    : `<div class="cls-empty" style="margin-top:16px">${esc(t.kab_missing)} <b>${esc(active)}</b></div>`;
  host.innerHTML = `<div class="kab-children"><div class="kab-children-l">${esc(t.kab_children)} <span class="kab-cnt">${childIds.length}</span></div>
      <div class="kab-chips">${chips}</div>${addForm}</div>
    <div id="kab-detail"${s?' class="kab-2col"':''}>${detail}</div>`;
  host.querySelectorAll('[data-sel]').forEach(b=>b.onclick=async()=>{ if(b.dataset.sel===active) return; try{ await A.setActiveChild(b.dataset.sel); }catch(e){} renderKabinet(); });
  host.querySelectorAll('[data-rm]').forEach(b=>b.onclick=async(e)=>{ e.stopPropagation(); if(!confirm(t.kab_remove_q)) return; try{ await A.removeChild(b.dataset.rm); }catch(err){} renderKabinet(); });
  wireAdd();
  if(s){ renderKabTeacherSummary(s.id); renderKabInvoices(s.id); renderKabAttendance(s.id); renderKabGrades(s.id); renderKabMonitoring(s.id); renderKabTimetable(s); renderKabHomework(s); }
}

function growthChart(qAvg, t){
  const labels=["I","II","III","IV"];
  const pts=qAvg.map((v,i)=>({i,v})).filter(p=>p.v!=null);
  if(!pts.length) return "";
  const W=320,H=124,padL=24,padR=12,padT=14,padB=26,ymin=2,ymax=5;
  const x=i=>padL+(i/3)*(W-padL-padR);
  const y=v=>padT+(1-(Math.max(ymin,Math.min(ymax,v))-ymin)/(ymax-ymin))*(H-padT-padB);
  const grid=[2,3,4,5].map(g=>`<line x1="${padL}" y1="${y(g).toFixed(1)}" x2="${W-padR}" y2="${y(g).toFixed(1)}" stroke="var(--border)" stroke-width="1"/><text x="${padL-6}" y="${(y(g)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--muted)">${g}</text>`).join('');
  const xlab=labels.map((l,i)=>`<text x="${x(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${l}</text>`).join('');
  const path=pts.map((p,k)=>`${k?'L':'M'}${x(p.i).toFixed(1)},${y(p.v).toFixed(1)}`).join(' ');
  const dots=pts.map(p=>`<circle cx="${x(p.i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="4" fill="#155A4E"/><text x="${x(p.i).toFixed(1)}" y="${(y(p.v)-9).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="#155A4E">${p.v.toFixed(1)}</text>`).join('');
  return `<div class="gchart"><div class="gchart-t">${esc(t.kab_gr_dynamics)}</div><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${esc(t.kab_gr_dynamics)}">${grid}${xlab}<path d="${path}" fill="none" stroke="#2E9A88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg></div>`;
}
async function renderKabGrades(studentId){
  const t=T[lang], box=$("#kab-grades"); if(!box || !(window.IqrorFB&&window.IqrorFB.getGrades)) return;
  box.innerHTML=`<div class="kab-att-card"><div class="subs-l">${esc(t.kab_gr_title)}</div><div class="cls-empty" style="margin:0;padding:16px">${esc(t.kab_gr_loading)}</div></div>`;
  const g=await window.IqrorFB.getGrades(studentId);
  if($("#kab-grades")!==box) return;
  const subjects=(g&&g.subjects)?g.subjects:{};
  const QS=["q1","q2","q3","q4"];
  const gv=v=>{ v=Number(v); return v>0?v:null; };
  const cellCls=v=>{ v=Number(v); return v>=5?'g5':v>=4?'g4':v>=3?'g3':v>=2?'g2':''; };
  const names=Object.keys(subjects).filter(n=>QS.some(q=>gv(subjects[n][q])!=null)).sort((a,b)=>a.localeCompare(b));
  if(!names.length){ box.innerHTML=`<div class="kab-att-card"><div class="subs-l">${esc(t.kab_gr_title)}</div><div class="cls-empty" style="margin:0;padding:16px">${esc(t.kab_gr_none)}</div></div>`; return; }
  const rows=names.map(n=>{
    const cells=QS.map(q=>{ const v=gv(subjects[n][q]); return `<td class="gcell ${v?cellCls(v):''}">${v!=null?v:'—'}</td>`; }).join('');

function initAIChat(){
  const root=$("#ai-chat"); if(!root || !(window.IqrorFB && window.IqrorFB.getAIConfig)) return;
  window.IqrorFB.getAIConfig().then(async cfg=>{
    if(!cfg || !cfg.url || cfg.enabled===false) return;   // sozlanmagan — widget ko'rinmaydi
    const base=String(cfg.url).replace(/\/+$/,'');
    // Server tirikmi? Cloud Function «sovuq start» qilishi mumkin — 2 marta,
    // uzoqroq muddat bilan urinamiz. Javob bermasa chatbot ko'rsatilmaydi.
    async function alive(){
      for(let i=0;i<2;i++){
        try{ const c=new AbortController(); const t=setTimeout(()=>c.abort(), i===0?7000:14000);
          const r=await fetch(base+'/health',{signal:c.signal,mode:'cors'}); clearTimeout(t);
          if(r.ok) return true;
        }catch(e){}
        if(i===0) await new Promise(r=>setTimeout(r,1200));
      }
      return false;
    }
    if(!(await alive())) return;
    root.hidden=false;
    const fab=$("#ai-fab"), panel=$("#ai-panel"), msgs=$("#ai-msgs"), form=$("#ai-form"), input=$("#ai-text");
    const history=[]; let opened=false;
    const scroll=()=>{ msgs.scrollTop=msgs.scrollHeight; };
    const add=(cls,text)=>{ const d=document.createElement('div'); d.className='ai-m '+cls; d.textContent=text; msgs.appendChild(d); scroll(); return d; };
    const openPanel=()=>{ panel.hidden=false; fab.setAttribute('aria-expanded','true'); if(!opened){ opened=true; add('bot', T[lang].ai_welcome); } setTimeout(()=>input.focus(),50); };
    const closePanel=()=>{ panel.hidden=true; fab.setAttribute('aria-expanded','false'); };
    fab.addEventListener('click',()=>{ panel.hidden?openPanel():closePanel(); });
    $("#ai-close").addEventListener('click',closePanel);
    form.addEventListener('submit',async e=>{
      e.preventDefault();
      const text=input.value.trim(); if(!text) return;
      input.value=''; add('me',text);
      const btn=form.querySelector('button'); btn.disabled=true;
      const typing=add('bot typing', T[lang].ai_wait);
      try{
        const r=await fetch(base+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({history:history.slice(), message:text})});
        const j=await r.json(); typing.remove();
        const reply=(j && j.reply) ? j.reply : T[lang].ai_err;
        add('bot',reply);
        history.push({role:'user',content:text},{role:'assistant',content:reply});
        if(history.length>16) history.splice(0, history.length-16);
      }catch(err){ typing.remove(); add('bot', T[lang].ai_err); }
      btn.disabled=false; input.focus();
    });
  }).catch(()=>{});
}

const PAGES = ['top','yonalishlar','imkoniyatlar','natijalar','oqituvchilar','yutuqlar','hayot','galereya','fikrlar','qabul','kabinet'];
function route(animate){
  let h=(location.hash||'').replace('#','');
  if(h==='home'||h==='') h='top';
  // «Ariza» — bosh sahifadagi (top) forma bo'limi; shu bo'limga silliq o'tamiz
  let scrollTo=null;
  if(h==='ariza'||h==='aloqa'){ scrollTo='ariza'; h='top'; }
  if(!PAGES.includes(h)) h='top';
  PAGES.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=(id===h)?'':'none'; });
  document.querySelectorAll('.nav-links a').forEach(a=>{
    const t=(a.getAttribute('href')||'').replace('#','');
    a.classList.toggle('active', t===h);
    if(t===h) a.setAttribute('aria-current','page'); else a.removeAttribute('aria-current');
  });
  const nl=document.getElementById('navdrop'); if(nl) nl.classList.remove('open');
  const nt=document.getElementById('navtoggle'); if(nt) nt.setAttribute('aria-expanded','false');
  // Yangi ochilgan bo'limni yumshoq animatsiya bilan ko'rsatamiz
  const cur=document.getElementById(h);
  if(cur && animate){ cur.classList.remove('page-enter'); void cur.offsetWidth; cur.classList.add('page-enter'); }
  if(h==='kabinet') renderKabinet();
  if(scrollTo){ const el=document.getElementById(scrollTo); if(el){ el.scrollIntoView({behavior:animate?'smooth':'auto',block:'start'}); return; } }
  window.scrollTo({top:0,left:0,behavior:animate?'smooth':'auto'});
}

/* Telefon/planshetда: ekranни chapga surib keyingi, o'ngga surib oldingi bo'limga o'tish */
(function enableSwipeNav(){
  const SWIPE = PAGES.filter(p=>p!=='kabinet');   // kabinet faqat tugma orqali ochiladi
  let x0=0, y0=0, t0=0, startEl=null;
  const inHScroll = el=>{
    while(el && el.nodeType===1 && el!==document.body){
      if(el.scrollWidth > el.clientWidth+4){ const ox=getComputedStyle(el).overflowX; if(ox==='auto'||ox==='scroll') return true; }
      el=el.parentElement;
    }
    return false;
  };
  addEventListener('touchstart', e=>{
    if(e.touches.length!==1){ startEl=null; return; }
    const t=e.touches[0]; x0=t.clientX; y0=t.clientY; t0=Date.now(); startEl=e.target;
  }, {passive:true});
  addEventListener('touchend', e=>{
    const el=startEl; startEl=null;
    if(!el) return;
    if(document.querySelector('.vid-modal')) return;                       // modal ochiq bo'lsa — tegmaymiz
    const drop=document.getElementById('navdrop'); if(drop && drop.classList.contains('open')) return;
    const t=e.changedTouches[0]; if(!t) return;
    const dx=t.clientX-x0, dy=t.clientY-y0, dt=Date.now()-t0;
    if(dt>700) return;                                                     // juda sekin — surish emas
    if(Math.abs(dx)<70 || Math.abs(dx) < Math.abs(dy)*1.8) return;         // qisqa yoki vertikal (scroll) — e'tiborsiz
    if(inHScroll(el)) return;                                              // ichki gorizontal scroll ustида — tegmaymiz
    let cur=(location.hash||'').replace('#','')||'top'; if(cur==='home') cur='top';
    const i=SWIPE.indexOf(cur); if(i<0) return;
    if(dx<0 && i<SWIPE.length-1) location.hash='#'+SWIPE[i+1];            // chapga surish → keyingi bo'lim
    else if(dx>0 && i>0) location.hash='#'+SWIPE[i-1];                    // o'ngga surish → oldingi bo'lim
  }, {passive:true});
})();

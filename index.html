<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iqror IT MED School — IT va MED yo‘nalishlarida kuchli maktab ta'limi</title>
<meta name="description" content="Iqror IT MED School — IT va MED yo‘nalishlarida chuqurlashtirilgan ta'lim. Ochiq natijalar, reytinglar, o‘qituvchilar va yutuqlar bitta platformada.">
<meta name="theme-color" content="#0D5148">
<meta property="og:title" content="Iqror IT MED School">
<meta property="og:description" content="IT va MED yo‘nalishlarida natijaga yo‘naltirilgan zamonaviy maktab.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 49'%3E%3Crect x='2' width='36' height='9' rx='2' fill='%231E8E7E'/%3E%3Cpath d='M2 13H38v8.5L20 36.5 2 21.5Z' fill='%23EDB84C'/%3E%3Cpath d='M20 38.5l6 5.2-6 5.3-6-5.3Z' fill='%231E8E7E'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700;800;900&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F3EB; --ink:#12312B; --teal:#0D5148; --teal-2:#1E8E7E; --teal-d:#093A34;
    --gold:#EDB84C; --gold-d:#E0A930; --muted:#5B7370; --border:#E2DCCC; --border-2:#ECE7D9;
    --white:#FFFFFF; --it-bg:#EAF3F1; --it-fg:#0D5148; --med-bg:#FBF3DF; --med-fg:#8A6414;
    --serif:'Bitter',Georgia,serif; --sans:'Golos Text',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --wrap:1240px; --shadow:0 12px 32px rgba(13,81,72,0.10);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
  img{max-width:100%;display:block}
  a{color:inherit}
  ::selection{background:var(--gold);color:var(--teal)}
  h1,h2,h3{font-family:var(--serif);margin:0;text-wrap:balance}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .reveal{animation:fadeUp .7s ease both}
  input:focus,select:focus,button:focus-visible,a:focus-visible{outline:2px solid var(--teal-2);outline-offset:2px}
  .wrap{max-width:var(--wrap);margin:0 auto;padding-left:32px;padding-right:32px}
  .kicker{color:var(--teal-2);font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px}
  .section-head{max-width:640px;margin-bottom:48px}
  .section-head h2{font-weight:800;font-size:40px;line-height:1.15;margin-bottom:16px}
  .section-head p{font-size:17px;line-height:1.6;color:var(--muted);margin:0}
  section{padding:96px 0}

  /* ---- NAV ---- */
  .nav{position:sticky;top:0;z-index:60;background:rgba(246,243,235,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-inner{display:flex;align-items:center;gap:28px;padding-top:14px;padding-bottom:14px}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink)}
  .brand .mark{width:30px;height:37px;flex:0 0 auto}
  .brand b{font-family:var(--serif);font-weight:800;font-size:22px;letter-spacing:.04em;display:block;line-height:1}
  .brand small{font-size:10px;font-weight:600;letter-spacing:.28em;color:var(--teal-2);margin-top:3px;display:block}
  .nav-links{display:flex;gap:22px;margin-left:auto;font-size:14.5px;font-weight:500}
  .nav-links a{color:var(--ink);text-decoration:none;transition:color .15s}
  .nav-links a:hover{color:var(--teal-2)}
  .nav-links a.active{color:var(--teal-2);font-weight:700}
  .langsw{display:flex;gap:2px;background:#E9E4D6;border-radius:999px;padding:3px}
  .langsw button{border:none;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);background:transparent;color:var(--muted);transition:.15s}
  .langsw button.on{background:var(--teal);color:#fff}
  .btn-cta{background:var(--gold);color:var(--teal);font-weight:700;font-size:14px;padding:10px 20px;border-radius:10px;text-decoration:none;transition:background .15s;white-space:nowrap}
  .btn-cta:hover{background:var(--gold-d)}
  .navtoggle{display:none;border:1px solid var(--border);background:var(--white);border-radius:10px;width:44px;height:44px;cursor:pointer;font-size:20px;align-items:center;justify-content:center}

  /* ---- HERO ---- */
  .hero{background:linear-gradient(160deg,#0D5148 0%,#0A423B 60%,#093A34 100%);color:#fff;position:relative;overflow:hidden}
  .hero .ghost{position:absolute;right:-80px;top:-60px;opacity:.07;pointer-events:none}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:64px;align-items:center;padding:88px 0 0;position:relative}
  .badge-pill{display:inline-block;background:rgba(237,184,76,.16);border:1px solid rgba(237,184,76,.5);color:var(--gold);font-size:13px;font-weight:600;letter-spacing:.06em;padding:7px 16px;border-radius:999px}
  .hero h1{font-weight:800;font-size:56px;line-height:1.12;margin:24px 0 20px}
  .hero p.sub{font-size:19px;line-height:1.6;color:rgba(255,255,255,.78);max-width:52ch;margin:0 0 36px}
  .hero-btns{display:flex;gap:14px;flex-wrap:wrap}
  .btn-gold{background:var(--gold);color:var(--teal);font-weight:700;font-size:16px;padding:15px 30px;border-radius:12px;text-decoration:none;transition:background .15s}
  .btn-gold:hover{background:var(--gold-d)}
  .btn-ghost{border:1.5px solid rgba(255,255,255,.35);color:#fff;font-weight:600;font-size:16px;padding:15px 30px;border-radius:12px;text-decoration:none;transition:.15s}
  .btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.06)}
  .hero-visual{height:420px;border-radius:20px;background:
      radial-gradient(120% 120% at 80% 10%,rgba(237,184,76,.22),transparent 55%),
      linear-gradient(150deg,#0F5C51,#0A3f38);
      border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;position:relative;overflow:hidden}
  .hero-visual .emblem{width:150px;height:auto;opacity:.96;filter:drop-shadow(0 12px 30px rgba(0,0,0,.35))}
  .hero-visual .cap{position:absolute;bottom:20px;left:24px;right:24px;font-size:13.5px;color:rgba(255,255,255,.72)}
  .hero-stats{border-top:1px solid rgba(255,255,255,.16);display:grid;grid-template-columns:repeat(4,1fr);gap:32px;padding:32px 0 56px;margin-top:64px}
  .hero-stats .v{font-family:var(--serif);font-weight:800;font-size:40px;color:var(--gold)}
  .hero-stats .l{font-size:14.5px;color:rgba(255,255,255,.72);margin-top:6px}

  /* ---- CARDS / COURSES ---- */
  .cards-2{display:grid;grid-template-columns:1fr 1fr;gap:28px}
  .course-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;display:flex;flex-direction:column;gap:20px;transition:.18s}
  .course-card:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .course-card .top{display:flex;align-items:center;gap:16px}
  .course-card .ic{width:52px;height:52px;border-radius:14px;background:var(--teal);display:grid;place-items:center;flex:0 0 auto}
  .course-card h3{font-weight:800;font-size:26px}
  .course-card p{font-size:15.5px;line-height:1.65;color:var(--muted);margin:0}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13.5px;font-weight:600;padding:7px 14px;border-radius:999px}
  .chip.it{background:var(--it-bg);color:var(--it-fg)}
  .chip.med{background:var(--med-bg);color:var(--med-fg)}
  .card-meta{margin-top:auto;padding-top:16px;border-top:1px dashed var(--border);font-size:14px;font-weight:600;color:var(--teal-2)}

  /* ---- RESULTS ---- */
  .band{background:var(--white);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .results-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:28px;align-items:start}
  .lb{background:var(--bg);border:1px solid var(--border);border-radius:20px;overflow:hidden}
  .lb-head{display:flex;align-items:baseline;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--border)}
  .lb-head h3{font-weight:800;font-size:20px}
  .lb-head span{font-size:13px;font-weight:600;color:var(--muted)}
  .lb-row{display:grid;grid-template-columns:44px 1fr 116px 150px;gap:14px;align-items:center;padding:13px 26px;border-bottom:1px solid var(--border-2)}
  .lb-row .rank{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-family:var(--serif);font-weight:800;font-size:15px}
  .lb-row .nm{font-weight:600;font-size:15px}
  .lb-row .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .trk{justify-self:start;font-size:12px;font-weight:700;letter-spacing:.08em;padding:5px 12px;border-radius:999px}
  .trk.it{background:var(--it-bg);color:var(--it-fg)} .trk.med{background:var(--med-bg);color:var(--med-fg)}
  .lb-score{display:flex;align-items:center;gap:10px}
  .lb-bar{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden}
  .lb-bar>i{display:block;height:100%;background:var(--teal-2);border-radius:99px}
  .lb-score b{font-family:var(--serif);font-weight:800;font-size:15px;width:32px;text-align:right}
  .search-card{background:var(--teal);color:#fff;border-radius:20px;padding:32px;position:sticky;top:92px}
  .search-card h3{font-weight:800;font-size:20px;margin-bottom:8px}
  .search-card p{font-size:13.5px;color:rgba(255,255,255,.65);margin:0 0 20px;line-height:1.5}
  .search-form{display:flex;gap:10px;margin-bottom:20px}
  .search-form input{flex:1;border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-family:var(--sans);background:#fff;color:var(--ink)}
  .search-form button{background:var(--gold);color:var(--teal);border:none;border-radius:10px;padding:0 20px;font-weight:700;font-size:14.5px;font-family:var(--sans);cursor:pointer;transition:.15s}
  .search-form button:hover{background:var(--gold-d)}
  .notfound{background:rgba(237,184,76,.12);border:1px solid rgba(237,184,76,.4);border-radius:12px;padding:14px 16px;font-size:14px;color:var(--gold)}
  .found{background:#fff;color:var(--ink);border-radius:14px;padding:24px}
  .found .fh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
  .found .fh b{font-family:var(--serif);font-weight:800;font-size:19px}
  .found .fid{background:var(--it-bg);color:var(--teal);font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .found .fg{font-size:13px;color:var(--muted);margin-bottom:18px}
  .found .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .found .metrics .m{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
  .found .metrics .m b{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--teal);display:block}
  .found .metrics .m span{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}
  .found .subs-l{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .subrow{display:grid;grid-template-columns:130px 1fr 34px;gap:10px;align-items:center;margin-bottom:10px}
  .subrow span:first-child{font-size:13.5px;font-weight:500}
  .subrow .sb{height:6px;background:var(--border-2);border-radius:99px;overflow:hidden}
  .subrow .sb>i{display:block;height:100%;background:var(--gold);border-radius:99px}
  .subrow b{font-weight:700;font-size:13.5px;text-align:right}

  /* ---- TEACHERS ---- */
  .cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .tcard{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:14px;transition:.18s}
  .tcard:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .tcard .top{display:flex;align-items:center;gap:16px}
  .avatar{width:72px;height:72px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-family:var(--serif);font-weight:800;font-size:24px;color:var(--teal);background:var(--it-bg)}
  .tcard .nm{font-family:var(--serif);font-weight:800;font-size:18px}
  .tcard .subj{font-size:13.5px;color:var(--teal-2);font-weight:600;margin-top:3px}
  .stars{color:var(--gold);font-size:17px;letter-spacing:2px}
  .rating{font-family:var(--serif);font-weight:800;font-size:17px}
  .votes{font-size:12.5px;color:var(--muted)}
  .tstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px dashed var(--border);padding-top:14px}
  .tstats b{font-weight:700;font-size:16px} .tstats span{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}

  /* ---- ACHIEVEMENTS ---- */
  .ach{background:linear-gradient(160deg,#0D5148,#093A34);color:#fff}
  .ach .kicker{color:var(--gold)}
  .ach h2{color:#fff}
  .ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
  .ach h3.col{font-family:var(--serif);font-weight:700;font-size:18px;margin-bottom:28px;color:rgba(255,255,255,.85)}
  .tl-item{display:grid;grid-template-columns:76px 1fr;gap:24px;padding:18px 0 18px 28px;border-left:2px solid rgba(237,184,76,.35);position:relative}
  .tl-item .dot{position:absolute;left:-6px;top:26px;width:10px;height:10px;border-radius:50%;background:var(--gold)}
  .tl-item .yr{font-family:var(--serif);font-weight:800;font-size:19px;color:var(--gold)}
  .tl-item .tx{font-size:15.5px;line-height:1.55;color:rgba(255,255,255,.88)}
  .sa{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px 24px;display:grid;grid-template-columns:44px 1fr auto;gap:18px;align-items:center;margin-bottom:14px}
  .sa .st{width:44px;height:44px;border-radius:50%;background:rgba(237,184,76,.16);border:1px solid rgba(237,184,76,.5);display:grid;place-items:center;color:var(--gold);font-size:18px}
  .sa .nm{font-weight:600;font-size:15.5px}
  .sa .tx{font-size:13.5px;color:rgba(255,255,255,.65);margin-top:3px;line-height:1.5}
  .sa .yr{font-family:var(--serif);font-weight:800;font-size:15px;color:var(--gold)}

  /* ---- NEWS ---- */
  .cards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
  .news{background:var(--white);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:.18s}
  .news:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .news .thumb{height:160px;display:grid;place-items:center;background:linear-gradient(150deg,#0F5C51,#0A3f38)}
  .news .thumb svg{width:44px;height:54px;opacity:.9}
  .news .body{padding:20px 22px 24px;display:flex;flex-direction:column;gap:10px;flex:1}
  .news .row{display:flex;align-items:center;gap:10px}
  .news .tag{background:var(--it-bg);color:var(--teal);font-size:11.5px;font-weight:700;letter-spacing:.06em;padding:4px 10px;border-radius:999px}
  .news .date{font-size:12.5px;color:var(--muted)}
  .news h3{font-weight:700;font-size:16.5px;line-height:1.4}

  /* ---- CONTACT ---- */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
  .contact-info{display:flex;flex-direction:column;gap:20px;font-size:15.5px}
  .contact-info .r{display:grid;grid-template-columns:130px 1fr;gap:16px}
  .contact-info .r span.l{color:var(--muted);font-weight:600}
  .contact-info a{color:var(--teal);font-weight:700;text-decoration:none}
  .form{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:36px;display:flex;flex-direction:column;gap:18px}
  .form h3{font-weight:800;font-size:22px;margin-bottom:4px}
  .form label{display:flex;flex-direction:column;gap:8px;font-size:13.5px;font-weight:600;color:var(--muted)}
  .form input,.form select{border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;font-family:var(--sans);background:#fff;color:var(--ink)}
  .form button{background:var(--gold);color:var(--teal);border:none;border-radius:12px;padding:15px;font-weight:700;font-size:16px;font-family:var(--sans);cursor:pointer;margin-top:6px;transition:.15s}
  .form button:hover{background:var(--gold-d)}
  .form .thanks{background:var(--it-bg);border:1px solid var(--teal-2);color:var(--teal);border-radius:12px;padding:14px 16px;font-size:14.5px;font-weight:600}

  /* ---- FOOTER ---- */
  footer{background:var(--teal-d);color:rgba(255,255,255,.75)}
  .foot-inner{display:flex;align-items:center;gap:40px;padding:56px 0 40px;flex-wrap:wrap}
  footer .brand b{color:#fff;font-size:20px}
  footer .brand small{color:var(--gold);font-size:9px}
  footer p{font-size:14px;margin:0;max-width:44ch}
  footer .rights{margin-left:auto;font-size:13px}

  /* ---- RESPONSIVE ---- */
  @media(max-width:1000px){
    .hero-grid{grid-template-columns:1fr;gap:36px;padding-top:56px}
    .hero h1{font-size:42px}
    .results-grid{grid-template-columns:1fr}
    .search-card{position:static}
    .ach-grid{grid-template-columns:1fr;gap:40px}
    .contact-grid{grid-template-columns:1fr;gap:40px}
    .cards-3{grid-template-columns:1fr 1fr}
    .cards-4{grid-template-columns:1fr 1fr}
    .nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg);border-bottom:1px solid var(--border);flex-direction:column;gap:0;margin:0;padding:8px 0}
    .nav-links.open{display:flex}
    .nav-links a{padding:14px 32px;border-top:1px solid var(--border-2)}
    .navtoggle{display:flex;margin-left:auto}
    .nav-inner{gap:14px;position:relative;flex-wrap:wrap}
    .btn-cta{order:3}
  }
  @media(max-width:760px){
    .wrap{padding-left:20px;padding-right:20px}
    section{padding:64px 0}
    .section-head{margin-bottom:34px}
    .section-head h2{font-size:30px}
    .hero h1{font-size:34px}
    .hero p.sub{font-size:17px}
    .cards-2,.cards-3,.cards-4{grid-template-columns:1fr}
    .hero-stats{grid-template-columns:1fr 1fr;gap:24px}
    .lb-row{grid-template-columns:34px 1fr auto;gap:10px;padding:13px 16px}
    .lb-row .lb-score{display:none}
    .lb-row .trk{grid-column:2;justify-self:start;margin-top:2px}
    .lb-mini{display:inline-block;font-family:var(--serif);font-weight:800;font-size:15px;color:var(--teal)}
    .foot-inner{gap:20px}
    footer .rights{margin-left:0;width:100%}
  }
  @media(max-width:760px){ .lb-row .lb-score.keep{display:flex;grid-column:1/-1} }
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
</style>
</head>
<body>
  <!-- ================= NAV ================= -->
  <nav class="nav" aria-label="Asosiy navigatsiya">
    <div class="wrap nav-inner">
      <a href="#top" class="brand" aria-label="Iqror IT MED School">
        <svg class="mark" viewBox="0 0 40 49" fill="none" aria-hidden="true">
          <rect x="2" y="0" width="36" height="9" rx="2" fill="#1E8E7E"></rect>
          <path d="M2 13 H38 V21.5 L20 36.5 L2 21.5 Z" fill="#EDB84C"></path>
          <path d="M20 38.5 L26 43.7 L20 49 L14 43.7 Z" fill="#1E8E7E"></path>
        </svg>
        <span><b>IQROR</b><small>IT · MED SCHOOL</small></span>
      </a>
      <button class="navtoggle" id="navtoggle" aria-label="Menyu" aria-expanded="false">☰</button>
      <div class="nav-links" id="navlinks">
        <a href="#yonalishlar" data-t="nav_courses"></a>
        <a href="#natijalar" data-t="nav_results"></a>
        <a href="#oqituvchilar" data-t="nav_teachers"></a>
        <a href="#yutuqlar" data-t="nav_awards"></a>
        <a href="#hayot" data-t="nav_life"></a>
        <a href="#aloqa" data-t="nav_contact"></a>
      </div>
      <div class="langsw" role="group" aria-label="Til / Язык">
        <button id="lang-uz" data-lang="uz">UZ</button>
        <button id="lang-ru" data-lang="ru">RU</button>
      </div>
      <a href="#aloqa" class="btn-cta" data-t="cta_enroll"></a>
    </div>
  </nav>

function applyText(){
  const t = T[lang];
  $$("[data-t]").forEach(el=>{const v=t[el.dataset.t];if(v!=null)el.textContent=v;});

function renderHeroStats(){

function renderLeaderboard(){

  const subjArr = (s.subjects && s.subjects.length) ? s.subjects : (SUBJECTS[s.tr]||[]).map((n,i)=>({uz:n.uz,ru:n.ru,s:(s.sc||[])[i]}));

window.IqrorPublic = {
  apply(d){
    if(Array.isArray(d.students)) STUDENTS = d.students;

$("#search-form").addEventListener("submit",e=>{
  e.preventDefault();
  const q=$("#search-input").value.trim().toLowerCase();
  if(!q){foundStudent=null;searched=false;renderSearchResult();return;}
  const digits=q.replace(/\D/g,"");
  foundStudent = STUDENTS.find(s=>
    s.id.toLowerCase()===q ||
    (digits.length>=4 && s.id.replace(/\D/g,"")===digits) ||
    s.name.toLowerCase().includes(q)
  )||null;
  searched=true; renderSearchResult();
  try{if(window.IqrorFB&&window.IqrorFB.event)window.IqrorFB.event("result_search",{found:!!foundStudent});}catch(e){}
});
$("#enroll-form").addEventListener("submit",async e=>{

  const f=e.currentTarget;

  const th=$("#form-thanks");
  th.textContent=T[lang].f_thanks; th.hidden=false;
  f.querySelector("button").disabled=true;
  try{ if(window.IqrorFB&&window.IqrorFB.submitEnrollment) await window.IqrorFB.submitEnrollment(data); }catch(err){}
  setTimeout(()=>{f.reset();f.querySelector("button").disabled=false;renderDirs();},2500);
});

/* Sahifa marshruti — har bo'lim alohida oyna (sahifa) bo'lib ochiladi */
const PAGES = ['top','yonalishlar','natijalar','oqituvchilar','yutuqlar','hayot','aloqa'];
function route(){
  let h=(location.hash||'').replace('#','');
  if(h==='home'||h==='') h='top';
  if(!PAGES.includes(h)) h='top';
  PAGES.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=(id===h)?'':'none'; });
  document.querySelectorAll('.nav-links a').forEach(a=>{
    const t=(a.getAttribute('href')||'').replace('#','');
    a.classList.toggle('active', t===h);
  });
  const nl=document.getElementById('navlinks'); if(nl) nl.classList.remove('open');
  const nt=document.getElementById('navtoggle'); if(nt) nt.setAttribute('aria-expanded','false');
  window.scrollTo(0,0);
}
addEventListener('hashchange', route);

/* init */
(function init(){
  try{const s=localStorage.getItem("iqror-lang");if(s==="uz"||s==="ru")lang=s;}catch(e){}
  renderAll();
  route();
})();
</script>

          <input id="am-email" type="email" autocomplete="email" placeholder="Email" style="${inp}">
          <input id="am-pass" type="password" autocomplete="current-password" placeholder="Parol (kamida 6 belgi)" style="${inp}">
          <div id="am-err" style="display:none;background:#fdece3;border:1px solid #f0d3c4;color:#C2410C;border-radius:10px;padding:9px 12px;font-size:13px;margin-top:10px"></div>
          <button id="am-submit" style="width:100%;background:var(--gold);color:var(--teal);border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;margin-top:12px">Kirish</button>
          <div style="text-align:center;font-size:13.5px;color:var(--muted);margin-top:12px">
            <span id="am-toggle-txt">Hisobingiz yo‘qmi?</span>
            <a id="am-toggle" style="color:var(--teal);font-weight:600;cursor:pointer"> Ro‘yxatdan o‘tish</a></div>
        </div>`;
        document.body.appendChild(bg);
        let mode='login';
        const $m=id=>document.getElementById(id);
        const showErr=m=>{ $m('am-err').textContent=m; $m('am-err').style.display='block'; };
        $m('am-x').onclick=()=>bg.remove();
        bg.onclick=e=>{ if(e.target===bg) bg.remove(); };
        $m('am-toggle').onclick=()=>{
          mode = mode==='login'?'register':'login';
          $m('am-title').textContent = mode==='login'?'Kirish':'Ro‘yxatdan o‘tish';
          $m('am-submit').textContent = mode==='login'?'Kirish':'Ro‘yxatdan o‘tish';
          $m('am-namewrap').style.display = mode==='register'?'block':'none';
          $m('am-pass').autocomplete = mode==='register'?'new-password':'current-password';
          $m('am-toggle-txt').textContent = mode==='login'?'Hisobingiz yo‘qmi?':'Hisobingiz bormi?';
          $m('am-toggle').textContent = mode==='login'?' Ro‘yxatdan o‘tish':' Kirish';
          $m('am-err').style.display='none';
        };
        $m('am-google').onclick=()=>{ justLoggedIn=true; signInWithPopup(auth,new GoogleAuthProvider())
          .then(()=>bg.remove()).catch(e=>{ justLoggedIn=false; showErr('Google: '+(e.code||e.message)); }); };
        $m('am-submit').onclick=async()=>{
          const email=$m('am-email').value.trim(), pass=$m('am-pass').value;
          if(!email||!pass){ showErr('Email va parolni kiriting'); return; }
          $m('am-submit').disabled=true; justLoggedIn=true;
          try{
            if(mode==='register'){
              const cred=await createUserWithEmailAndPassword(auth,email,pass);
              const nm=$m('am-name').value.trim(); if(nm){ try{ await updateProfile(cred.user,{displayName:nm}); }catch(e){} }
              // Email tasdiqlash havolasi yuborilmaydi (chalkashlik oldini olish uchun) — tekshiruvni admin panelda "Tasdiqlangan" orqali qiladi
            } else { await signInWithEmailAndPassword(auth,email,pass); }
            bg.remove();
          }catch(e){
            justLoggedIn=false; $m('am-submit').disabled=false;
            const c=e.code||''; let m='Xatolik: '+c;
            if(c.includes('email-already-in-use')) m='Bu email allaqachon ro‘yxatdan o‘tgan — “Kirish”ni tanlang.';
            else if(c.includes('invalid-cred')||c.includes('wrong-password')||c.includes('user-not-found')) m='Email yoki parol noto‘g‘ri.';
            else if(c.includes('weak-password')) m='Parol juda kuchsiz (kamida 6 belgi).';
            else if(c.includes('invalid-email')) m='Email formati noto‘g‘ri.';
            showErr(m);
          }
        };
      }
      function askRole(user){
        if(document.getElementById('role-modal')) return;
        const bg=document.createElement('div'); bg.id='role-modal';
        bg.style.cssText='position:fixed;inset:0;background:rgba(9,58,52,.55);display:grid;place-items:center;z-index:100;padding:18px';
        bg.innerHTML=`<div style="background:#fff;border-radius:18px;max-width:440px;width:100%;padding:28px;box-shadow:0 12px 32px rgba(13,81,72,.2);font-family:var(--sans)">
          <h3 style="font-family:var(--serif);font-size:22px;margin:0 0 6px;color:var(--ink)">Rolingizni tanlang</h3>
          <p style="color:var(--muted);font-size:14.5px;margin:0 0 18px">Iqror maktabida kimsiz? Administrator keyin maktab ma'lumotlari asosida tekshiradi va kerak bo‘lsa to‘g‘rilaydi.</p>
          <div style="display:flex;flex-direction:column;gap:10px">
            ${[['parent','👨‍👩‍👧 Ota-ona'],['student','🎓 O‘quvchi'],['teacher','👩‍🏫 O‘qituvchi']].map(r=>`<button data-role="${r[0]}" style="text-align:left;border:1px solid var(--border);background:var(--bg);border-radius:12px;padding:14px 16px;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer">${r[1]}</button>`).join('')}
          </div></div>`;
        document.body.appendChild(bg);
        bg.querySelectorAll('[data-role]').forEach(btn=>btn.onclick=async()=>{
          try{ await setDoc(doc(db,'users',user.uid), { email:user.email, name:user.displayName||user.email, role:btn.dataset.role, verified:false, createdAt: serverTimestamp() });
            bg.remove(); setAuthUI({ name:user.displayName||user.email, role:btn.dataset.role });
            try{ window.IqrorFB && window.IqrorFB.event('role_selected',{role:btn.dataset.role}); }catch(e){}
          }catch(e){ alert('Saqlab bo‘lmadi: '+(e.code||e.message)); }
        });
      }
    }
  }
</script>
</body>
</html>

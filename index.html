<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Iqror Academy — IT va MED yo‘nalishlarida kuchli maktab ta'limi</title>
<meta name="description" content="Iqror Academy — IT va MED yo‘nalishlarida chuqurlashtirilgan ta'lim. Ochiq natijalar, reytinglar, o‘qituvchilar va yutuqlar bitta platformada.">
<meta name="theme-color" content="#155A4E">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Iqror Academy">
<meta property="og:title" content="Iqror Academy">
<meta property="og:description" content="IT va MED yo‘nalishlarida natijaga yo‘naltirilgan zamonaviy maktab.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 458.82 522.7'%3E%3Crect x='0' y='0' width='458.82' height='115.76' fill='%231F9982'/%3E%3Cpolygon points='118.69,411.72 0,288.91 0,175.52 458.82,175.52 458.82,289.07 341.08,410.90 230.28,296.26' fill='%23F6C05E'/%3E%3Cpolygon points='159.91,451.95 230.65,381.21 301.40,451.95 230.65,522.70' fill='%231F9982'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F1; --ink:#1C2723; --teal:#236B5D; --teal-2:#4E9184; --teal-d:#16453B;
    --gold:#E2B562; --gold-d:#CFA24C; --muted:#64706A; --border:#E7EAE6; --border-2:#F0F2EC;
    --white:#FFFFFF; --it-bg:#EAF2EF; --it-fg:#236B5D; --med-bg:#F7F1E3; --med-fg:#977322;
    --serif:'Roboto Condensed',system-ui,sans-serif; --sans:'Roboto Condensed',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --wrap:1240px; --shadow:0 10px 28px rgba(18,42,32,0.08);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
  img{max-width:100%;display:block}
  a{color:inherit}
  ::selection{background:var(--gold);color:var(--teal)}
  h1,h2,h3{font-family:var(--serif);margin:0;text-wrap:balance}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .reveal{animation:fadeUp .7s ease both}
  /* Sahifalar (bo'limlar) almashinuvi uchun yumshoq o'tish */
  @keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .page-enter{animation:pageIn .5s cubic-bezier(.22,.61,.36,1) both;will-change:opacity,transform}
  @media(prefers-reduced-motion:reduce){.reveal,.page-enter{animation:none}}
  input:focus,select:focus,button:focus-visible,a:focus-visible{outline:2px solid var(--teal-2);outline-offset:2px}
  .wrap{max-width:var(--wrap);margin:0 auto;padding-left:32px;padding-right:32px}
  .kicker{display:inline-flex;align-items:center;gap:9px;color:var(--teal-2);font-weight:600;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px}
  .kicker::before{content:"";width:18px;height:1.5px;background:currentColor;border-radius:2px;flex:0 0 auto}
  .section-head{max-width:640px;margin-bottom:48px}
  .section-head h2{font-weight:400;font-size:40px;line-height:1.18;letter-spacing:0;margin-bottom:16px}
  .section-head p{font-size:17px;line-height:1.65;color:var(--muted);margin:0}
  section{padding:96px 0}

  /* ---- NAV ---- */
  .nav{position:sticky;top:0;z-index:60;background:rgba(246,243,235,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-inner{display:flex;align-items:center;gap:18px;padding-top:14px;padding-bottom:14px}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink)}
  .brand .mark{width:32px;height:auto;flex:0 0 auto}
  .brand b{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:.04em;display:block;line-height:1}
  .brand small{font-size:10px;font-weight:600;letter-spacing:.18em;color:var(--teal-2);margin-top:3px;display:block}
  .nav-links{display:flex;gap:15px;margin-left:auto;font-size:14px;font-weight:500;order:2}
  .nav-links a{color:var(--ink);text-decoration:none;transition:color .15s;white-space:nowrap}
  .nav-links a:hover{color:var(--teal-2)}
  .nav-links a.active{color:var(--teal-2);font-weight:700}
  .langsw{display:flex;gap:2px;background:#E9E4D6;border-radius:999px;padding:3px}
  .langsw button{border:none;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);background:transparent;color:var(--muted);transition:.15s}
  .langsw button.on{background:var(--teal);color:#fff}
  .btn-cta{background:var(--gold);color:var(--teal);font-weight:700;font-size:14px;padding:10px 20px;border-radius:10px;text-decoration:none;transition:background .15s;white-space:nowrap}
  .btn-cta:hover{background:var(--gold-d)}
  .navtoggle{display:none;border:1px solid var(--border);background:var(--white);border-radius:10px;width:44px;height:44px;cursor:pointer;font-size:20px;align-items:center;justify-content:center;flex:0 0 auto}
  /* Desktop: nav-drop sheffofdek — bolalari to'g'ridan-to'g'ri nav-inner flex ichida */
  .nav-drop{display:contents}
  .brand{order:0}
  .langsw{order:3}
  .btn-cta{order:4}
  #auth-ui{order:5;display:flex;align-items:center;gap:8px}
  .navtoggle{order:6}

  /* ---- HERO ---- */
  .hero{background:linear-gradient(160deg,#1A6355 0%,#155249 60%,#13483F 100%);color:#fff;position:relative;overflow:hidden}
  .hero .ghost{position:absolute;right:-80px;top:-60px;opacity:.07;pointer-events:none}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:64px;align-items:center;padding:88px 0 0;position:relative}
  .badge-pill{display:inline-block;background:rgba(237,184,76,.16);border:1px solid rgba(237,184,76,.5);color:var(--gold);font-size:13px;font-weight:600;letter-spacing:.06em;padding:7px 16px;border-radius:999px}
  .hero h1{font-weight:300;font-size:56px;line-height:1.14;letter-spacing:0;margin:24px 0 22px}
  .hero p.sub{font-size:18.5px;line-height:1.65;color:rgba(255,255,255,.82);max-width:52ch;margin:0 0 36px}
  .hero-btns{display:flex;gap:14px;flex-wrap:wrap}
  .btn-gold{background:var(--gold);color:var(--teal);font-weight:700;font-size:16px;padding:15px 30px;border-radius:12px;text-decoration:none;transition:background .15s}
  .btn-gold:hover{background:var(--gold-d)}
  .btn-ghost{border:1.5px solid rgba(255,255,255,.35);color:#fff;font-weight:600;font-size:16px;padding:15px 30px;border-radius:12px;text-decoration:none;transition:.15s}
  .btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.06)}
  .hero-visual{height:420px;border-radius:20px;background:
      radial-gradient(120% 120% at 80% 10%,rgba(237,184,76,.22),transparent 55%),
      linear-gradient(150deg,#1C6E5F,#154C44);
      border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;position:relative;overflow:hidden}
  .hero-visual .emblem{width:150px;height:auto;opacity:.96;filter:drop-shadow(0 12px 30px rgba(0,0,0,.35))}
  .hero-visual .cap{position:absolute;bottom:20px;left:24px;right:24px;font-size:13.5px;color:rgba(255,255,255,.72)}
  .hero-stats{border-top:1px solid rgba(255,255,255,.16);display:grid;grid-template-columns:repeat(4,1fr);gap:32px;padding:32px 0 56px;margin-top:64px}
  .hero-stats .v{font-family:var(--serif);font-weight:700;font-size:40px;color:var(--gold)}
  .hero-stats .l{font-size:14.5px;color:rgba(255,255,255,.72);margin-top:6px}

  /* ---- CARDS / COURSES ---- */
  .cards-2{display:grid;grid-template-columns:1fr 1fr;gap:28px}
  .course-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;display:flex;flex-direction:column;gap:20px;transition:.18s}
  .course-card:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .course-card .top{display:flex;align-items:center;gap:16px}
  .course-card .ic{width:52px;height:52px;border-radius:14px;background:var(--teal);display:grid;place-items:center;flex:0 0 auto}
  .course-card h3{font-weight:700;font-size:26px}
  .course-card p{font-size:15.5px;line-height:1.65;color:var(--muted);margin:0}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13.5px;font-weight:600;padding:7px 14px;border-radius:999px}
  .chip.it{background:var(--it-bg);color:var(--it-fg)}
  .chip.med{background:var(--med-bg);color:var(--med-fg)}
  .card-meta{margin-top:auto;padding-top:16px;border-top:1px dashed var(--border);font-size:14px;font-weight:600;color:var(--teal-2)}

  /* ---- RESULTS ---- */
  .band{background:var(--white);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .results-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:28px;align-items:start}
  .lb{background:var(--bg);border:1px solid var(--border);border-radius:20px;overflow:hidden}
  .lb-head{display:flex;align-items:baseline;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--border)}
  .lb-head h3{font-weight:700;font-size:20px}
  .lb-head span{font-size:13px;font-weight:600;color:var(--muted)}
  .lb-row{display:grid;grid-template-columns:44px 1fr 116px 150px;gap:14px;align-items:center;padding:13px 26px;border-bottom:1px solid var(--border-2)}
  .lb-row .rank{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:15px}
  .lb-row .nm{font-weight:600;font-size:15px}
  .lb-row .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .trk{justify-self:start;font-size:12px;font-weight:700;letter-spacing:.08em;padding:5px 12px;border-radius:999px}
  .trk.it{background:var(--it-bg);color:var(--it-fg)} .trk.med{background:var(--med-bg);color:var(--med-fg)}
  .lb-score{display:flex;align-items:center;gap:10px}
  .lb-bar{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden}
  .lb-bar>i{display:block;height:100%;background:var(--teal-2);border-radius:99px}
  .lb-score b{font-family:var(--serif);font-weight:700;font-size:15px;width:32px;text-align:right}
  .search-card{background:var(--teal);color:#fff;border-radius:20px;padding:32px;position:sticky;top:92px}
  .search-card h3{font-weight:700;font-size:20px;margin-bottom:8px}
  .search-card p{font-size:13.5px;color:rgba(255,255,255,.65);margin:0 0 20px;line-height:1.5}
  .search-form{display:flex;gap:10px;margin-bottom:20px}
  .search-form input{flex:1;border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-family:var(--sans);background:#fff;color:var(--ink)}
  .search-form button{background:var(--gold);color:var(--teal);border:none;border-radius:10px;padding:0 20px;font-weight:700;font-size:14.5px;font-family:var(--sans);cursor:pointer;transition:.15s}
  .search-form button:hover{background:var(--gold-d)}
  .notfound{background:rgba(237,184,76,.12);border:1px solid rgba(237,184,76,.4);border-radius:12px;padding:14px 16px;font-size:14px;color:var(--gold)}
  .found{background:#fff;color:var(--ink);border-radius:14px;padding:24px}
  .found .fh{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .found .fh b{font-family:var(--serif);font-weight:700;font-size:19px}
  .found .fid{background:var(--it-bg);color:var(--teal);font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap;margin-left:auto}
  .found-photo{width:52px;height:52px;border-radius:50%;overflow:hidden;flex:0 0 auto;border:1px solid var(--border)}
  .found-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .found .fg{font-size:13px;color:var(--muted);margin-bottom:18px}
  .found .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .found .metrics .m{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
  .found .metrics .m b{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--teal);display:block}
  .found .metrics .m span{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}
  .found .subs-l{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .subrow{display:grid;grid-template-columns:130px 1fr 34px;gap:10px;align-items:center;margin-bottom:10px}
  .subrow span:first-child{font-size:13.5px;font-weight:500}
  .subrow .sb{height:6px;background:var(--border-2);border-radius:99px;overflow:hidden}
  .subrow .sb>i{display:block;height:100%;background:var(--gold);border-radius:99px}
  .subrow b{font-weight:700;font-size:13.5px;text-align:right}

  /* ---- TEACHERS ---- */
  .cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .tcard{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:14px;transition:.18s}
  .tcard:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .tcard .top{display:flex;align-items:center;gap:16px}
  .avatar{width:72px;height:72px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:24px;color:var(--teal);background:var(--it-bg)}
  .avatar.photo{background:none;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .tcard .nm{font-family:var(--serif);font-weight:700;font-size:18px}
  .tcard .subj{font-size:13.5px;color:var(--teal-2);font-weight:600;margin-top:3px}
  .stars{color:var(--gold);font-size:17px;letter-spacing:2px}
  .rating{font-family:var(--serif);font-weight:700;font-size:17px}
  .votes{font-size:12.5px;color:var(--muted)}
  .tstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px dashed var(--border);padding-top:14px}
  .tstats b{font-weight:700;font-size:16px} .tstats span{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}

  /* ---- ACHIEVEMENTS ---- */
  .ach{background:linear-gradient(160deg,#22705F,#18544A);color:#fff}
  .ach .kicker{color:var(--gold)}
  .ach h2{color:#fff}
  .ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
  .ach h3.col{font-family:var(--serif);font-weight:700;font-size:18px;margin-bottom:28px;color:rgba(255,255,255,.85)}
  .tl-item{display:grid;grid-template-columns:76px 1fr;gap:24px;padding:18px 0 18px 28px;border-left:2px solid rgba(237,184,76,.35);position:relative}
  .tl-item .dot{position:absolute;left:-6px;top:26px;width:10px;height:10px;border-radius:50%;background:var(--gold)}
  .tl-item .yr{font-family:var(--serif);font-weight:700;font-size:19px;color:var(--gold)}
  .tl-item .tx{font-size:15.5px;line-height:1.55;color:rgba(255,255,255,.88)}
  .sa{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px 24px;display:grid;grid-template-columns:44px 1fr auto;gap:18px;align-items:center;margin-bottom:14px}
  .sa .st{width:44px;height:44px;border-radius:50%;background:rgba(237,184,76,.16);border:1px solid rgba(237,184,76,.5);display:grid;place-items:center;color:var(--gold);font-size:18px}
  .sa .nm{font-weight:600;font-size:15.5px}
  .sa .tx{font-size:13.5px;color:rgba(255,255,255,.65);margin-top:3px;line-height:1.5}
  .sa .yr{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--gold)}

  /* ---- NEWS ---- */
  .cards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
  .news{background:var(--white);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:.18s}
  .news:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .news .thumb{height:160px;display:grid;place-items:center;background:linear-gradient(150deg,#1C6E5F,#154C44)}
  .news .thumb svg{width:44px;height:54px;opacity:.9}
  .news .thumb.has-img{display:block}
  .news .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .news .body{padding:20px 22px 24px;display:flex;flex-direction:column;gap:10px;flex:1}
  .news .row{display:flex;align-items:center;gap:10px}
  .news .tag{background:var(--it-bg);color:var(--teal);font-size:11.5px;font-weight:700;letter-spacing:.06em;padding:4px 10px;border-radius:999px}
  .news .date{font-size:12.5px;color:var(--muted)}
  .news h3{font-weight:700;font-size:16.5px;line-height:1.4}

  /* ---- CONTACT ---- */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
  .contact-info{display:flex;flex-direction:column;gap:20px;font-size:15.5px}
  .contact-info .r{display:grid;grid-template-columns:130px 1fr;gap:16px}
  .contact-info .r span.l{color:var(--muted);font-weight:600}
  .contact-info a{color:var(--teal);font-weight:700;text-decoration:none}
  .form{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:36px;display:flex;flex-direction:column;gap:18px}
  .form h3{font-weight:700;font-size:22px;margin-bottom:4px}
  .form label{display:flex;flex-direction:column;gap:8px;font-size:13.5px;font-weight:600;color:var(--muted)}
  .form input,.form select{border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;font-family:var(--sans);background:#fff;color:var(--ink)}
  .form button{background:var(--gold);color:var(--teal);border:none;border-radius:12px;padding:15px;font-weight:700;font-size:16px;font-family:var(--sans);cursor:pointer;margin-top:6px;transition:.15s}
  .form button:hover{background:var(--gold-d)}
  .form .thanks{background:var(--it-bg);border:1px solid var(--teal-2);color:var(--teal);border-radius:12px;padding:14px 16px;font-size:14.5px;font-weight:600}

  /* ---- IMKONIYATLAR (Facilities) ---- */
  .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .feat{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:12px;transition:.18s}
  .feat:hover{border-color:var(--teal-2);box-shadow:var(--shadow);transform:translateY(-2px)}
  .feat .fi{width:54px;height:54px;border-radius:14px;background:var(--it-bg);display:grid;place-items:center;flex:0 0 auto}
  .feat .fi svg{width:28px;height:28px;fill:var(--teal-2)}
  .feat h3{font-weight:600;font-size:19px}
  .feat p{font-size:14.5px;line-height:1.6;color:var(--muted);margin:0}
  .feat .fnote{margin-top:auto;font-size:13px;font-weight:600;color:var(--teal-2);padding-top:6px}

  /* ---- SINF NATIJALARI (Class results) ---- */
  .class-panel{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:28px}
  .cp-head h3{font-weight:600;font-size:22px;margin-bottom:6px}
  .cp-head p{font-size:14.5px;color:var(--muted);margin:0 0 20px;line-height:1.55}
  .cp-selects{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .cp-selects label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--muted)}
  .cp-selects select{border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:var(--sans);background:#fff;color:var(--ink);cursor:pointer}
  .cp-selects select:disabled{opacity:.55;cursor:not-allowed;background:var(--bg)}
  .cls-summary{display:flex;flex-wrap:wrap;gap:12px;margin:22px 0 16px}
  .cls-summary .cs{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 18px;min-width:118px}
  .cls-summary .cs b{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--teal);display:block;line-height:1.1}
  .cls-summary .cs span{font-size:12px;color:var(--muted)}
  .cls-table{border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .cls-row{display:grid;grid-template-columns:40px 1fr 108px 104px;gap:12px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border-2);font-size:14.5px}
  .cls-row:last-child{border-bottom:none}
  .cls-row.hd{background:var(--bg);font-weight:600;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .cls-row .cr-rank{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:14px;background:var(--it-bg);color:var(--teal)}
  .cls-row .cr-nm{font-weight:600}
  .cls-row .cr-nm small{display:block;font-weight:400;font-size:12px;color:var(--muted)}
  .cls-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
  .cls-bar>i{display:block;height:100%;background:var(--teal-2);border-radius:99px}
  .cls-detailbtn{background:var(--it-bg);color:var(--teal);border:none;border-radius:8px;padding:7px 10px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:.15s}
  .cls-detailbtn:hover{background:#DCEBE7}
  .cls-empty{background:var(--bg);border:1px dashed var(--border);border-radius:12px;padding:26px;text-align:center;color:var(--muted);font-size:14.5px;margin-top:20px}
  .cls-detail{margin-top:16px}
  /* Kabinet — davomat */
  .kab-att-card{margin-top:16px;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px}
  .kab-att-card .subs-l{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .kab-att-card .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kab-att-card .metrics .m{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
  .kab-att-card .metrics .m b{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--teal);display:block}
  .kab-att-card .metrics .m span{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}
  .att-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);margin-bottom:10px}
  .att-legend span{display:inline-flex;align-items:center;gap:5px}
  .att-legend i,.att-chip i{width:9px;height:9px;border-radius:50%;display:inline-block;flex:0 0 auto}
  .att-recent{display:flex;flex-wrap:wrap;gap:7px}
  .att-chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 9px}
  /* Kabinet: bir nechta farzand */
  .kab-children{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:6px}
  .kab-children-l{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .kab-children-l .kab-cnt{background:var(--teal);color:#fff;border-radius:99px;padding:1px 8px;font-size:11px;margin-left:6px;letter-spacing:0}
  .kab-chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .kab-chip{display:inline-flex;align-items:stretch;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg);transition:border-color .18s,box-shadow .18s}
  .kab-chip.on{border-color:var(--teal-2);box-shadow:0 3px 10px rgba(21,90,78,.14)}
  .kab-chip-main{border:none;background:transparent;padding:9px 13px;cursor:pointer;text-align:left;font-family:var(--sans);display:flex;flex-direction:column;gap:1px;min-width:0}
  .kab-chip-main b{font-size:14px;color:var(--ink);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
  .kab-chip-main span{font-size:11.5px;color:var(--muted);font-weight:600}
  .kab-chip.on .kab-chip-main b{color:var(--teal)}
  .kab-chip-x{border:none;border-left:1px solid var(--border);background:transparent;color:var(--muted);font-size:18px;line-height:1;cursor:pointer;padding:0 11px}
  .kab-chip-x:hover{background:#fbeae1;color:#C2410C}
  .kab-add{max-width:420px}
  .kab-add .search-form{display:flex;gap:8px}
  .kab-add .search-form input{flex:1;min-width:0}
  /* Kabinet: baholar jadvali + grafik */
  .gtable-wrap{overflow-x:auto;margin-bottom:14px}
  .gtable{width:100%;border-collapse:collapse;font-size:13.5px;min-width:340px}
  .gtable th{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:8px 6px;text-align:center;border-bottom:1px solid var(--border)}
  .gtable th:first-child{text-align:left}
  .gtable td{padding:7px 6px;text-align:center;border-bottom:1px solid var(--border)}
  .gtable tbody tr:last-child td{border-bottom:none}
  .gtable .gsub{font-weight:600;color:var(--ink);text-align:left}
  .gtable .gavg{font-weight:700;color:var(--teal)}
  .gtable .gcell{font-weight:700;color:var(--muted)}
  .gtable .gcell.g5{color:#1F9982}.gtable .gcell.g4{color:#2E9A88}.gtable .gcell.g3{color:#B98A2E}.gtable .gcell.g2{color:#C86A3A}
  .gchart{background:var(--bg);border-radius:12px;padding:14px 12px 6px}
  .gchart-t{font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
  /* Kabinet: dars jadvali + uy vazifalari */
  .ktt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .ktt-day{background:var(--bg);border-radius:10px;padding:12px 14px}
  .ktt-day-h{font-weight:700;font-size:13px;color:var(--teal);margin-bottom:8px}
  .ktt-row{display:flex;gap:10px;font-size:13.5px;padding:3px 0}
  .ktt-time{color:var(--muted);min-width:52px;flex:0 0 auto}
  .ktt-subj{color:var(--ink);font-weight:500;overflow-wrap:anywhere}
  @media(max-width:560px){ .ktt-grid{grid-template-columns:1fr} }
  .khw-list{display:flex;flex-direction:column;gap:10px}
  .khw-item{background:var(--bg);border-radius:10px;padding:12px 14px}
  .khw-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:4px}
  .khw-subj{font-weight:700;font-size:13.5px;color:var(--teal)}
  .khw-due{font-size:12px;color:var(--muted);flex:0 0 auto}
  .khw-text{font-size:14px;color:var(--ink);overflow-wrap:anywhere}

  /* ---- FOOTER ---- */
  footer{background:var(--teal-d);color:rgba(255,255,255,.75)}
  .foot-inner{display:flex;align-items:center;gap:40px;padding:56px 0 40px;flex-wrap:wrap}
  footer .brand b{color:#fff;font-size:20px}
  footer .brand small{color:var(--gold);font-size:9px}
  footer p{font-size:14px;margin:0;max-width:44ch}
  footer .rights{margin-left:auto;font-size:13px}

  /* ---- RESPONSIVE ---- */
  @media(max-width:1000px){
    .hero-grid{grid-template-columns:1fr;gap:36px;padding-top:56px}
    .hero h1{font-size:42px}
    .results-grid{grid-template-columns:1fr}
    .search-card{position:static}
    .ach-grid{grid-template-columns:1fr;gap:40px}
    .contact-grid{grid-template-columns:1fr;gap:40px}
    .cards-3{grid-template-columns:1fr 1fr}
    .cards-4{grid-template-columns:1fr 1fr}
    .feat-grid{grid-template-columns:1fr 1fr}
    /* Mobil nav: brand chapda | UZ-RU markazda | hamburger o'ngda */
    .nav-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;position:relative}
    .brand{justify-self:start}
    .langsw{justify-self:center;margin:0}
    .navtoggle{display:flex;justify-self:end}
    /* Qolgan hamma narsa hamburger menyusida (nav-drop) */
    .nav-drop{display:none;position:absolute;top:100%;left:0;right:0;flex-direction:column;background:var(--bg);border-bottom:1px solid var(--border);box-shadow:0 14px 26px rgba(13,81,72,.10);padding:6px 0;gap:0;z-index:70}
    .nav-drop.open{display:flex}
    .nav-links{position:static;display:flex;flex-direction:column;gap:0;margin:0;width:100%;font-size:15.5px}
    .nav-links a{padding:14px 24px;border-top:1px solid var(--border-2)}
    .nav-links a:first-child{border-top:none}
    .btn-cta{margin:12px 24px 6px;text-align:center;padding:13px}
    #auth-ui{width:auto;flex-wrap:wrap;justify-content:center;gap:8px;padding:12px 24px 6px;border-top:1px solid var(--border-2)}
    #auth-chip{flex-wrap:wrap;justify-content:center}
  }
  @media(max-width:760px){
    .wrap{padding-left:20px;padding-right:20px}
    section{padding:64px 0}
    .section-head{margin-bottom:34px}
    .section-head h2{font-size:30px}
    .hero h1{font-size:34px}
    .hero p.sub{font-size:17px}
    .cards-2,.cards-3,.cards-4,.feat-grid{grid-template-columns:1fr}
    .cp-selects{grid-template-columns:1fr}
    .cls-row{grid-template-columns:32px 1fr 66px;gap:10px;padding:11px 14px}
    .cls-row .cr-act{display:none}
    .hero-stats{grid-template-columns:1fr 1fr;gap:24px}
    .lb,.search-card,.results-grid>*{min-width:0}
    .lb-row{display:flex;align-items:center;gap:11px;padding:12px 16px}
    .lb-row .rank{flex:0 0 auto;width:34px;height:34px}
    .lb-row>div:not(.lb-score){flex:1 1 auto;min-width:0}
    .lb-row .nm{white-space:normal;overflow-wrap:anywhere}
    .lb-row .sub{white-space:normal}
    .lb-row .trk{flex:0 0 auto}
    .lb-row .lb-score{flex:0 0 auto;gap:0}
    .lb-row .lb-score .lb-bar{display:none}
    .lb-row .lb-score b{font-size:16px;width:auto}
    .search-card{padding:24px 22px}
    .search-form input{min-width:0}
    .found .metrics{gap:8px}
    .foot-inner{gap:20px}
    footer .rights{margin-left:0;width:100%}
  }
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
</style>
</head>

          <p data-t="cls_hint"></p>
        </div>

function renderClsControls(){
  const t=T[lang];
  const langSel=$("#cls-lang"), gSel=$("#cls-grade"), grpSel=$("#cls-group");
  if(!langSel||!gSel||!grpSel) return;
  const list = STUDENTS.filter(s=>s.lng);
  const langs = [...new Set(list.map(s=>s.lng))];
  const opt = (v,label,sel)=>`<option value="${esc(v)}"${String(v)===String(sel)?' selected':''}>${esc(label)}</option>`;
  const ph = `<option value="">${esc(t.cls_pick)}</option>`;
  langSel.innerHTML = ph + langs.map(l=>opt(l, l==="ru"?t.cls_ru:t.cls_uz, clsSel.lng)).join("");
  if(clsSel.lng){
    const grades=[...new Set(list.filter(s=>s.lng===clsSel.lng).map(s=>s.g))].sort((a,b)=>a-b);
    gSel.disabled=false;
    gSel.innerHTML = ph + grades.map(g=>opt(g, Number(g)===0?t.cls_prep:t.grade(g), clsSel.g)).join("");
  } else { gSel.disabled=true; gSel.innerHTML=ph; }
  if(clsSel.lng && clsSel.g!==""){
    const groups=[...new Set(list.filter(s=>s.lng===clsSel.lng && String(s.g)===String(clsSel.g)).map(s=>s.cls))].sort();
    grpSel.disabled=false;
    grpSel.innerHTML = ph + groups.map(c=>opt(c, c, clsSel.cls)).join("");
  } else { grpSel.disabled=true; grpSel.innerHTML=ph; }
}
function renderClsResults(){
  const t=T[lang], box=$("#class-results"); if(!box) return;
  if(!(clsSel.lng && clsSel.g!=="" && clsSel.cls)){ box.innerHTML=`<div class="cls-empty">${esc(t.cls_prompt)}</div>`; return; }
  const rows = STUDENTS.filter(s=>s.lng===clsSel.lng && String(s.g)===String(clsSel.g) && s.cls===clsSel.cls).sort((a,b)=>b.score-a.score);
  if(!rows.length){ box.innerHTML=`<div class="cls-empty">${esc(t.cls_none)}</div>`; return; }
  const avg = Math.round(rows.reduce((s,x)=>s+(Number(x.score)||0),0)/rows.length);
  const avgAtt = Math.round(rows.reduce((s,x)=>s+(Number(x.att)||0),0)/rows.length);
  const head = `<div class="cls-row hd"><span>#</span><span class="cr-nm">${esc(t.cls_c_name)}</span><span class="cr-score">${esc(t.cls_c_score)}</span><span class="cr-act"></span></div>`;
  const body = rows.map((s,i)=>`<div class="cls-row">
      <div class="cr-rank">${i+1}</div>
      <div class="cr-nm">${esc(s.name)}<small>${esc(s.id)}${s.tr?' · '+esc(s.tr):''} · ${esc(t.cls_att_short)} ${Number(s.att)||0}%</small></div>
      <div class="cr-score"><b class="lb-mini">${Number(s.score)||0}</b><div class="cls-bar"><i style="width:${Number(s.score)||0}%"></i></div></div>
      <div class="cr-act"><button class="cls-detailbtn" data-cid="${esc(s.id)}">${esc(t.cls_detail)}</button></div>
    </div>`).join("");
  box.innerHTML = `<div class="cls-summary">
      <div class="cs"><b>${rows.length}</b><span>${esc(t.cls_sum_count)}</span></div>
      <div class="cs"><b>${avg}</b><span>${esc(t.cls_sum_avg)}</span></div>
      <div class="cs"><b>${avgAtt}%</b><span>${esc(t.cls_sum_att)}</span></div>
    </div>
    <div class="cls-table">${head}${body}</div>
    <div class="cls-detail" id="cls-detail"></div>`;
  box.querySelectorAll('[data-cid]').forEach(b=>b.addEventListener('click',()=>renderClsDetail(b.dataset.cid)));
}
function renderClsDetail(id){

  const chips = childIds.map(id=>{ const st=findStudent(id); const nm=st?st.name:id;
    return `<div class="kab-chip ${id===active?'on':''}"><button class="kab-chip-main" data-sel="${esc(id)}"><b>${esc(nm)}</b><span>${esc(id)}</span></button><button class="kab-chip-x" data-rm="${esc(id)}" aria-label="${esc(t.kab_remove)}">×</button></div>`;

function growthChart(qAvg, t){
  const labels=["I","II","III","IV"];
  const pts=qAvg.map((v,i)=>({i,v})).filter(p=>p.v!=null);
  if(!pts.length) return "";
  const W=320,H=124,padL=24,padR=12,padT=14,padB=26,ymin=2,ymax=5;
  const x=i=>padL+(i/3)*(W-padL-padR);
  const y=v=>padT+(1-(Math.max(ymin,Math.min(ymax,v))-ymin)/(ymax-ymin))*(H-padT-padB);
  const grid=[2,3,4,5].map(g=>`<line x1="${padL}" y1="${y(g).toFixed(1)}" x2="${W-padR}" y2="${y(g).toFixed(1)}" stroke="var(--border)" stroke-width="1"/><text x="${padL-6}" y="${(y(g)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--muted)">${g}</text>`).join('');
  const xlab=labels.map((l,i)=>`<text x="${x(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${l}</text>`).join('');
  const path=pts.map((p,k)=>`${k?'L':'M'}${x(p.i).toFixed(1)},${y(p.v).toFixed(1)}`).join(' ');
  const dots=pts.map(p=>`<circle cx="${x(p.i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="4" fill="#155A4E"/><text x="${x(p.i).toFixed(1)}" y="${(y(p.v)-9).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="#155A4E">${p.v.toFixed(1)}</text>`).join('');
  return `<div class="gchart"><div class="gchart-t">${esc(t.kab_gr_dynamics)}</div><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${esc(t.kab_gr_dynamics)}">${grid}${xlab}<path d="${path}" fill="none" stroke="#2E9A88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg></div>`;
}
async function renderKabGrades(studentId){
  const t=T[lang], box=$("#kab-grades"); if(!box || !(window.IqrorFB&&window.IqrorFB.getGrades)) return;
  box.innerHTML=`<div class="kab-att-card"><div class="subs-l">${esc(t.kab_gr_title)}</div><div class="cls-empty" style="margin:0;padding:16px">${esc(t.kab_gr_loading)}</div></div>`;
  const g=await window.IqrorFB.getGrades(studentId);
  if($("#kab-grades")!==box) return;
  const subjects=(g&&g.subjects)?g.subjects:{};
  const QS=["q1","q2","q3","q4"];
  const gv=v=>{ v=Number(v); return v>0?v:null; };
  const cellCls=v=>{ v=Number(v); return v>=5?'g5':v>=4?'g4':v>=3?'g3':v>=2?'g2':''; };
  const names=Object.keys(subjects).filter(n=>QS.some(q=>gv(subjects[n][q])!=null)).sort((a,b)=>a.localeCompare(b));
  if(!names.length){ box.innerHTML=`<div class="kab-att-card"><div class="subs-l">${esc(t.kab_gr_title)}</div><div class="cls-empty" style="margin:0;padding:16px">${esc(t.kab_gr_none)}</div></div>`; return; }
  const rows=names.map(n=>{
    const cells=QS.map(q=>{ const v=gv(subjects[n][q]); return `<td class="gcell ${v?cellCls(v):''}">${v!=null?v:'—'}</td>`; }).join('');
    const vals=QS.map(q=>gv(subjects[n][q])).filter(x=>x!=null);
    const avg=vals.length?(vals.reduce((s,x)=>s+x,0)/vals.length):null;
    return `<tr><td class="gsub">${esc(n)}</td>${cells}<td class="gavg">${avg!=null?avg.toFixed(1):'—'}</td></tr>`;
  }).join('');
  const qAvg=QS.map(q=>{ const vals=names.map(n=>gv(subjects[n][q])).filter(x=>x!=null); return vals.length?vals.reduce((s,x)=>s+x,0)/vals.length:null; });
  const allVals=names.flatMap(n=>QS.map(q=>gv(subjects[n][q])).filter(x=>x!=null));
  const overall=allVals.length?(allVals.reduce((s,x)=>s+x,0)/allVals.length):null;
  box.innerHTML=`<div class="kab-att-card">
    <div class="subs-l">${esc(t.kab_gr_title)}${g&&g.year?` · ${esc(g.year)}`:''}</div>
    <div class="metrics">
      <div class="m"><b>${overall!=null?overall.toFixed(1):'—'}</b><span>${esc(t.kab_gr_avg)}</span></div>
      <div class="m"><b>${names.length}</b><span>${esc(t.kab_gr_subjects)}</span></div>
      <div class="m"><b>${qAvg.filter(x=>x!=null).length}/4</b><span>${esc(t.kab_gr_quarters)}</span></div>
    </div>
    <div class="gtable-wrap"><table class="gtable"><thead><tr><th>${esc(t.kab_gr_subject)}</th><th>I</th><th>II</th><th>III</th><th>IV</th><th>${esc(t.kab_gr_year)}</th></tr></thead><tbody>${rows}</tbody></table></div>
    ${growthChart(qAvg,t)}
  </div>`;
}

const PAGES = ['top','yonalishlar','imkoniyatlar','natijalar','oqituvchilar','yutuqlar','hayot','aloqa','kabinet'];
function route(animate){
  let h=(location.hash||'').replace('#','');
  if(h==='home'||h==='') h='top';
  if(!PAGES.includes(h)) h='top';
  PAGES.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=(id===h)?'':'none'; });
  document.querySelectorAll('.nav-links a').forEach(a=>{
    const t=(a.getAttribute('href')||'').replace('#','');
    a.classList.toggle('active', t===h);
  });
  const nl=document.getElementById('navdrop'); if(nl) nl.classList.remove('open');
  const nt=document.getElementById('navtoggle'); if(nt) nt.setAttribute('aria-expanded','false');
  // Yangi ochilgan bo'limni yumshoq animatsiya bilan ko'rsatamiz
  const cur=document.getElementById(h);
  if(cur && animate){ cur.classList.remove('page-enter'); void cur.offsetWidth; cur.classList.add('page-enter'); }
  if(h==='kabinet') renderKabinet();
  window.scrollTo({top:0,left:0,behavior:animate?'smooth':'auto'});
}
addEventListener('hashchange', ()=>route(true));

<!-- Firebase: real ma'lumot (Firestore) + analitika + ariza + Gmail login/rol. Oflaynda ham ishlaydi. -->
<script type="module">
  // PWA: network-first service worker — onlaynда doim yangi kontent, oflaynда keshdan.
  try{ if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{}); }catch(e){}

  const V="https://www.gstatic.com/firebasejs/10.12.5";
  const firebaseConfig = {
    apiKey:"AIzaSyA3M9XGDdy4mPEol4CNtB15nv-DjTg9ZSo",
    authDomain:"alilazer-cd582.firebaseapp.com",
    projectId:"alilazer-cd582",
    storageBucket:"alilazer-cd582.firebasestorage.app",
    messagingSenderId:"831212822404",
    appId:"1:831212822404:web:e7124182b0eef7fd8cc7d1",
    measurementId:"G-R4M2GJH05C"
  };
  const ROLE_LABELS = { parent:"Ota-ona", student:"O‘quvchi", teacher:"O‘qituvchi", admin:"Administrator" };

  let appMod, authMod, fsMod;
  try{ appMod = await import(`${V}/firebase-app.js`); }
  catch(e){ /* internet yo'q — dizayn + fallback ma'lumot bilan ishlayveradi */ }

  if (appMod) {
    const app = appMod.initializeApp(firebaseConfig);
    import(`${V}/firebase-analytics.js`).then(an=>{try{an.isSupported().then(ok=>{if(ok)window.__an=an.getAnalytics(app);}).catch(()=>{});}catch(e){}}).catch(()=>{});

    let db=null, auth=null;
    try{ fsMod = await import(`${V}/firebase-firestore.js`); db = fsMod.getFirestore(app); }catch(e){}
    try{ authMod = await import(`${V}/firebase-auth.js`); auth = authMod.getAuth(app); }catch(e){}

    // ---- Ommaviy ma'lumotni Firestore'dan yuklash ----
    async function loadPublic(){
      if(!db||!fsMod) return;
      const { collection, getDocs, query, orderBy, doc, getDoc } = fsMod;
      const ord = (name) => getDocs(query(collection(db,name), orderBy('order'))).catch(()=>getDocs(collection(db,name)));
      try{
        const [stu,tea,nw,asch,astu,setSnap] = await Promise.all([
          getDocs(collection(db,'students')), ord('teachers'), ord('news'), ord('achievements_school'), ord('achievements_students'),
          getDoc(doc(db,'settings','site'))
        ]);
        const p = {};
        const students = stu.docs.map(d=>{const x=d.data();const tr=x.track||"";return {id:x.studentId||d.id,name:x.name,g:Number(x.grade)||0,tr:tr,lng:x.lang||"uz",cls:x.classLetter||tr||"",score:Number(x.score)||0,att:Number(x.attendance)||0,photo:x.photo||"",subjects:Array.isArray(x.subjects)?x.subjects:[]};});
        if(students.length) p.students = students;
        const teachers = tea.docs.map(d=>{const x=d.data();return {name:x.name,suz:x.subject_uz,sru:x.subject_ru||x.subject_uz,rating:Number(x.rating)||0,years:x.years||0,certs:x.certs||0,avg:x.avg||0,votes:x.votes||0,photo:x.photo||""};});
        if(teachers.length) p.teachers = teachers;
        const news = nw.docs.map(d=>{const x=d.data();return {d:x.date,tuz:x.tag_uz,tru:x.tag_ru||x.tag_uz,uz:x.title_uz,ru:x.title_ru||x.title_uz,img:x.image||""};});
        if(news.length) p.news = news;
        const sa = asch.docs.map(d=>{const x=d.data();return {year:x.year,uz:x.text_uz,ru:x.text_ru||x.text_uz};});
        if(sa.length) p.schoolAch = sa;
        const sta = astu.docs.map(d=>{const x=d.data();return {name:x.name,year:x.year,uz:x.text_uz,ru:x.text_ru||x.text_uz};});
        if(sta.length) p.studentAch = sta;
        const setd = setSnap.exists()?setSnap.data():{};
        if(setd.stats) p.stats = setd.stats;
        if(setd.contact) p.contact = setd.contact;
        if(window.IqrorPublic && Object.keys(p).length) window.IqrorPublic.apply(p);
      }catch(e){ /* qoidalar hali e'lon qilinmagan bo'lishi mumkin — fallback qoladi */ }
    }
    loadPublic();

    // ---- Analitika + ariza API ----
    window.IqrorFB = {
      event(name,params){ try{ if(window.__an) import(`${V}/firebase-analytics.js`).then(an=>an.logEvent(window.__an,name,params||{})).catch(()=>{}); }catch(e){} },
      async submitEnrollment(data){ if(!db||!fsMod) return false; try{ await fsMod.addDoc(fsMod.collection(db,'enrollments'),{...data, created: fsMod.serverTimestamp()}); return true; }catch(e){ return false; } },
      async getAttendance(studentId){
        if(!db||!fsMod||!studentId) return null;
        const { collection, getDocs, query, where } = fsMod;
        try{
          const snap = await getDocs(query(collection(db,'attendance'), where('studentId','==',studentId)));
          let present=0,absent=0,late=0,excused=0; const recent=[];
          snap.forEach(s=>{ const d=s.data(), days=d.days||{}, month=d.month||''; Object.keys(days).forEach(dd=>{ const st=days[dd]; if(st==='present')present++; else if(st==='absent')absent++; else if(st==='late')late++; else if(st==='excused')excused++; recent.push({date:`${month}-${dd}`,st}); }); });
          recent.sort((a,b)=>b.date.localeCompare(a.date));
          return {present,absent,late,excused,total:present+absent+late+excused,recent:recent.slice(0,15)};
        }catch(e){ return null; }
      },
      async getGrades(studentId){
        if(!db||!fsMod||!studentId) return null;
        const { collection, getDocs, query, where } = fsMod;
        try{
          const snap = await getDocs(query(collection(db,'grades'), where('studentId','==',studentId)));
          const subjects={}; let year='';
          snap.forEach(s=>{ const d=s.data(); if(d.year && String(d.year)>year) year=String(d.year); const subs=d.subjects||{}; Object.keys(subs).forEach(name=>{ subjects[name]=Object.assign({},subjects[name]||{},subs[name]); }); });
          return { subjects, year };
        }catch(e){ return null; }
      },
      async getTimetable(classKey){
        if(!db||!fsMod||!classKey) return null;
        const { doc, getDoc } = fsMod;
        try{ const s=await getDoc(doc(db,'timetable',classKey)); return s.exists()?(s.data().days||{}):{}; }catch(e){ return null; }
      },
      async getHomework(classKey){
        if(!db||!fsMod||!classKey) return null;
        const { collection, getDocs, query, where } = fsMod;
        try{
          const snap=await getDocs(query(collection(db,'homework'), where('classKey','==',classKey)));
          const items=snap.docs.map(d=>d.data());
          items.sort((a,b)=>String(b.dueDate||'').localeCompare(String(a.dueDate||'')));
          return items;
        }catch(e){ return null; }
      }
    };

    // ---- Foydalanuvchi kirishi (email yoki Gmail) + rol ----
    if(auth && authMod && fsMod){
      const { GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut,
              createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendEmailVerification } = authMod;
      const { doc, getDoc, setDoc, serverTimestamp } = fsMod;
      let justLoggedIn = false, currentUser = null, childIds = [], activeChild = '';
      const kabRefresh=()=>{ if(location.hash==='#kabinet' && window.IqrorPublic && window.IqrorPublic.renderKabinet) window.IqrorPublic.renderKabinet(); };
      // Bir oiladan bir nechta farzand: childIds — barcha farzand ID lari, activeChild — hozir ko'rilayotgani.
      async function persistChildren(){ if(currentUser){ await setDoc(doc(db,'users',currentUser.uid),{childIds:childIds.slice(),activeChildId:activeChild,childId:activeChild},{merge:true}); } }
      window.IqrorAuth = {
        getUser: ()=>currentUser,
        getChildIds: ()=>childIds.slice(),
        getActiveChild: ()=>activeChild,
        getChildId: ()=>activeChild, // eski API bilan moslik
        async addChild(id){ id=String(id||'').trim(); if(!id) return; if(!childIds.includes(id)) childIds.push(id); activeChild=id; await persistChildren(); },
        async removeChild(id){ id=String(id||'').trim(); childIds=childIds.filter(x=>x!==id); if(activeChild===id) activeChild=childIds[0]||''; await persistChildren(); },
        async setActiveChild(id){ id=String(id||'').trim(); if(childIds.includes(id)){ activeChild=id; if(currentUser){ await setDoc(doc(db,'users',currentUser.uid),{activeChildId:activeChild,childId:activeChild},{merge:true}); } } },
        async saveChild(id){ id=String(id||'').trim(); if(id){ if(!childIds.includes(id)) childIds.push(id); activeChild=id; } else { childIds=[]; activeChild=''; } await persistChildren(); }
      };

      buildAuthUI();
      onAuthStateChanged(auth, async (user)=>{
        currentUser = user;
        if(!user){ childIds=[]; activeChild=''; setAuthUI(null); kabRefresh(); return; }
        let role=null;
        try{ const ud=await getDoc(doc(db,'users',user.uid)); if(ud.exists()){ const d=ud.data(); role=d.role;
          childIds = Array.isArray(d.childIds) ? d.childIds.slice() : (d.childId ? [d.childId] : []);
          activeChild = (d.activeChildId && childIds.includes(d.activeChildId)) ? d.activeChildId : (childIds[0]||'');
        } }catch(e){}
        setAuthUI({ name:user.displayName||user.email, role });
        kabRefresh();
        // Admin bo'lsa (custom claim yoki role=='admin') "Admin panel" havolasini ko'rsatamiz
        try{
          let adminOk = (role==='admin');
          try{ const tok=await user.getIdTokenResult(true); if(tok&&tok.claims&&tok.claims.admin) adminOk=true; }catch(e){}
          const el=document.getElementById('auth-admin'); if(el) el.style.display=adminOk?'inline-flex':'none';
        }catch(e){}
        // Rol faqat shu sessiyada endi kirgan bo'lsa so'raladi (sahifa ochilishida avto emas)
        if(!role && justLoggedIn){ justLoggedIn=false; askRole(user); }
      });

      function buildAuthUI(){
        const nav=document.getElementById('navdrop')||document.querySelector('.nav-inner'); if(!nav||document.getElementById('auth-ui')) return;
        const w=document.createElement('div'); w.id='auth-ui'; w.style.cssText='display:flex;align-items:center;gap:8px';
        w.innerHTML=`<button id="auth-login" class="btn-cta" style="background:var(--teal);color:#fff">Kirish</button>
          <span id="auth-chip" style="display:none;align-items:center;gap:8px;font-size:13.5px;font-weight:600">
            <span id="auth-name"></span><span id="auth-role" class="chip it"></span>
            <button id="auth-kab" class="chip" style="cursor:pointer;border:1px solid var(--teal-2);background:var(--it-bg);color:var(--teal)">👤 Kabinet</button>
            <button id="auth-pickrole" class="chip" style="display:none;cursor:pointer;border:1px solid var(--gold);background:var(--med-bg);color:var(--med-fg)">Rolni tanlang</button>
            <a id="auth-admin" href="./admin.html" style="display:none;background:var(--gold);color:var(--teal);padding:8px 12px;border-radius:10px;font-weight:700;text-decoration:none">⚙️ Admin panel</a>
            <button id="auth-out" style="background:transparent;color:var(--ink);border:1px solid var(--border);padding:8px 12px;border-radius:10px;font-weight:600;cursor:pointer">Chiqish</button></span>`;
        nav.appendChild(w);
        document.getElementById('auth-login').onclick=openAuthModal;
        document.getElementById('auth-out').onclick=()=>signOut(auth);
        document.getElementById('auth-pickrole').onclick=()=>{ if(currentUser) askRole(currentUser); };
        document.getElementById('auth-kab').onclick=()=>{ location.hash='#kabinet'; };
      }
      function setAuthUI(u){
        const login=document.getElementById('auth-login'), chip=document.getElementById('auth-chip'); if(!login||!chip) return;
        if(u){ login.style.display='none'; chip.style.display='inline-flex';
          document.getElementById('auth-name').textContent=u.name||'';
          const r=document.getElementById('auth-role'); const lbl=ROLE_LABELS[u.role]||''; r.textContent=lbl; r.style.display=lbl?'inline-block':'none';
          const pk=document.getElementById('auth-pickrole'); if(pk) pk.style.display = u.role ? 'none' : 'inline-block';
        } else { login.style.display='inline-block'; chip.style.display='none'; }
      }
      function openAuthModal(){
        if(document.getElementById('auth-modal')) return;
        const bg=document.createElement('div'); bg.id='auth-modal';
        bg.style.cssText='position:fixed;inset:0;background:rgba(9,58,52,.55);display:grid;place-items:center;z-index:100;padding:18px;overflow:auto';
        const inp='width:100%;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:var(--sans);margin-top:8px';
        bg.innerHTML=`<div style="background:#fff;border-radius:18px;max-width:420px;width:100%;padding:26px;box-shadow:0 12px 32px rgba(13,81,72,.2);font-family:var(--sans)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
            <h3 style="font-family:var(--serif);font-size:21px;margin:0;color:var(--ink)" id="am-title">Kirish</h3>
            <button id="am-x" style="border:none;background:transparent;font-size:22px;cursor:pointer;color:var(--muted)">×</button></div>
          <p style="color:var(--muted);font-size:13.5px;margin:2px 0 6px">Kirgach, rolingizni (ota-ona / o‘quvchi / o‘qituvchi) tanlaysiz.</p>
          <button id="am-google" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border);background:#fff;border-radius:10px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;margin:8px 0">
            <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-2.8-.4-4.1H24v7.8h12.4c-.3 2.1-1.6 5.2-4.6 7.3l7.1 5.5c4.2-3.9 6.6-9.6 6.6-16.5z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.2.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.1-5.5c-2 1.4-4.6 2.3-8.4 2.3-6.3 0-11.7-3.7-13.6-9.1l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
            Google bilan davom etish</button>
          <div style="text-align:center;color:var(--muted);font-size:13px;margin:6px 0">— yoki email bilan —</div>
          <div id="am-namewrap" style="display:none"><input id="am-name" placeholder="Ism-familiya" style="${inp}"></div>
          <input id="am-email" type="email" autocomplete="email" placeholder="Email" style="${inp}">
          <input id="am-pass" type="password" autocomplete="current-password" placeholder="Parol (kamida 6 belgi)" style="${inp}">
          <div id="am-err" style="display:none;background:#fdece3;border:1px solid #f0d3c4;color:#C2410C;border-radius:10px;padding:9px 12px;font-size:13px;margin-top:10px"></div>
          <button id="am-submit" style="width:100%;background:var(--gold);color:var(--teal);border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;margin-top:12px">Kirish</button>
          <div style="text-align:center;font-size:13.5px;color:var(--muted);margin-top:12px">
            <span id="am-toggle-txt">Hisobingiz yo‘qmi?</span>
            <a id="am-toggle" style="color:var(--teal);font-weight:600;cursor:pointer"> Ro‘yxatdan o‘tish</a></div>
        </div>`;
        document.body.appendChild(bg);
        let mode='login';
        const $m=id=>document.getElementById(id);
        const showErr=m=>{ $m('am-err').textContent=m; $m('am-err').style.display='block'; };
        $m('am-x').onclick=()=>bg.remove();
        bg.onclick=e=>{ if(e.target===bg) bg.remove(); };
        $m('am-toggle').onclick=()=>{
          mode = mode==='login'?'register':'login';
          $m('am-title').textContent = mode==='login'?'Kirish':'Ro‘yxatdan o‘tish';
          $m('am-submit').textContent = mode==='login'?'Kirish':'Ro‘yxatdan o‘tish';
          $m('am-namewrap').style.display = mode==='register'?'block':'none';
          $m('am-pass').autocomplete = mode==='register'?'new-password':'current-password';
          $m('am-toggle-txt').textContent = mode==='login'?'Hisobingiz yo‘qmi?':'Hisobingiz bormi?';
          $m('am-toggle').textContent = mode==='login'?' Ro‘yxatdan o‘tish':' Kirish';
          $m('am-err').style.display='none';
        };
        $m('am-google').onclick=()=>{ justLoggedIn=true; signInWithPopup(auth,new GoogleAuthProvider())
          .then(()=>bg.remove()).catch(e=>{ justLoggedIn=false; showErr('Google: '+(e.code||e.message)); }); };
        $m('am-submit').onclick=async()=>{
          const email=$m('am-email').value.trim(), pass=$m('am-pass').value;
          if(!email||!pass){ showErr('Email va parolni kiriting'); return; }
          $m('am-submit').disabled=true; justLoggedIn=true;
          try{
            if(mode==='register'){
              const cred=await createUserWithEmailAndPassword(auth,email,pass);
              const nm=$m('am-name').value.trim(); if(nm){ try{ await updateProfile(cred.user,{displayName:nm}); }catch(e){} }
              // Email tasdiqlash havolasi yuborilmaydi (chalkashlik oldini olish uchun) — tekshiruvni admin panelda "Tasdiqlangan" orqali qiladi
            } else { await signInWithEmailAndPassword(auth,email,pass); }
            bg.remove();
          }catch(e){
            justLoggedIn=false; $m('am-submit').disabled=false;
            const c=e.code||''; let m='Xatolik: '+c;
            if(c.includes('email-already-in-use')) m='Bu email allaqachon ro‘yxatdan o‘tgan — “Kirish”ni tanlang.';
            else if(c.includes('invalid-cred')||c.includes('wrong-password')||c.includes('user-not-found')) m='Email yoki parol noto‘g‘ri.';
            else if(c.includes('weak-password')) m='Parol juda kuchsiz (kamida 6 belgi).';
            else if(c.includes('invalid-email')) m='Email formati noto‘g‘ri.';
            showErr(m);
          }
        };
      }
      function askRole(user){
        if(document.getElementById('role-modal')) return;
        const bg=document.createElement('div'); bg.id='role-modal';
        bg.style.cssText='position:fixed;inset:0;background:rgba(9,58,52,.55);display:grid;place-items:center;z-index:100;padding:18px';
        bg.innerHTML=`<div style="background:#fff;border-radius:18px;max-width:440px;width:100%;padding:28px;box-shadow:0 12px 32px rgba(13,81,72,.2);font-family:var(--sans)">
          <h3 style="font-family:var(--serif);font-size:22px;margin:0 0 6px;color:var(--ink)">Rolingizni tanlang</h3>
          <p style="color:var(--muted);font-size:14.5px;margin:0 0 18px">Iqror maktabida kimsiz? Administrator keyin maktab ma'lumotlari asosida tekshiradi va kerak bo‘lsa to‘g‘rilaydi.</p>
          <div style="display:flex;flex-direction:column;gap:10px">
            ${[['parent','👨‍👩‍👧 Ota-ona'],['student','🎓 O‘quvchi'],['teacher','👩‍🏫 O‘qituvchi']].map(r=>`<button data-role="${r[0]}" style="text-align:left;border:1px solid var(--border);background:var(--bg);border-radius:12px;padding:14px 16px;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer">${r[1]}</button>`).join('')}
          </div></div>`;
        document.body.appendChild(bg);
        bg.querySelectorAll('[data-role]').forEach(btn=>btn.onclick=async()=>{
          try{ await setDoc(doc(db,'users',user.uid), { email:user.email, name:user.displayName||user.email, role:btn.dataset.role, verified:false, createdAt: serverTimestamp() });
            bg.remove(); setAuthUI({ name:user.displayName||user.email, role:btn.dataset.role });
            try{ window.IqrorFB && window.IqrorFB.event('role_selected',{role:btn.dataset.role}); }catch(e){}
          }catch(e){ alert('Saqlab bo‘lmadi: '+(e.code||e.message)); }
        });
      }
    }
  }
</script>
</body>
</html>
